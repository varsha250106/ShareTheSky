<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareTheSky - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html">
            <span>📷</span> ShareTheSky
        </a>
    </h1>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About me</a>
    </nav>
</header>

<main class="upload-container">
    <section class="upload-card">
        <h2>Upload Your Sky Photo 🌤️</h2>
        
        <div id="dropArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">☁️</div>
            <p id="uploadText">Click to select or drag your sky here</p>
            <img id="previewImage" class="preview-img" style="display:none;">
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <div class="input-group">
            <input type="text" id="captionInput" placeholder="Write a caption... (or leave blank for a random name)">
        </div>

        <button id="uploadBtn" class="cta-button" style="width: 100%; border: none; cursor: pointer;">
            Share the Sky
        </button>
    </section>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

</body>
</html>
