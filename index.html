
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShareTheSky</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
    <h1 class="logo">ShareTheSky</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="#">Upload</a>
        <a href="#">Gallery</a>
        <a href="#">Creator</a>
    </nav>
</header>

<section class="hero">
    <h2>Capture the Sky. Share the Magic.</h2>
    <p>A community where everyone uploads their sky photos together.</p>
</section>

<!-- UPLOAD -->
<section>
    <h2>Upload Your Sky 🌤️</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadImage()">Upload</button>
</section>

<!-- GALLERY -->
<section>
    <h2>Gallery</h2>
    <div id="gallery"></div>
</section>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<!-- 🔥 Cloudinary Script -->
<script>
const cloudName = "dqpmybazh";   // 🔴 replace this
const uploadPreset = "sharethesky";    // ✅ your preset

function uploadImage() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        const img = document.createElement("img");
        img.src = data.secure_url;
        img.style.width = "200px";
        img.style.margin = "10px";
        img.style.borderRadius = "10px";

        document.getElementById("gallery").appendChild(img);
    })
    .catch(() => {
        alert("Upload failed");
    });
}
</script>

</body>
</html>
