<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Match - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #2d2d6a;
            --bg: #f8f9fc;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--dark);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- LOGO ANIMATION --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo img { width: 30px; animation: float 3s ease-in-out infinite; }
        .logo span { font-weight: 800; font-size: 1.2rem; color: var(--dark); }

        /* --- RESPONSIVE LAYOUT --- */
        .main-container {
            display: flex; padding: 20px 5%; gap: 20px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 15px; }
            .sidebar { width: 100% !important; order: 2; }
            .game-section { order: 1; }
            header { padding: 10px 15px; }
            .nav-links { gap: 15px; }
        }

        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .card-panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-pill { background: #fcfaff; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #f0edff; }
        .stat-pill span { display: block; font-size: 1.2rem; font-weight: 800; color: var(--primary); }

        .rule-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 12px; margin-bottom: 5px; }
        .rule-icon { width: 30px; height: 30px; background: #f4f0ff; color: var(--primary); display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.9rem; flex-shrink: 0; }
        .rule-text h4 { margin: 0; font-size: 0.9rem; }
        .rule-text p { margin: 0; font-size: 0.75rem; color: #777; }

        /* --- GAME SECTION --- */
        .game-section { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .game-card { 
            background: white; width: 100%; border-radius: 24px; padding: 20px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .mode-btn {
            padding: 8px 14px; border-radius: 10px; border: 2px solid #f0f0f0;
            background: white; cursor: pointer; font-weight: 700; transition: 0.3s; color: #666; font-size: 0.8rem;
        }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .restart-btn { border-color: #ff9a9e; color: #ff9a9e; }

        /* --- GRID SCALING --- */
        .memory-grid { 
            display: grid; 
            gap: 8px; 
            perspective: 1000px; 
            width: 100%; 
            margin: 0 auto;
        }
        .grid-small { max-width: 400px; } 
        .grid-large { max-width: 100%; }

        .card { position: relative; transform-style: preserve-3d; transition: 0.6s; cursor: pointer; aspect-ratio: 1/1; }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; }
        .card-front { background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; }
        .card-back { background: #fff; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee; }
        .card-back img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="https://img.icons8.com/fluency/48/cloud.png" alt="Cloud Logo">
        <span>ShareTheSky</span>
    </a>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="card-panel">
            <h3 style="margin:0; font-size: 1.1rem;">Dashboard</h3>
            <div class="stat-row">
                <div class="stat-pill">Moves<span id="moves">0</span></div>
                <div class="stat-pill">Matches<span id="matches">0</span></div>
            </div>
        </div>

        <div class="card-panel">
            <h3 style="margin:0 0 10px 0; font-size: 1.1rem;">How to Play</h3>
            <div class="rule-item">
                <div class="rule-icon"><i class="fa-solid fa-clone"></i></div>
                <div class="rule-text"><h4>Find Pairs</h4><p>Match sky photos.</p></div>
            </div>
        </div>
    </div>

    <div class="game-section">
        <div class="game-card">
            <h2 style="margin:0 0 15px 0; font-size: 1.5rem;">Sky Match</h2>
            <div class="btn-group">
                <button class="mode-btn" id="btn-4" onclick="initGame(4, 4)">4×4</button>
                <button class="mode-btn" id="btn-6" onclick="initGame(6, 6)">6×6</button>
                <button class="mode-btn" id="btn-8" onclick="initGame(8, 7)">8×7</button>
                <button class="mode-btn restart-btn" onclick="restartGame()"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <div class="memory-grid" id="game-grid"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98", projectId: "sharethesky-a9c7d",
        authDomain: "sharethesky-a9c7d.firebaseapp.com", storageBucket: "sharethesky-a9c7d.appspot.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let flipped = [], moves = 0, matches = 0, isLock = false, totalPairs = 0, currentCols = 4, currentRows = 4;

    async function initGame(cols = 4, rows = 4) {
        currentCols = cols; currentRows = rows;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        const btnId = (cols === 8) ? 'btn-8' : `btn-${cols}`;
        if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');

        const grid = document.getElementById('game-grid');
        grid.className = `memory-grid ${cols === 4 ? 'grid-small' : 'grid-large'}`;
        grid.innerHTML = "<p>Loading...</p>";
        
        moves = 0; matches = 0; flipped = []; isLock = false;
        document.getElementById('moves').innerText = "0";
        document.getElementById('matches').innerText = "0";

        const totalCards = cols * rows;
        const powerCount = cols === 8 ? 4 : 2; 
        totalPairs = Math.floor((totalCards - powerCount) / 2);

        const snap = await getDocs(query(collection(db, "photos"), limit(totalPairs)));
        let photos = []; snap.forEach(doc => photos.push(doc.data().url));

        let deck = [...photos, ...photos].map(url => ({ type: 'photo', val: url }));
        const powers = ['fa-bolt', 'fa-eye'];
        while(deck.length < totalCards) deck.push({ type: 'power', val: powers[deck.length % 2] });

        deck.sort(() => Math.random() - 0.5);
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.type = item.type; card.dataset.val = item.val;
            card.innerHTML = `<div class="card-front"><i class="fa-solid fa-cloud"></i></div>
                              <div class="card-back">${item.type === 'photo' ? `<img src="${item.val}">` : `<i class="fa-solid ${item.val}" style="color:gold;"></i>`}</div>`;
            card.onclick = handleFlip;
            grid.appendChild(card);
        });
    }

    function handleFlip() {
        if (isLock || this.classList.contains('flipped') || this.dataset.done) return;
        this.classList.add('flipped');

        if (this.dataset.type === 'power') {
            isLock = true;
            setTimeout(() => {
                if (this.dataset.val === 'fa-bolt') {
                    document.querySelectorAll('.card.flipped:not([data-done])').forEach(c => c.classList.remove('flipped'));
                } else {
                    const hidden = document.querySelectorAll('.card:not(.flipped)');
                    hidden.forEach(c => c.classList.add('flipped'));
                    setTimeout(() => hidden.forEach(c => { if(!c.dataset.done) c.classList.remove('flipped'); }), 1000);
                }
                this.style.opacity = "0.4"; this.dataset.done = "true"; isLock = false;
            }, 600);
            return;
        }

        flipped.push(this);
        if (flipped.length === 2) {
            moves++; document.getElementById('moves').innerText = moves;
            isLock = true;
            const [c1, c2] = flipped;
            if (c1.dataset.val === c2.dataset.val) {
                matches++; document.getElementById('matches').innerText = matches;
                c1.dataset.done = "true"; c2.dataset.done = "true";
                flipped = []; isLock = false;
                /* MODIFIED WIN MESSAGE */
                if (matches === totalPairs) {
                    setTimeout(() => alert(`Great job! You cleared the sky in ${moves} moves.`), 500);
                }
            } else {
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flipped = []; isLock = false; }, 800);
            }
        }
    }

    window.restartGame = () => initGame(currentCols, currentRows);
    window.initGame = initGame;
    window.onload = () => initGame(4, 4);
</script>
</body>
</html>
