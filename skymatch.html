<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Match - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #2d2d6a;
            --bg: #f8f9fc;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--dark);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- NAVIGATION (Matches Home Page Style) --- */
        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 8%; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { width: 35px; }
        .logo span { font-weight: 800; font-size: 1.5rem; color: var(--dark); }

        .nav-links { display: flex; align-items: center; gap: 30px; }
        .nav-links a, .dropbtn { 
            text-decoration: none; color: #444; font-weight: 600; 
            font-size: 1rem; transition: 0.3s; background: none; border: none; cursor: pointer;
        }
        .nav-links a:hover, .dropdown:hover .dropbtn { color: var(--primary); }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; background-color: white; 
            min-width: 180px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-radius: 15px; z-index: 1; padding: 10px 0; border: 1px solid #f0f0f0;
        }
        .dropdown-content a { 
            color: #555; padding: 12px 20px; display: block; font-size: 0.95rem;
        }
        .dropdown-content a:hover { background-color: #fcfaff; color: var(--primary); }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- LAYOUT WRAPPER --- */
        .main-container {
            display: flex; padding: 40px 8%; gap: 40px; flex: 1; max-width: 1600px; margin: 0 auto; width: 100%;
        }

        /* --- SIDEBAR: DASHBOARD & NEAT RULES --- */
        .sidebar { width: 340px; display: flex; flex-direction: column; gap: 25px; }
        .card-panel { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-pill { background: #fcfaff; padding: 15px; border-radius: 18px; text-align: center; border: 1px solid #f0edff; }
        .stat-pill span { display: block; font-size: 1.6rem; font-weight: 800; color: var(--primary); }

        /* NEAT HOVERABLE RULES */
        .rule-item {
            display: flex; align-items: flex-start; gap: 15px; padding: 15px;
            border-radius: 18px; transition: all 0.3s ease; cursor: default; margin-bottom: 10px;
            border: 1px solid transparent;
        }
        .rule-item:hover {
            background: white; transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(161, 140, 209, 0.12);
            border-color: var(--primary);
        }
        .rule-icon {
            width: 40px; height: 40px; background: #f4f0ff; color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 1.2rem; flex-shrink: 0;
        }
        .rule-text h4 { margin: 0 0 4px 0; font-size: 1rem; color: var(--dark); }
        .rule-text p { margin: 0; font-size: 0.85rem; color: #777; line-height: 1.4; }

        /* --- GAME SECTION --- */
        .game-section { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .game-card { 
            background: white; width: 100%; border-radius: 32px; padding: 40px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center;
        }

        .btn-group { display: flex; gap: 12px; margin: 25px 0 35px 0; }
        .mode-btn {
            padding: 12px 24px; border-radius: 14px; border: 2px solid #eee;
            background: white; cursor: pointer; font-weight: 700; transition: 0.3s; color: #666;
        }
        .mode-btn:hover { border-color: var(--primary); color: var(--primary); }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 8px 20px rgba(161, 140, 209, 0.25); }

        /* --- MEMORY GRID --- */
        .memory-grid { display: grid; gap: 15px; perspective: 1000px; }
        .card { position: relative; transform-style: preserve-3d; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 16px; 
        }
        .card-front { background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; }
        .card-back { background: #fff; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #eee; }
        .card-back img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="https://img.icons8.com/fluency/48/cloud.png" alt="Cloud Logo">
        <span>ShareTheSky</span>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem; margin-left:5px;"></i></button>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="skymatch.html">Sky Match 🎮</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="card-panel">
            <h3 style="margin:0">Dashboard</h3>
            <div class="stat-row">
                <div class="stat-pill">Moves<span id="moves">0</span></div>
                <div class="stat-pill">Matches<span id="matches">0</span></div>
            </div>
        </div>

        <div class="card-panel">
            <h3 style="margin:0 0 20px 0">How to Play</h3>
            
            <div class="rule-item">
                <div class="rule-icon"><i class="fa-solid fa-clone"></i></div>
                <div class="rule-text">
                    <h4>Find Pairs</h4>
                    <p>Match identical sky photos to lock them in.</p>
                </div>
            </div>

            <div class="rule-item">
                <div class="rule-icon"><i class="fa-solid fa-bolt"></i></div>
                <div class="rule-text">
                    <h4>Thunder Power</h4>
                    <p>Resets unmatched cards instantly for a fresh start.</p>
                </div>
            </div>

            <div class="rule-item">
                <div class="rule-icon"><i class="fa-solid fa-eye"></i></div>
                <div class="rule-text">
                    <h4>Sky Vision</h4>
                    <p>Briefly reveals all card positions for a quick peek.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="game-section">
        <div class="game-card">
            <h1 style="margin:0; font-size: 2.2rem;">Sky Match</h1>
            <div class="btn-group">
                <button class="mode-btn" id="btn-4" onclick="initGame(4)">4 × 4</button>
                <button class="mode-btn" id="btn-6" onclick="initGame(6)">6 × 6</button>
                <button class="mode-btn" id="btn-8" onclick="initGame(8)">8 × 8</button>
            </div>
            <div class="memory-grid" id="game-grid"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98", projectId: "sharethesky-a9c7d",
        authDomain: "sharethesky-a9c7d.firebaseapp.com", storageBucket: "sharethesky-a9c7d.appspot.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let flipped = [], moves = 0, matches = 0, isLock = false, totalPairs = 0;

    async function initGame(size = 8) {
        // Fix: Reset button colors
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${size}`).classList.add('active');

        const grid = document.getElementById('game-grid');
        grid.innerHTML = "<p>Clearing the sky...</p>";
        
        moves = 0; matches = 0; flipped = []; isLock = false;
        document.getElementById('moves').innerText = "0";
        document.getElementById('matches').innerText = "0";

        let cardSize = size === 4 ? 120 : (size === 6 ? 95 : 75);
        const totalCards = size * size;
        const powerCount = size === 8 ? 4 : 2; 
        totalPairs = (totalCards - powerCount) / 2;

        const snap = await getDocs(query(collection(db, "photos"), limit(totalPairs)));
        let photos = []; snap.forEach(doc => photos.push(doc.data().url));

        let deck = [...photos, ...photos].map(url => ({ type: 'photo', val: url }));
        const powers = ['fa-bolt', 'fa-eye'];
        for(let i=0; i < powerCount; i++) deck.push({ type: 'power', val: powers[i % 2] });

        deck.sort(() => Math.random() - 0.5);
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${size}, ${cardSize}px)`;

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.width = card.style.height = `${cardSize}px`;
            card.dataset.type = item.type; card.dataset.val = item.val;
            card.innerHTML = `<div class="card-front"><i class="fa-solid fa-cloud"></i></div>
                              <div class="card-back">${item.type === 'photo' ? `<img src="${item.val}">` : `<i class="fa-solid ${item.val}" style="color:gold; font-size:1.5rem;"></i>`}</div>`;
            card.onclick = handleFlip;
            grid.appendChild(card);
        });
    }

    function handleFlip() {
        if (isLock || this.classList.contains('flipped') || this.dataset.done) return;
        this.classList.add('flipped');

        if (this.dataset.type === 'power') {
            isLock = true;
            setTimeout(() => {
                if (this.dataset.val === 'fa-bolt') {
                    document.querySelectorAll('.card.flipped:not([data-done])').forEach(c => c.classList.remove('flipped'));
                } else {
                    const hidden = document.querySelectorAll('.card:not(.flipped)');
                    hidden.forEach(c => c.classList.add('flipped'));
                    setTimeout(() => hidden.forEach(c => { if(!c.dataset.done) c.classList.remove('flipped'); }), 1200);
                }
                this.style.opacity = "0.3"; this.dataset.done = "true"; isLock = false;
            }, 600);
            return;
        }

        flipped.push(this);
        if (flipped.length === 2) {
            moves++; document.getElementById('moves').innerText = moves;
            isLock = true;
            const [c1, c2] = flipped;
            if (c1.dataset.val === c2.dataset.val) {
                matches++; document.getElementById('matches').innerText = matches;
                c1.dataset.done = "true"; c2.dataset.done = "true";
                flipped = []; isLock = false;
                if (matches === totalPairs) alert("Sky Cleared!");
            } else {
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flipped = []; isLock = false; }, 800);
            }
        }
    }

    window.initGame = initGame;
    window.onload = () => initGame(8);
</script>
</body>
</html>
