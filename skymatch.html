<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Collector - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #2d2d6a;
            --bg: #f8f9fc;
            --gold: #ffd700;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--dark);
            min-height: 100vh; overflow-x: hidden; overscroll-behavior-y: contain; 
        }

        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5%; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .main-container {
            display: grid; grid-template-columns: 300px 1fr; gap: 40px;
            padding: 20px 5%; max-width: 1200px; margin: 0 auto;
        }

        /* --- UI ELEMENTS --- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .dashboard-card {
            background: white; border-radius: 20px; padding: 25px;
            text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.02);
            border: 1.5px solid #f0edff;
        }

        /* The Light Meter Styling */
        .meter-container {
            width: 100%; height: 12px; background: #eee; border-radius: 10px;
            margin-top: 10px; overflow: hidden;
        }
        #lightMeter {
            width: 100%; height: 100%; background: linear-gradient(90deg, #fbc2eb, #a18cd1);
            transition: width 0.2s;
        }

        .game-section { 
            background: white; border-radius: 30px; padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.03); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .canvas-area { position: relative; width: 100%; max-width: 350px; aspect-ratio: 7/10; }
        #gameCanvas { background: linear-gradient(to bottom, #2d2d6a 0%, #a18cd1 100%); border-radius: 20px; width: 100%; height: 100%; display: block; touch-action: none; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 45, 106, 0.9); border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10; text-align: center; padding: 20px;
        }

        .btn-action {
            background: white; color: var(--primary); border: none; padding: 15px 45px;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
        }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">
        <img src="https://img.icons8.com/fluency/48/star.png" width="30">
        <span>ShareTheSky</span>
    </a>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="dashboard-card">
            <div style="font-size: 0.8rem; font-weight: 700; opacity: 0.7;">LIGHT ENERGY</div>
            <div class="meter-container"><div id="lightMeter"></div></div>
        </div>
        <div class="dashboard-card">
            <div style="font-size: 0.8rem; font-weight: 700; opacity: 0.7;">FRAGMENTS</div>
            <div style="font-size: 2rem; font-weight: 800; color: var(--primary);" id="fragCount">0</div>
        </div>
    </div>

    <div class="game-section">
        <h2 style="margin: 0 0 15px 0;">Sky Collector</h2>
        <div class="canvas-area">
            <div id="overlay">
                <h2>Collect the Stars!</h2>
                <p>Don't let your light run out.</p>
                <button class="btn-action" id="startBtn">START</button>
            </div>
            <canvas id="gameCanvas" width="350" height="500"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    let gameRunning = false;
    let light = 100;
    let fragments = 0;
    let player = { x: 155, y: 350, w: 40, h: 30, vx: 0, vy: 0, jump: -10, grav: 0.35 };
    let platforms = [];
    let stars = [];

    // Controls
    let keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;
    canvas.addEventListener('touchstart', e => {
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        keys[touchX < rect.width/2 ? 'ArrowLeft' : 'ArrowRight'] = true;
    });
    canvas.addEventListener('touchend', () => { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; });

    function spawnPlatform(y) {
        let px = Math.random() * (canvas.width - 70);
        platforms.push({ x: px, y: y, w: 70, h: 12 });
        
        // 40% chance to spawn a star on this platform
        if (Math.random() > 0.6) {
            stars.push({ x: px + 25, y: y - 25, size: 10, gathered: false });
        }
    }

    function init() {
        platforms = []; stars = []; light = 100; fragments = 0;
        player.x = 155; player.y = 350; player.vy = 0;
        platforms.push({ x: 140, y: 420, w: 70, h: 12 });
        for (let i = 0; i < 7; i++) spawnPlatform(i * 75);
    }

    function loop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Light Decay
        light -= 0.15;
        document.getElementById('lightMeter').style.width = light + "%";
        if (light <= 0) gameOver("Out of Light!");

        // Player Physics
        player.vy += player.grav;
        player.y += player.vy;
        if (keys['ArrowLeft']) player.vx = -5;
        else if (keys['ArrowRight']) player.vx = 5;
        else player.vx *= 0.85;
        player.x += player.vx;

        // Wrap
        if (player.x < -player.w) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.w;

        // Draw Platforms
        platforms.forEach((p, i) => {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.fillRect(p.x, p.y, p.w, p.h);

            // Collision
            if (player.vy > 0 && player.x < p.x + p.w && player.x + player.w > p.x && 
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15) {
                player.vy = player.jump;
            }

            // Scroll
            if (player.y < 250) {
                let diff = 250 - player.y;
                player.y += diff;
                p.y += diff;
                stars.forEach(s => s.y += diff);
                if (p.y > canvas.height) { platforms.splice(i, 1); spawnPlatform(0); }
            }
        });

        // Draw Stars
        stars.forEach((s, i) => {
            if (!s.gathered) {
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 15; ctx.shadowColor = "#ffd700";
                ctx.beginPath();
                ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow

                // Collection Logic
                let dx = player.x + 20 - s.x;
                let dy = player.y + 15 - s.y;
                if (Math.sqrt(dx*dx + dy*dy) < 30) {
                    s.gathered = true;
                    light = Math.min(100, light + 15);
                    fragments++;
                    document.getElementById('fragCount').innerText = fragments;
                }
            }
            if (s.y > canvas.height) stars.splice(i, 1);
        });

        // Draw Player (Cloud)
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(player.x+10, player.y+15, 12, 0, Math.PI*2);
        ctx.arc(player.x+20, player.y+10, 15, 0, Math.PI*2);
        ctx.arc(player.x+30, player.y+15, 12, 0, Math.PI*2);
        ctx.fill();

        if (player.y > canvas.height) gameOver("Fell from the sky!");
        requestAnimationFrame(loop);
    }

    function gameOver(msg) {
        gameRunning = false;
        overlay.style.display = 'flex';
        overlay.innerHTML = `<h2>${msg}</h2><p>Stars: ${fragments}</p><button class="btn-action" onclick="location.reload()">RETRY</button>`;
    }

    document.getElementById('startBtn').onclick = () => {
        overlay.style.display = 'none';
        gameRunning = true;
        init();
        loop();
    };
</script>
</body>
</html>
