<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid { columns: 3 250px; column-gap: 20px; width: 92%; max-width: 1200px; margin: 40px auto; }
        
        .sky-card { 
            break-inside: avoid; margin-bottom: 20px; background: white; 
            border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s;
        }
        
        .sky-card:hover { transform: translateY(-5px); }
        .sky-card img { width: 100%; display: block; cursor: zoom-in; }

        .card-actions {
            position: absolute; top: 12px; right: 12px;
            display: flex; gap: 8px; opacity: 0; transition: 0.3s;
        }
        .sky-card:hover .card-actions { opacity: 1; }

        .action-btn {
            background: rgba(255,255,255,0.9); border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; color: #2d2d6a; display: flex;
            align-items: center; justify-content: center; font-size: 0.9rem;
        }
        .delete-btn { color: #ff4d4d; }

        .sky-info { padding: 15px; }
        .sky-info h3 { margin: 0; font-size: 1rem; color: #2d2d6a; }
        
        .interaction-bar { display: flex; align-items: center; margin-top: 10px; }
        .like-btn { cursor: pointer; font-size: 1.2rem; color: #ddd; transition: 0.3s; }
        .like-btn.liked { color: #ff4d6d; }
        .like-count { font-size: 0.85rem; margin-left: 6px; color: #666; font-weight: 600; }
        .sky-tag { margin-left: auto; background: #f0f4ff; color: #6c63ff; font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; }

        /* Zoom Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 12px; }
        
        #loader { text-align: center; padding: 100px; color: #5a7fa3; font-family: 'Poppins', sans-serif; }

        @media (max-width: 768px) { .gallery-grid { columns: 2 160px; column-gap: 12px; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><a href="index.html"><span>ShareTheSky</span></a></div>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="gallery.html" style="font-weight:bold; color:var(--primary-purple);">Gallery</a>
        <a href="upload.html">Upload</a>
    </nav>
</header>

<main>
    <div id="loader"><i class="fa-solid fa-cloud-sun fa-spin fa-2x"></i><p>Painting the gallery...</p></div>
    <div class="gallery-grid" id="grid"></div>
</main>

<div id="zoomModal" class="modal" onclick="this.style.display='none'">
    <img class="modal-content" id="modalImg">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
    const SUPABASE_URL = 'https://quunbblagrcwayyeiahv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dW5iYmxhZ3Jjd2F5eWVpYWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ4MjcsImV4cCI6MjA5MDk0MDgyN30.ylX47zmQXI_kAkY3wQUyJz0BqZ7xZ3hZARonm80Id3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myId = localStorage.getItem("mySkyUserId");

    async function loadGallery() {
        const { data: photos, error } = await supabaseClient.from('photos').select('*').order('id', { ascending: false });
        if (error) return console.error(error);

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        document.getElementById('loader').style.display = 'none';

        for (const photo of photos) {
            const isOwner = photo.uploader_id === myId;
            const likeCount = await getLikeCount(photo.id);
            const hasLiked = await checkIfLiked(photo.id, myId);

            const card = document.createElement('div');
            card.className = 'sky-card';
            card.innerHTML = `
                <div class="card-actions">
                    <button class="action-btn" onclick="downloadImg('${photo.url}')"><i class="fa-solid fa-download"></i></button>
                    ${isOwner ? `<button class="action-btn delete-btn" onclick="deleteSky('${photo.id}', '${photo.url}')"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
                <img src="${photo.url}" onclick="event.stopPropagation(); zoomImg('${photo.url}')" loading="lazy">
                <div class="sky-info">
                    <h3>${photo.caption}</h3>
                    <div class="interaction-bar">
                        <i class="fa-solid fa-heart like-btn ${hasLiked ? 'liked' : ''}" onclick="handleLike(this, ${photo.id})"></i>
                        <span class="like-count" id="lc-${photo.id}">${likeCount}</span>
                        <span class="sky-tag">${photo.category}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }
    }

    // --- LOGIC FUNCTIONS ---
    window.zoomImg = (url) => {
        document.getElementById('zoomModal').style.display = 'flex';
        document.getElementById('modalImg').src = url;
    };

    window.downloadImg = async (url) => {
        const res = await fetch(url);
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'ShareTheSky.jpg';
        a.click();
    };

    window.handleLike = async (el, photoId) => {
        if (el.classList.contains('liked')) {
            await supabaseClient.from('likes').delete().match({ photo_id: photoId, user_id: myId });
            el.classList.remove('liked');
        } else {
            await supabaseClient.from('likes').insert([{ photo_id: photoId, user_id: myId }]);
            el.classList.add('liked');
        }
        document.getElementById(`lc-${photoId}`).innerText = await getLikeCount(photoId);
    };

    window.deleteSky = async (id, url) => {
        if (!confirm("Delete this photo forever?")) return;
        const fileName = url.split('/').pop();
        await supabaseClient.storage.from('sky-photos').remove([fileName]);
        await supabaseClient.from('photos').delete().eq('id', id);
        location.reload();
    };

    async function getLikeCount(id) {
        const { count } = await supabaseClient.from('likes').select('*', { count: 'exact', head: true }).eq('photo_id', id);
        return count || 0;
    }

    async function checkIfLiked(pId, uId) {
        const { data } = await supabaseClient.from('likes').select('id').match({ photo_id: pId, user_id: uId });
        return data && data.length > 0;
    }

    loadGallery();
</script>
</body>
</html>
