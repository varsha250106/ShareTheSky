<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-purple: #6c63ff; --dark-text: #2d2d6a; --danger: #ff4d6d; }
        body { font-family: 'Poppins', sans-serif; background: #f8faff; margin: 0; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5%; 
            background: white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark-text); font-weight: 500; }

        /* FIX: Explore Dropdown Menu */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: none; border: none; font-family: inherit; font-weight: 500; color: var(--dark-text); cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; }
        .dropdown-content { 
            display: none; position: absolute; right: 0; background-color: white; 
            min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); 
            border-radius: 12px; z-index: 1; overflow: hidden; margin-top: 10px;
        }
        .dropdown-content a { color: var(--dark-text); padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; transition: 0.2s; }
        .dropdown-content a:hover { background-color: #f0f4ff; color: var(--primary-purple); }
        .dropdown:hover .dropdown-content { display: block; }

        /* Gallery Layout & High-Quality Fix */
        .gallery-grid { columns: 3 250px; column-gap: 20px; width: 92%; max-width: 1200px; margin: 40px auto; }
        .sky-card { break-inside: avoid; margin-bottom: 20px; background: white; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        
        .sky-card img { 
            width: 100%; 
            display: block; 
            cursor: zoom-in; 
            object-fit: cover; /* Prevents stretching */
            background: #eee;
        }
        
        .card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; opacity: 0; transition: 0.3s; z-index: 10; }
        .sky-card:hover .card-actions { opacity: 1; }
        
        .action-btn { background: rgba(255,255,255,0.9); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sky-info { padding: 15px; }
        .like-btn { cursor: pointer; font-size: 1.3rem; color: #ccc; transition: 0.3s; }
        .like-btn.liked { color: var(--danger); }
        .sky-tag { margin-left: auto; font-size: 0.7rem; background: #f0f4ff; color: var(--primary-purple); padding: 4px 10px; border-radius: 20px; }

        /* Zoom Modal Style */
        .zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            align-items: center; justify-content: center; cursor: zoom-out;
        }
        .zoom-overlay img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        
        #modToggle { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: 30px; background: var(--dark-text); color: white; border: none; cursor: pointer; opacity: 0.6; }
        @media (max-width: 768px) { .gallery-grid { columns: 2 160px; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; font-weight:600; color:var(--dark-text);">ShareTheSky</a></div>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i></button>
            <div class="dropdown-content">
                <a href="upload.html">Upload</a>
                <a href="match.html">Sky Match</a>
                <a href="golden-hour.html">Golden Hour</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<main><div class="gallery-grid" id="grid"></div></main>

<div class="zoom-overlay" id="zoomOverlay" onclick="this.style.display='none'">
    <img id="zoomImg" src="">
</div>

<button id="modToggle" onclick="toggleModMode()">Admin View</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://quunbblagrcwayyeiahv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dW5iYmxhZ3Jjd2F5eWVpYWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ4MjcsImV4cCI6MjA5MDk0MDgyN30.ylX47zmQXI_kAkY3wQUyJz0BqZ7xZ3hZARonm80Id3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const myId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", myId);
    let isModMode = false;

    async function loadGallery() {
        const grid = document.getElementById('grid');
        // FIX: Relationship Error
        let { data: photos, error } = await supabaseClient.from('photos').select('*')
            .or('is_reported.eq.false,is_reported.is.null')
            .order('id', { ascending: false });

        if (error) {
            grid.innerHTML = `<p style="text-align:center;">Error loading photos.</p>`;
            return;
        }

        const { data: myLikes } = await supabaseClient.from('likes').select('photo_id').eq('user_id', myId);
        const myLikedIds = new Set(myLikes?.map(l => l.photo_id));

        grid.innerHTML = '';
        photos.forEach(photo => {
            const isOwner = photo.uploader_id === myId;
            const isLiked = myLikedIds.has(photo.id);
            const card = document.createElement('div');
            card.className = 'sky-card';
            card.innerHTML = `
                <div class="card-actions">
                    <button class="action-btn" onclick="reportSky(${photo.id})"><i class="fa-solid fa-flag"></i></button>
                    ${isOwner || isModMode ? `<button class="action-btn" onclick="deleteSky(${photo.id})" style="color:var(--danger);"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
                <img src="${photo.url}" onclick="openZoom('${photo.url}')">
                <div class="sky-info">
                    <h3 style="margin:0; font-size:0.9rem;">${photo.caption || 'Beautiful View'}</h3>
                    <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                        <i class="fa-heart ${isLiked ? 'fa-solid liked' : 'fa-regular'} like-btn" onclick="toggleLike(this, ${photo.id})"></i>
                        <span class="sky-tag">${photo.category}</span>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    // Zoom Function
    window.openZoom = (url) => {
        const overlay = document.getElementById('zoomOverlay');
        const img = document.getElementById('zoomImg');
        img.src = url;
        overlay.style.display = 'flex';
    };

    window.toggleLike = async (el, photoId) => {
        if (el.classList.contains('liked')) {
            await supabaseClient.from('likes').delete().eq('photo_id', photoId).eq('user_id', myId);
            el.classList.replace('fa-solid', 'fa-regular'); el.classList.remove('liked');
        } else {
            await supabaseClient.from('likes').insert([{ photo_id: photoId, user_id: myId }]);
            el.classList.replace('fa-regular', 'fa-solid'); el.classList.add('liked');
        }
    };

    window.toggleModMode = () => { 
        const pass = prompt("Admin Pass:");
        if (pass === "skyadmin123") { isModMode = !isModMode; loadGallery(); } 
    };

    loadGallery();
</script>
</body>
</html>
