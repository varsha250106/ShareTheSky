<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html"><span>📷</span> ShareTheSky</a>
    </h1>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About me</a>
    </nav>
</header>

<main class="gallery-container">
    <section class="gallery-header">
        <h2>Community Sky Gallery ☁️</h2>
        <p>Explore the beauty of the world, one sky at a time.</p>
    </section>

    <div id="photoGallery" class="pinterest-grid"></div>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const galleryContainer = document.getElementById("photoGallery");
    const mySkyUserId = localStorage.getItem("mySkyUserId");

    const q = query(collection(db, "photos"), orderBy("date", "desc"));

    onSnapshot(q, (snapshot) => {
        galleryContainer.innerHTML = ""; 
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            const isOwner = data.uploaderId === mySkyUserId;

            const card = document.createElement("div");
            card.className = "photo-card"; // This matches the Pinterest CSS

            card.innerHTML = `
                <div class="photo-wrapper">
                    <img src="${data.url}" alt="Sky" onclick="openZoom('${data.url}')">
                    <div class="photo-overlay">
                        <button class="like-btn ${localStorage.getItem('liked_'+id) ? 'liked' : ''}" data-id="${id}">
                            ❤️ <span>${data.likes || 0}</span>
                        </button>
                    </div>
                </div>
                <div class="photo-info">
                    <h3>${data.caption}</h3>
                    <div class="photo-meta">
                        <span>${data.date.split(',')[0]}</span>
                        ${isOwner ? `<button class="delete-btn" data-id="${id}">🗑️</button>` : ''}
                    </div>
                </div>
            `;

            galleryContainer.appendChild(card);

            // Like Event
            card.querySelector('.like-btn').onclick = async (e) => {
                const btn = e.currentTarget;
                const isLiked = btn.classList.contains("liked");
                const newCount = isLiked ? (data.likes - 1) : (data.likes + 1);
                await updateDoc(doc(db, "photos", id), { likes: newCount });
                isLiked ? localStorage.removeItem('liked_'+id) : localStorage.setItem('liked_'+id, "true");
            };

            // Delete Event
            if (isOwner) {
                card.querySelector('.delete-btn').onclick = async () => {
                    if (confirm("Remove this sky?")) await deleteDoc(doc(db, "photos", id));
                };
            }
        });
    });

    window.openZoom = (url) => {
        const overlay = document.createElement('div');
        overlay.className = 'zoom-overlay';
        overlay.innerHTML = `<img src="${url}" class="zoomed-img" onclick="this.parentElement.remove()">`;
        document.body.appendChild(overlay);
        overlay.onclick = () => overlay.remove();
    };
</script>
</body>
</html>
