<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html">
            <span class="logo-icon"></span>
            ShareTheSky
        </a>
    </h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="creator.html">Creator</a>
    </nav>
</header>

<section>
    <h2 style="text-align:center; margin-top:30px;">Community Sky Gallery ☁️</h2>
    <div id="gallery" class="gallery-container">
        </div>
</section>

<div id="skyModal" class="sky-modal">
    <span class="close-sky" id="closeBtn">&times;</span>
    <div class="modal-container">
        <img id="modalImg" src="" alt="Full Sky View">
        <div class="modal-details">
            <h3 id="modalCaption"></h3>
            <a id="downloadLink" href="" download="MySky.jpg" class="download-btn">
                📥 Download High-Res
            </a>
        </div>
    </div>
</div>

<script type="module">
    // 1. Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 2. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const galleryDiv = document.getElementById("gallery");
    const modal = document.getElementById("skyModal");

    // 🆔 Identify the User
    const myId = localStorage.getItem("mySkyUserId");

    // 3. Listen for Data (Real-time)
    const q = query(collection(db, "photos"), orderBy("date", "desc"));
    
    onSnapshot(q, (snapshot) => {
        galleryDiv.innerHTML = "";
        
        // Fetch liked states
        const likedIds = JSON.parse(localStorage.getItem("likedPhotos") || "[]");

        snapshot.forEach((docSnap) => {
            const photo = docSnap.data();
            const id = docSnap.id;
            const isLiked = likedIds.includes(id);
            const isOwner = (photo.uploaderId === myId);

            const card = document.createElement("div");
            card.className = "photo-card";
            card.innerHTML = `
                <img src="${photo.url}" alt="Sky Photo" class="gallery-img">
                <div style="padding: 15px;">
                    <p style="margin: 5px 0;"><strong>${photo.caption || 'Beautiful Sky'}</strong></p>
                    <p style="font-size:11px; color:#888;">${photo.date}</p>
                    <p style="font-size:18px;">❤️ <span id="count-${id}">${photo.likes || 0}</span></p>
                    
                    <div class="btn-group">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" id="btn-${id}">
                            ${isLiked ? '💖 Liked' : '🤍 Like'}
                        </button>

                        ${isOwner ? `<button class="delete-btn" id="del-${id}">🗑️ Delete My Photo</button>` : ''}
                    </div>
                </div>
            `;

            galleryDiv.appendChild(card);

            // --- CLICK EVENTS ---

            // A. Open Full Screen
            card.querySelector(".gallery-img").addEventListener("click", () => {
                document.getElementById("modalImg").src = photo.url;
                document.getElementById("modalCaption").innerText = photo.caption || "Sky View";
                document.getElementById("downloadLink").href = photo.url;
                modal.style.display = "flex";
            });

            // B. Like Logic
            card.querySelector(".like-btn").addEventListener("click", (e) => {
                handleToggleLike(id, e.target);
            });

            // C. Delete Logic
            if (isOwner) {
                card.querySelector(".delete-btn").addEventListener("click", async () => {
                    if (confirm("Delete this sky forever?")) {
                        await deleteDoc(doc(db, "photos", id));
                    }
                });
            }
        });
    });

    // 4. Modal Functions (Now inside the module so they work)
    document.getElementById("closeBtn").addEventListener("click", () => {
        modal.style.display = "none";
    });

    window.addEventListener("click", (event) => {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    });

    // 5. Like/Unlike Logic
    async function handleToggleLike(photoId, buttonElement) {
        buttonElement.disabled = true; // Temporary disable to prevent double clicks
        
        const photoRef = doc(db, "photos", photoId);
        let likedPhotos = JSON.parse(localStorage.getItem("likedPhotos") || "[]");
        const alreadyLiked = likedPhotos.includes(photoId);

        // Update LocalStorage
        if (alreadyLiked) {
            likedPhotos = likedPhotos.filter(id => id !== photoId);
        } else {
            likedPhotos.push(photoId);
        }
        localStorage.setItem("likedPhotos", JSON.stringify(likedPhotos));

        // Update Firebase
        try {
            await updateDoc(photoRef, {
                likes: increment(alreadyLiked ? -1 : 1)
            });
        } catch (err) {
            console.error("Error updating like:", err);
        } finally {
            buttonElement.disabled = false;
        }
    }
</script>

</body>
</html>
