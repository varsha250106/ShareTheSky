<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="https://img.icons8.com/fluency/48/cloud.png" class="floating-cloud"><span>ShareTheSky</span></a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <button class="dropbtn" style="color:#a18cd1">Explore ▾</button>
                <div class="dropdown-content">
                    <a href="gallery.html" style="font-weight:700">Gallery</a>
                    <a href="upload.html">Upload</a>
                </div>
            </div>
        </nav>
    </header>

    <h2 style="text-align:center; margin-top:40px; color:#2d2d6a;">Community Sky Gallery</h2>
    <div id="photoGallery" class="pinterest-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98", 
            projectId: "sharethesky-a9c7d",
            // ... add rest of your config here
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        onSnapshot(query(collection(db, "photos"), orderBy("date", "desc")), (snap) => {
            const container = document.getElementById("photoGallery");
            container.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="pin-card">
                        <img src="${data.url}" class="pin-img" onclick="openZoom('${data.url}', '${data.caption}')">
                    </div>`;
            });
        });

        window.openZoom = (url, cap) => {
            let scale = 1;
            const overlay = document.createElement('div');
            overlay.className = "zoom-overlay";
            overlay.innerHTML = `
                <h3 style="color:white; margin-bottom:10px;">${cap || 'Sky'}</h3>
                <img src="${url}" id="zImg">
                <div class="zoom-pill">
                    <button onclick="zoom(-0.2)">➖</button>
                    <span id="zPerc">100%</span>
                    <button onclick="zoom(0.2)">➕</button>
                    <button onclick="this.parentElement.parentElement.remove()" style="color:red">Close</button>
                </div>`;
            document.body.appendChild(overlay);
            window.zoom = (amt) => {
                scale += amt;
                document.getElementById('zImg').style.transform = `scale(${scale})`;
                document.getElementById('zPerc').innerText = Math.round(scale*100) + '%';
            }
        };
    </script>
</body>
</html>
