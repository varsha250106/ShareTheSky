<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery – ShareTheSky</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
    <h1 class="logo">ShareTheSky</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="creator.html">Creator</a>
    </nav>
</header>

<section class="gallery">
    <h2>Sky Gallery 🌤️</h2>
    <div class="grid" id="galleryGrid"></div>
</section>

<!-- 🔥 FINAL SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ SAME Firebase config (must match upload page)
const firebaseConfig = {
  apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
  authDomain: "sharethesky-a9c7d.firebaseapp.com",
  projectId: "sharethesky-a9c7d",
  storageBucket: "sharethesky-a9c7d.firebasestorage.app",
  messagingSenderId: "1047232389865",
  appId: "1:1047232389865:web:37694bf13bcef31f570678",
  measurementId: "G-QLMFRX48Q9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const galleryContainer = document.getElementById("galleryGrid");

// 🔥 LOAD ALL IMAGES (GLOBAL)
async function loadGallery() {
    galleryContainer.innerHTML = "";

    const snapshot = await getDocs(collection(db, "photos"));

    snapshot.forEach((docSnap) => {
        const photo = docSnap.data();
        const id = docSnap.id;

        const box = document.createElement("div");
        box.classList.add("photoBox");

        box.innerHTML = `
            <img src="${photo.url}" style="width:200px; border-radius:10px;">
            <p><strong>${photo.caption || "No Caption"}</strong></p>
            <p style="font-size:12px;">${photo.date}</p>

            <button onclick="likePhoto('${id}', ${photo.likes || 0})">
                ❤️ Like (${photo.likes || 0})
            </button>

            
        `;

        galleryContainer.appendChild(box);
    });
}

// ❤️ LIKE
window.likePhoto = async function(id, currentLikes) {
    await updateDoc(doc(db, "photos", id), {
        likes: currentLikes + 1
    });
    loadGallery();
};

// ❌ DELETE (optional – remove if you don’t want users deleting)
window.deletePhoto = async function(id) {
    await deleteDoc(doc(db, "photos", id));
    loadGallery();
};

// 🚀 INITIAL LOAD
loadGallery();
</script>

</body>
</html>
