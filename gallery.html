<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
   <style>
    :root { 
        --primary-purple: #6c63ff; 
        --dark-text: #1a237e; 
        --bg-blue: #f8faff; 
        --danger: #ff4d6d;
    }

    /* Unified Font and Background */
    body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-blue); overflow-x: hidden; }

    header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 15px 5%; 
        background: white; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        position: sticky; 
        top: 0; 
        z-index: 1000; 
    }

    /* Home Page Logo Sync (Blue Dot + Navy Text) */
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-dot { 
        width: 15px; 
        height: 15px; 
        background: #4285f4; 
        border-radius: 50%; 
        animation: floatCloud 3s ease-in-out infinite;
    }
    .logo span { 
        font-weight: 700; 
        color: #1a237e; 
        font-size: 1.4rem; 
        letter-spacing: -0.5px; 
    }

    @keyframes floatCloud {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }

    .nav-links { display: flex; gap: 25px; align-items: center; }
    .nav-links a { text-decoration: none; color: #333; font-weight: 500; transition: 0.2s; }
    .nav-links a:hover { color: var(--primary-purple); }

    /* Fix: Dropdown Menu Bridge (Prevents menu from disappearing) */
    .dropdown { position: relative; display: inline-block; }
    .dropbtn { 
        background: none; 
        border: none; 
        font-family: 'Poppins', sans-serif; 
        font-weight: 500; 
        color: #333; 
        cursor: pointer; 
        padding: 15px 0; /* Creates a clickable/hoverable bridge to the menu */
        display: flex; 
        align-items: center; 
        gap: 5px; 
    }
    .dropdown-content { 
        display: none; 
        position: absolute; 
        right: 0; 
        background-color: white; 
        min-width: 170px; 
        box-shadow: 0px 8px 16px rgba(0,0,0,0.1); 
        border-radius: 12px; 
        z-index: 1100; 
        overflow: hidden; 
        top: 100%; /* Aligns perfectly with the bottom of the header */
    }
    .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; transition: 0.2s; }
    .dropdown-content a:hover { background-color: #f0f4ff; color: var(--primary-purple); }
    .dropdown:hover .dropdown-content { display: block; }

    /* Upload Card Styles */
    .upload-container { max-width: 500px; margin: 40px auto; padding: 20px; }
    .upload-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
    
    #dropArea { border: 2px dashed #ddd; padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
    #dropArea:hover { border-color: var(--primary-purple); background: #fbfbff; }
    
    .preview-img { width: 100%; border-radius: 15px; margin-top: 15px; display: none; max-height: 400px; object-fit: contain; }
    
    input, select { 
        width: 100%; padding: 12px; margin-top: 15px; border-radius: 12px; 
        border: 1px solid #eee; font-family: 'Poppins', sans-serif; box-sizing: border-box; 
        outline: none; transition: 0.3s;
    }
    input:focus, select:focus { border-color: var(--primary-purple); }
    
    .main-btn { 
        width: 100%; margin-top: 25px; padding: 15px; border-radius: 15px; 
        background: var(--primary-purple); color: white; border: none; 
        font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Poppins', sans-serif;
    }
    .main-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3); }
    .main-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Gallery Grid & Zoom Styles */
    .gallery-grid { columns: 3 250px; column-gap: 20px; width: 92%; max-width: 1200px; margin: 40px auto; }
    .sky-card { break-inside: avoid; margin-bottom: 20px; background: white; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
    
    .zoom-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 9000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
    }
    #zoomImg { max-width: 85vw; max-height: 70vh; border-radius: 15px; transition: transform 0.2s; object-fit: contain; }

    /* Zoom Pill Positioned at Bottom */
    .zoom-pill {
        position: fixed;
        bottom: 40px;
        background: white; 
        padding: 12px 28px; 
        border-radius: 50px;
        display: flex; 
        gap: 25px; 
        align-items: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        z-index: 9999;
    }
    .zoom-pill i { cursor: pointer; color: #1a237e; font-size: 1.4rem; transition: 0.2s; }
    .zoom-pill i:hover { color: var(--primary-purple); transform: scale(1.1); }
    .zoom-pill .fa-xmark { color: var(--danger); }

    /* Admin View Button at Bottom Right */
    #modToggle { 
        position: fixed; 
        bottom: 20px; 
        right: 20px; 
        padding: 10px 20px; 
        border-radius: 30px; 
        background: #1a237e; 
        color: white; 
        border: none; 
        cursor: pointer; 
        opacity: 0.7; 
        font-family: 'Poppins', sans-serif; 
        font-size: 0.8rem;
        transition: 0.3s;
    }
    #modToggle:hover { opacity: 1; background: var(--primary-purple); }

    @media (max-width: 768px) { .gallery-grid { columns: 2 160px; } }
</style>
</head>
<body>

<a href="index.html" class="logo">
    <div class="logo-dot"></div>
    <span>ShareTheSky</span>
</a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i></button>
            <div class="dropdown-content">
                <a href="upload.html">Upload</a>
                <a href="match.html">Sky Match</a>
                <a href="golden-hour.html">Golden Hour</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<main><div class="gallery-grid" id="grid"></div></main>

<div class="zoom-overlay" id="zoomOverlay">
    <div class="zoom-container">
        <img id="zoomImg" src="">
        <div class="zoom-pill">
            <i class="fa-solid fa-minus" onclick="changeZoom(-0.2)" title="Zoom Out"></i>
            <i class="fa-solid fa-plus" onclick="changeZoom(0.2)" title="Zoom In"></i>
            <i class="fa-solid fa-xmark" onclick="closeZoom()" title="Close"></i>
        </div>
    </div>
</div>

<button id="modToggle" onclick="toggleModMode()">Admin View</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://quunbblagrcwayyeiahv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dW5iYmxhZ3Jjd2F5eWVpYWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ4MjcsImV4cCI6MjA5MDk0MDgyN30.ylX47zmQXI_kAkY3wQUyJz0BqZ7xZ3hZARonm80Id3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const myId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", myId);
    let isModMode = false;
    let currentScale = 1;

    async function loadGallery() {
        const grid = document.getElementById('grid');
        let { data: photos, error } = await supabaseClient.from('photos').select('*')
            .or('is_reported.eq.false,is_reported.is.null')
            .order('id', { ascending: false });

        if (error) { grid.innerHTML = `<p style="text-align:center;">Connection Error.</p>`; return; }

        const { data: myLikes } = await supabaseClient.from('likes').select('photo_id').eq('user_id', myId);
        const myLikedIds = new Set(myLikes?.map(l => l.photo_id));

        grid.innerHTML = '';
        photos.forEach(photo => {
            const isOwner = photo.uploader_id === myId;
            const isLiked = myLikedIds.has(photo.id);
            const card = document.createElement('div');
            card.className = 'sky-card';
            card.innerHTML = `
                <div class="card-actions">
                    <button class="action-btn" onclick="reportSky(${photo.id})"><i class="fa-solid fa-flag"></i></button>
                    ${isOwner || isModMode ? `<button class="action-btn" onclick="deleteSky(${photo.id})" style="color:var(--danger);"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
                <img src="${photo.url}" onclick="openZoom('${photo.url}')">
                <div class="sky-info">
                    <h3 style="margin:0; font-size:0.9rem;">${photo.caption || 'Beautiful View'}</h3>
                    <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                        <i class="fa-heart ${isLiked ? 'fa-solid liked' : 'fa-regular'} like-btn" onclick="toggleLike(this, ${photo.id})"></i>
                        <span class="sky-tag">${photo.category}</span>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    window.openZoom = (url) => {
        const img = document.getElementById('zoomImg');
        img.src = url;
        currentScale = 1;
        img.style.transform = `scale(${currentScale})`;
        document.getElementById('zoomOverlay').style.display = 'flex';
    };

    window.changeZoom = (amount) => {
        currentScale += amount;
        if (currentScale < 0.5) currentScale = 0.5;
        if (currentScale > 3) currentScale = 3;
        document.getElementById('zoomImg').style.transform = `scale(${currentScale})`;
    };

    window.closeZoom = () => {
        document.getElementById('zoomOverlay').style.display = 'none';
    };

    window.toggleLike = async (el, photoId) => {
        if (el.classList.contains('liked')) {
            await supabaseClient.from('likes').delete().eq('photo_id', photoId).eq('user_id', myId);
            el.classList.replace('fa-solid', 'fa-regular'); el.classList.remove('liked');
        } else {
            await supabaseClient.from('likes').insert([{ photo_id: photoId, user_id: myId }]);
            el.classList.replace('fa-regular', 'fa-solid'); el.classList.add('liked');
        }
    };

    window.toggleModMode = () => { 
        const pass = prompt("Admin Pass:");
        if (pass === "skyadmin123") { isModMode = !isModMode; loadGallery(); } 
    };

    loadGallery();
</script>
</body>
</html>
