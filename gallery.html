<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html">
            <span class="logo-icon"></span>
            ShareTheSky
        </a>
    </h1>
    <div class="menu-toggle" id="mobile-menu">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav class="nav-links" id="nav-list">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About Me</a>
    </nav>
</header>

<main>
    <section class="gallery-header">
        <h2>Community Sky Gallery ☁️</h2>
    </section>

    <div id="galleryContainer" class="gallery-container"></div>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 1. Your Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const galleryContainer = document.getElementById("galleryContainer");

    // Get the unique ID for this browser to handle "Delete" permissions
    const mySkyUserId = localStorage.getItem("mySkyUserId");

    // 2. Real-time Gallery Sync
    const q = query(collection(db, "photos"), orderBy("date", "desc"));

    onSnapshot(q, (snapshot) => {
        galleryContainer.innerHTML = ""; // Clear current view
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            // Create the Card
            const card = document.createElement("div");
            card.className = "photo-card";

            // Determine if WE are the ones who uploaded this (to show delete button)
            const isOwner = data.uploaderId === mySkyUserId;

            card.innerHTML = `
                <img src="${data.url}" class="gallery-img" alt="Sky">
                <div class="photo-info">
                    <h3>${data.caption}</h3>
                    <p>${data.date}</p>
                    <button class="like-btn ${localStorage.getItem('liked_'+id) ? 'liked' : ''}" id="btn-${id}">
                        ❤️ <span id="count-${id}">${data.likes || 0}</span>
                    </button>
                    ${isOwner ? `<button class="delete-btn" id="del-${id}">Delete My Photo</button>` : ''}
                </div>
            `;

            galleryContainer.appendChild(card);

            // --- Like Button Logic ---
            const likeBtn = card.querySelector(`#btn-${id}`);
            likeBtn.onclick = async () => {
                const isLiked = likeBtn.classList.contains("liked");
                const newCount = isLiked ? (data.likes - 1) : (data.likes + 1);

                await updateDoc(doc(db, "photos", id), { likes: newCount });

                if (isLiked) {
                    localStorage.removeItem('liked_'+id);
                    likeBtn.classList.remove("liked");
                } else {
                    localStorage.setItem('liked_'+id, "true");
                    likeBtn.classList.add("liked");
                }
            };

            // --- Delete Button Logic ---
            if (isOwner) {
                card.querySelector(`#del-${id}`).onclick = async () => {
                    if (confirm("Are you sure you want to remove your sky photo?")) {
                        await deleteDoc(doc(db, "photos", id));
                    }
                };
            }
        });
    });
</script>

<script>
    // Mobile Menu Logic
    const menuToggle = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    }
</script>
</body>
</html>
