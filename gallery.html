<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery – ShareTheSky</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <h1 class="logo">ShareTheSky</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="upload.html">Upload</a>
            <a href="gallery.html">Gallery</a>
            <a href="creator.html">Creator</a>
        </nav>
    </header>

    <section class="gallery">
        <h2>Sky Gallery</h2>
        <div class="grid" id="galleryGrid"></div>
    </section>

<script>
const galleryContainer = document.getElementById("galleryGrid");

function loadGallery() {
    galleryContainer.innerHTML = "";

    let storedImages = JSON.parse(localStorage.getItem("images")) || [];

    storedImages.forEach((photo, index) => {
        const box = document.createElement("div");
        box.classList.add("photoBox");

        // Check like state
        const liked = photo.liked || false;

        box.innerHTML = `
            <img src="${photo.url}">
            <p class="caption">${photo.caption || "No Caption"}</p>
            <p class="date">Uploaded on: ${photo.date}</p>

            <button class="likeBtn" onclick="toggleLike(${index})">
                ${liked ? "💔 Unlike" : "❤️ Like"} (${photo.likes || 0})
            </button>

            <button class="deleteBtn" onclick="deletePhoto(${index})">
                Delete
            </button>
        `;

        galleryContainer.appendChild(box);
    });
}

// 🔥 TOGGLE LIKE / UNLIKE
function toggleLike(index) {
    let photos = JSON.parse(localStorage.getItem("images")) || [];

    if (!photos[index].likes) {
        photos[index].likes = 0;
    }

    // Toggle logic
    if (photos[index].liked) {
        photos[index].liked = false;
        photos[index].likes -= 1;
    } else {
        photos[index].liked = true;
        photos[index].likes += 1;
    }

    localStorage.setItem("images", JSON.stringify(photos));
    loadGallery();
}

// Delete
function deletePhoto(index) {
    let photos = JSON.parse(localStorage.getItem("images")) || [];

    photos.splice(index, 1);

    localStorage.setItem("images", JSON.stringify(photos));
    loadGallery();
}

// Load on start
loadGallery();
</script>

</body>
</html>
