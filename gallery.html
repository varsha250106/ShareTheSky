<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html"><span>📷</span> ShareTheSky</a>
    </h1>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About me</a>
    </nav>
</header>

<main class="gallery-container">
    <section class="gallery-header">
        <h2>Community Sky Gallery ☁️</h2>
        <p>Explore the beauty of the world, one sky at a time.</p>
    </section>

    <div id="photoGallery" class="pinterest-grid"></div>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const galleryContainer = document.getElementById("photoGallery");
    const mySkyUserId = localStorage.getItem("mySkyUserId");

    const q = query(collection(db, "photos"), orderBy("date", "desc"));

    onSnapshot(q, (snapshot) => {
        galleryContainer.innerHTML = ""; 
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            const isOwner = data.uploaderId === mySkyUserId;

            const card = document.createElement("div");
            card.className = "pin-card"; // Using pin-card for Pinterest styling

            card.innerHTML = `
                <div class="pin-image-wrapper">
                    <img src="${data.url}" class="pin-img" alt="Sky" onclick="openZoom('${data.url}')">
                    
                    <div class="pin-top-actions">
                        <a href="${data.url}" download="SkyPhoto.jpg" target="_blank" class="action-btn" title="Download">📥</a>
                        <button class="action-btn" onclick="openZoom('${data.url}')" title="Zoom">🔍</button>
                    </div>

                    <button class="pin-like-overlay ${localStorage.getItem('liked_'+id) ? 'liked' : ''}" id="like-${id}">
                        ❤️ <span>${data.likes || 0}</span>
                    </button>
                </div>
                
                <div class="pin-content">
                    <h3>${data.caption}</h3>
                    <div class="pin-footer">
                        <span>${data.date.split(',')[0]}</span>
                        ${isOwner ? `<button class="pin-delete" id="del-${id}">🗑️ Remove</button>` : ''}
                    </div>
                </div>
            `;

            galleryContainer.appendChild(card);

            // Like Logic
            card.querySelector(`#like-${id}`).onclick = async (e) => {
                e.stopPropagation();
                const btn = e.currentTarget;
                const isLiked = btn.classList.contains("liked");
                const newCount = isLiked ? (data.likes - 1) : (data.likes + 1);

                await updateDoc(doc(db, "photos", id), { likes: newCount });

                if (isLiked) {
                    localStorage.removeItem('liked_'+id);
                } else {
                    localStorage.setItem('liked_'+id, "true");
                }
            };

            // Delete Logic
            if (isOwner) {
                card.querySelector(`#del-${id}`).onclick = async () => {
                    if (confirm("Delete your sky photo?")) {
                        await deleteDoc(doc(db, "photos", id));
                    }
                };
            }
        });
    });

 window.openZoom = (url) => {
    let currentScale = 1;

    const overlay = document.createElement('div');
    overlay.className = 'zoom-overlay';
    overlay.id = 'activeZoom';
    
    overlay.innerHTML = `
        <div class="zoom-content">
            <img src="${url}" id="zoomedImage" class="zoomed-img">
        </div>

        <div class="zoom-controls">
            <button onclick="changeZoom(-0.25)" class="zoom-btn">➖</button>
            <span id="zoomLevel">100%</span>
            <button onclick="changeZoom(0.25)" class="zoom-btn">➕</button>
            <div style="border-left: 1px solid #ddd; height: 20px; margin: 0 5px;"></div>
            <button onclick="document.getElementById('activeZoom').remove()" class="zoom-close">Close</button>
        </div>
    `;
    
    document.body.appendChild(overlay);

    window.changeZoom = (amount) => {
        const img = document.getElementById('zoomedImage');
        const zoomText = document.getElementById('zoomLevel');
        
        currentScale += amount;
        
        // Boundaries to keep the image usable
        if (currentScale < 0.5) currentScale = 0.5;
        if (currentScale > 3) currentScale = 3;

        img.style.transform = `scale(${currentScale})`;
        zoomText.innerText = `${Math.round(currentScale * 100)}%`;
    };

    // Clicking the background still closes the zoom
    overlay.onclick = (e) => {
        if (e.target.id === 'activeZoom' || e.target.className === 'zoom-content') {
            overlay.remove();
        }
    };
};
</script>
</body>
</html>
