<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ShareTheSky</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html">
            <span>📷</span> ShareTheSky
        </a>
    </h1>
    <nav class="nav-links" id="nav-list">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About Me</a>
    </nav>
</header>

<main class="gallery-page">
    <section class="gallery-header">
        <h2>Community Sky Gallery ☁️</h2>
        <p>Explore the beauty of the world, one sky at a time.</p>
    </section>

    <div id="galleryContainer" class="pinterest-grid"></div>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script type="module">
    // ... (Keep your existing Firebase imports and config)

    onSnapshot(q, (snapshot) => {
        galleryContainer.innerHTML = ""; 
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            const isOwner = data.uploaderId === mySkyUserId;

            const card = document.createElement("div");
            card.className = "pin-card";

            card.innerHTML = `
                <div class="pin-image-wrapper">
                    <img src="${data.url}" class="pin-img" alt="Sky" onclick="openZoom('${data.url}')">
                    
                    <div class="pin-top-actions">
                        <a href="${data.url}" download="SkyPhoto.jpg" target="_blank" class="action-btn download-btn">📥</a>
                        <button class="action-btn zoom-btn" onclick="openZoom('${data.url}')">🔍</button>
                    </div>

                    <button class="pin-like-btn ${localStorage.getItem('liked_'+id) ? 'liked' : ''}" id="btn-${id}">
                        ❤️ <span>${data.likes || 0}</span>
                    </button>
                </div>
                
                <div class="pin-content">
                    <h3>${data.caption}</h3>
                    <div class="pin-footer">
                        <span>${data.date.split(',')[0]}</span>
                        ${isOwner ? `<button class="pin-delete" id="del-${id}">🗑️ Remove</button>` : ''}
                    </div>
                </div>
            `;

            galleryContainer.appendChild(card);

            // ... (Keep your Like and Delete event listener logic from previous code)
        });
    });

    // ZOOM FEATURE FUNCTION
    window.openZoom = (url) => {
        const overlay = document.createElement('div');
        overlay.id = 'zoomOverlay';
        overlay.innerHTML = `
            <div class="zoom-container">
                <span class="close-zoom" onclick="document.getElementById('zoomOverlay').remove()">×</span>
                <img src="${url}" class="zoomed-image">
            </div>
        `;
        document.body.appendChild(overlay);
    };
</script>
</body>
</html>
