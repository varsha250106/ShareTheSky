<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Flyer - ShareTheSky</title>
    <style>
        :root { 
            --mist-pink: rgba(255, 182, 213, 0.6); 
            --mist-cyan: rgba(180, 245, 255, 0.6); 
        }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #f0f4f8; font-family: 'Segoe UI', sans-serif; 
            touch-action: none; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #game-container { 
            position: relative; width: 450px; height: 85vh;
            max-width: 95vw; 
            /* Matches the gradient in the Sky Match image */
            background: linear-gradient(180deg, #ffffff 0%, #d4e3ff 100%); 
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); overflow: hidden;
            border: 6px solid white;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .ui { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; pointer-events: none; 
            color: #5a7fa3; z-index: 10;
        }

        #score-board { 
            position: absolute; top: 40px; font-size: 3.5rem; 
            font-weight: 200; letter-spacing: 8px; color: #5a7fa3;
            opacity: 0.8;
        }

        .card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
            padding: 45px; border-radius: 35px; text-align: center; 
            pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            width: 70%;
        }

        .btn { 
            background: #5a7fa3; color: white; border: none; padding: 16px 45px; 
            border-radius: 50px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 25px; 
            transition: 0.3s ease; 
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(90, 127, 163, 0.3); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">00</div>
            <div id="start-menu" class="card">
                <h1 style="font-weight: 400; margin: 0; letter-spacing: 2px;">CLOUD FLYER</h1>
                <p style="opacity: 0.7; font-size: 0.9rem; margin: 15px 0;">Glide through the matching mists</p>
                <button class="btn" onclick="startGame()">Fly Again</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    const dpr = window.devicePixelRatio || 1;
    let viewW, viewH;

    function resize() {
        viewW = container.clientWidth;
        viewH = container.clientHeight;
        canvas.width = viewW * dpr;
        canvas.height = viewH * dpr;
        ctx.scale(dpr, dpr);
    }
    resize();

    let flyer, mists, sparkles, gameActive, score, frame;

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = -Math.random() * 2 - 1;
            this.color = color; this.opacity = 0.5;
        }
        update() { this.x += this.speedX; this.opacity -= 0.01; }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Mist {
        constructor() {
            this.radius = 75;
            this.x = viewW + 120;
            this.y = Math.random() * (viewH - 250) + 125;
            this.type = Math.random() > 0.5 ? 'pink' : 'cyan';
            this.color = this.type === 'pink' ? 'rgba(255, 182, 213, 0.5)' : 'rgba(180, 245, 255, 0.5)';
            this.passed = false;
        }
        draw() {
            ctx.save();
            ctx.fillStyle = this.color;
            ctx.filter = 'blur(12px)';
            
            // Soft layered cloud clusters
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.arc(this.x + 30, this.y - 15, this.radius * 0.8, 0, Math.PI*2);
            ctx.arc(this.x - 20, this.y + 10, this.radius * 0.9, 0, Math.PI*2);
            ctx.fill();
            
            ctx.filter = 'none';
            ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.35, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() { this.x -= 2.6; }
    }

    class Flyer {
        constructor() { 
            this.x = 90; this.y = viewH / 2; 
            this.v = 0; 
            this.type = 'pink';
            this.color = 'rgba(255, 182, 213, 1)'; 
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 12; ctx.shadowColor = this.color;
            
            // Person/Glider Core
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.roundRect(this.x - 20, this.y - 4, 40, 8, 10);
            ctx.fill();
            
            // Aura Core
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x + 18, this.y, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += 0.15; 
            if (this.v > 5) this.v = 5; 
            this.y += this.v;
            if (frame % 4 === 0) sparkles.push(new Particle(this.x - 10, this.y, this.color));
            if (this.y > viewH || this.y < 0) endGame();
        }
    }

    function startGame() {
        resize();
        flyer = new Flyer(); mists = []; sparkles = [];
        score = 0; frame = 0; gameActive = true;
        startMenu.style.display = 'none'; scoreBoard.innerText = "00";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, viewW, viewH);

        flyer.update(); flyer.draw();

        if (frame % 130 === 0) mists.push(new Mist());

        mists.forEach((m, i) => {
            m.update(); m.draw();
            
            let dist = Math.hypot(flyer.x - m.x, flyer.y - m.y);
            if (!m.passed && dist < 65) {
                if (m.type === flyer.type) {
                    score++; m.passed = true;
                    // Color flip logic
                    flyer.type = (flyer.type === 'pink' ? 'cyan' : 'pink');
                    flyer.color = (flyer.type === 'pink' ? 'rgba(255, 182, 213, 1)' : 'rgba(180, 245, 255, 1)');
                    scoreBoard.innerText = score < 10 ? "0" + score : score;
                } else { endGame(); }
            }
            if (m.x < -200) mists.splice(i, 1);
        });

        sparkles.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) sparkles.splice(i, 1); });
        frame++; requestAnimationFrame(animate);
    }

    function endGame() {
        if (!gameActive) return;
        gameActive = false;
        startMenu.style.display = 'block';
        startMenu.innerHTML = `
            <h2 style="font-weight:400; color:#5a7fa3; margin:0;">DRIFT ENDED</h2>
            <p style="margin:10px 0; opacity:0.6;">Score: ${score}</p>
            <button class="btn" onclick="startGame()">Fly Again</button>
        `;
    }

    const jump = (e) => { if (gameActive) { if (e) e.preventDefault(); flyer.v = -4.1; } };
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(e); });
    window.addEventListener('touchstart', (e) => jump(e), { passive: false });
    window.addEventListener('mousedown', () => jump());
    window.addEventListener('resize', resize);
</script>
</body>
</html>
