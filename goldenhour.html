<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Hour - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --day: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            --golden: linear-gradient(to bottom, #ff7e5f 0%, #feb47b 100%);
            --night: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: #0f0f2d; color: white;
            height: 100vh; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; align-items: center;
        }

        /* Navigation - Fixed Z-Index */
        .exit-btn {
            position: absolute; top: 20px; left: 20px; 
            color: white; z-index: 2000; text-decoration: none; 
            background: rgba(0,0,0,0.6); padding: 10px 18px; 
            border-radius: 25px; font-size: 14px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        #game-container {
            position: relative; width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        #viewfinder {
            position: relative; width: 320px; height: 450px;
            border: 12px solid #1a1a1a; border-radius: 30px;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: var(--day); transition: background 1.5s ease;
        }

        .sun-moon {
            position: absolute; width: 50px; height: 50px;
            border-radius: 50%; left: 50%; transform: translateX(-50%);
            top: 60px; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .landscape {
            position: absolute; bottom: 0; width: 200%; height: 120px;
            background: linear-gradient(to top, #000 30%, transparent);
            animation: moveBg 15s linear infinite;
        }

        @keyframes moveBg {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .shutter-btn {
            width: 75px; height: 75px; border-radius: 50%;
            border: 4px solid white; background: transparent;
            cursor: pointer; margin-top: 30px;
            display: flex; justify-content: center; align-items: center;
        }

        .shutter-inner { width: 55px; height: 55px; background: white; border-radius: 50%; }

        #flash {
            position: absolute; inset: 0; background: white;
            opacity: 0; pointer-events: none; z-index: 100;
        }

        /* Polaroid Result */
        .polaroid {
            position: absolute; width: 270px; background: #fff;
            padding: 12px 12px 30px 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            transform: rotate(-3deg) translateY(800px);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1500; color: #222; text-align: center;
        }
        .polaroid.active { transform: rotate(-3deg) translateY(-20px); }
        
        /* Image Container to prevent blank spaces */
        .img-wrap {
            width: 100%; height: 270px; background: #eee; 
            border-radius: 2px; overflow: hidden;
        }
        .polaroid img { width: 100%; height: 100%; object-fit: cover; }

        .polaroid-label { 
            font-family: 'Brush Script MT', cursive; font-size: 1.6rem; 
            margin: 15px 0 10px; color: #444; 
        }

        .retry-btn {
            border: none; background: #333; color: white;
            padding: 8px 25px; border-radius: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn">
        <i class="fas fa-arrow-left"></i> Exit Game
    </a>

    <div id="game-container">
        <div id="viewfinder">
            <div id="flash"></div>
            <div id="sky-obj" class="sun-moon"></div>
            <div class="landscape"></div>
        </div>

        <div id="result-card" class="polaroid">
            <div class="img-wrap">
                <img id="photo-output" src="" alt="Snapshot">
            </div>
            <div id="photo-caption" class="polaroid-label">Snapshot</div>
            <button class="retry-btn" onclick="restart()">Take Another</button>
        </div>

        <button class="shutter-btn" id="capture">
            <div class="shutter-inner"></div>
        </button>
    </div>

<script>
    const viewfinder = document.getElementById('viewfinder');
    const skyObj = document.getElementById('sky-obj');
    const flash = document.getElementById('flash');
    const resultCard = document.getElementById('result-card');
    const photoOutput = document.getElementById('photo-output');
    const photoCaption = document.getElementById('photo-caption');
    const captureBtn = document.getElementById('capture');

    let time = 0;
    let active = true;

    // Updated gallery links (Higher reliability)
    const gallery = {
        day: "https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?auto=format&fit=crop&w=500&q=80",
        golden: "https://images.unsplash.com/photo-1470252649358-96940c9353d9?auto=format&fit=crop&w=500&q=80",
        night: "https://images.unsplash.com/photo-1472552947727-b40f05a3962d?auto=format&fit=crop&w=500&q=80"
    };

    // PRELOAD IMAGES to prevent the "blank snapshot" issue
    Object.values(gallery).forEach(src => {
        const img = new Image();
        img.src = src;
    });

    function update() {
        if (!active) return;
        time = (time + 1) % 600;

        if (time < 200) { 
            viewfinder.style.background = "var(--day)";
            skyObj.style.background = "#fff700";
            skyObj.style.top = "60px";
            skyObj.style.boxShadow = "0 0 40px #fff700";
        } 
        else if (time >= 200 && time < 400) { 
            viewfinder.style.background = "var(--golden)";
            skyObj.style.background = "#ffcc00";
            skyObj.style.top = "150px";
            skyObj.style.boxShadow = "0 0 60px #ff7e5f";
        } 
        else { 
            viewfinder.style.background = "var(--night)";
            skyObj.style.background = "#f0f0f0";
            skyObj.style.top = "40px";
            skyObj.style.boxShadow = "0 0 20px #fff";
        }
        requestAnimationFrame(update);
    }

    captureBtn.onclick = () => {
        if (!active) return;
        active = false;

        flash.style.opacity = "1";
        setTimeout(() => flash.style.opacity = "0", 150);

        // Logic check
        if (time >= 220 && time < 380) {
            photoOutput.src = gallery.golden;
            photoCaption.innerText = "Perfect Golden Hour";
        } else if (time < 220) {
            photoOutput.src = gallery.day;
            photoCaption.innerText = "Morning Light";
        } else {
            photoOutput.src = gallery.night;
            photoCaption.innerText = "Starlit Night";
        }

        resultCard.classList.add('active');
    };

    function restart() {
        resultCard.classList.remove('active');
        setTimeout(() => {
            time = 0;
            active = true;
            update();
        }, 300);
    }

    update();
</script>
</body>
</html>
