<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Flyer - ShareTheSky</title>
    <style>
        :root { 
            --mist-pink: rgba(255, 126, 179, 0.45); 
            --mist-cyan: rgba(122, 252, 255, 0.45); 
        }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #0b141a; font-family: 'Montserrat', 'Segoe UI', sans-serif; 
            touch-action: none; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #game-container { 
            position: relative; width: 450px; height: 85vh;
            max-width: 95vw; background: #000; border-radius: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6); overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .ui { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; pointer-events: none; 
            color: white; z-index: 10;
        }

        #score-board { 
            position: absolute; top: 40px; font-size: 3.5rem; 
            font-weight: 200; letter-spacing: 8px; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); 
        }

        .card { 
            background: rgba(15, 25, 35, 0.85); backdrop-filter: blur(20px); 
            padding: 45px; border-radius: 35px; text-align: center; 
            pointer-events: auto; border: 1px solid rgba(255,255,255,0.08); 
            width: 75%;
        }

        .btn { 
            background: #fff; border: none; padding: 16px 45px; 
            border-radius: 50px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 25px; 
            transition: all 0.3s ease; 
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">00</div>
            <div id="start-menu" class="card">
                <h1 style="font-weight: 200; margin: 0; letter-spacing: 4px;">CLOUD FLYER</h1>
                <p style="opacity: 0.5; font-size: 0.9rem; margin: 15px 0;">Glide through matching mists</p>
                <button class="btn" onclick="startGame()">Fly Again</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    const dpr = window.devicePixelRatio || 1;
    let viewW, viewH;

    function resize() {
        viewW = container.clientWidth;
        viewH = container.clientHeight;
        canvas.width = viewW * dpr;
        canvas.height = viewH * dpr;
        ctx.scale(dpr, dpr);
    }
    resize();

    let flyer, mistyPortals, sparkles, gameActive, score, frame;

    class Sparkle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = -Math.random() * 3 - 1;
            this.color = color; this.opacity = 0.7;
        }
        update() { this.x += this.speedX; this.opacity -= 0.015; }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class MistyPortal { // MODIFIED: Pinterest-Style Soft Cloud
        constructor() {
            this.width = 120; // Wide broad cloud
            this.height = 160;
            this.x = viewW + 100;
            this.y = Math.random() * (viewH - 300) + 150;
            this.type = Math.random() > 0.5 ? 'pink' : 'cyan';
            this.color = this.type === 'pink' ? 'rgba(255, 126, 179, 0.4)' : 'rgba(122, 252, 255, 0.4)';
            this.passed = false;
        }
        draw() {
            ctx.save();
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 40;
            ctx.shadowColor = this.color;
            
            // Pinterest-Style Layered Cloud Shape
            ctx.beginPath();
            // Main body
            ctx.ellipse(this.x, this.y, this.width/2, this.height/2, 0, 0, Math.PI*2);
            // Decorative soft puffs for organic look
            ctx.ellipse(this.x + 25, this.y - 15, this.width/2.5, this.height/2.5, 0, 0, Math.PI*2);
            ctx.ellipse(this.x - 20, this.y + 10, this.width/2.2, this.height/2.2, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Soft white core for depth
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, this.width/4.5, this.height/4.5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() { this.x -= 2.8; }
    }

    class Flyer { // MODIFIED: Cinematic Flyer
        constructor() { 
            this.x = 90; 
            this.y = viewH / 2; 
            this.v = 0; 
            this.type = 'pink';
            this.color = 'rgba(255, 126, 179, 0.9)'; 
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            
            // The Sleek Flyer Shape (Pill shape to represent the glider body)
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.beginPath();
            ctx.roundRect(this.x - 25, this.y - 4, 50, 8, 10);
            ctx.fill();
            
            // Color changing core (the current "aura" color)
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x + 22, this.y, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += 0.14; // Low floaty gravity
            if (this.v > 5.5) this.v = 5.5; // Terminal velocity
            this.y += this.v;
            
            // Trail particles matching the current aura
            if (frame % 3 === 0) sparkles.push(new Sparkle(this.x - 15, this.y, this.color));
            
            // Responsive Screen Bounds
            if (this.y > viewH || this.y < 0) endGame();
        }
    }

    function startGame() {
        resize();
        flyer = new Flyer(); mistyPortals = []; sparkles = [];
        score = 0; frame = 0; gameActive = true;
        startMenu.style.display = 'none'; scoreBoard.innerText = "00";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        
        // Dynamic Sky Background
        let grad = ctx.createLinearGradient(0, 0, 0, viewH);
        grad.addColorStop(0, '#0f2027'); grad.addColorStop(1, '#203a43');
        ctx.fillStyle = grad; ctx.fillRect(0,0, viewW, viewH);

        flyer.update(); flyer.draw();

        if (frame % 120 === 0) mistyPortals.push(new MistyPortal());

        mistyPortals.forEach((p, i) => {
            p.update(); p.draw();
            
            // Collision Check: Are we passing *inside* the wider cloud shape?
            if (!p.passed && flyer.x > p.x - 50 && flyer.x < p.x + 50) {
                // Vertical window
                if (Math.abs(p.y - flyer.y) < 70) {
                    if (p.type === flyer.type) {
                        score++; p.passed = true;
                        // COLOR CHANGE MAGIC: Swap aura for next challenge
                        flyer.type = (flyer.type === 'pink' ? 'cyan' : 'pink');
                        flyer.color = (flyer.type === 'pink' ? 'rgba(255, 126, 179, 0.9)' : 'rgba(122, 252, 255, 0.9)');
                        scoreBoard.innerText = score < 10 ? "0" + score : score;
                    } else { endGame(); }
                }
            }
            if (p.x < -200) mistyPortals.splice(i, 1);
        });

        sparkles.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) sparkles.splice(i, 1); });
        frame++; requestAnimationFrame(animate);
    }

    function endGame() {
        if (!gameActive) return;
        gameActive = false;
        setTimeout(() => {
            startMenu.style.display = 'block';
            startMenu.innerHTML = `
                <h2 style="font-weight:200; margin:0; letter-spacing:2px;">DRIFT ENDED</h2>
                <p style="margin:10px 0; opacity:0.5;">Score: ${score}</p>
                <button class="btn" onclick="startGame()">Fly Again</button>
            `;
        }, 600);
    }

    const triggerJump = (e) => {
        if (gameActive) {
            if (e) e.preventDefault();
            flyer.v = -4.2; // Gentle lift
        }
    };

    // MULTI-DEVICE CONTROLS
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') triggerJump(e); });
    window.addEventListener('touchstart', (e) => { triggerJump(e); }, { passive: false });
    window.addEventListener('mousedown', () => triggerJump());
    window.addEventListener('resize', resize);
</script>
</body>
</html>
