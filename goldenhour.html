<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Chaser - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sky-top: #4facfe; --sky-bottom: #00f2fe;
            --pink: #ff7eb3; --cyan: #7afcff; --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: white; touch-action: none;
        }

        .exit-btn {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none; background: rgba(0,0,0,0.2);
            padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 100;
        }

        #game-container { position: relative; width: 400px; height: 600px; max-width: 100vw; max-height: 85vh; }

        canvas {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: block; width: 100%; height: 100%;
        }

        .ui-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; pointer-events: none;
        }

        #score-board { position: absolute; top: 20px; font-size: 2.5rem; font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .start-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 25px; text-align: center; pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn {
            background: white; color: #333; border: none; padding: 12px 30px;
            border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit</a>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div id="score-board">0</div>
            <div id="start-menu" class="start-card">
                <h2 style="margin: 0;">Cloud Chaser</h2>
                <p>Tap to float. Match your cloud's<br>glow to the Aura Rings!</p>
                <button class="btn" onclick="startGame()">Start Flight</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    // High DPI Retina display support
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 400 * dpr;
    canvas.height = 600 * dpr;
    ctx.scale(dpr, dpr);

    // Game Variables
    let cloud, rings, sparkles, gameActive, score, frame;
    const gravity = 0.23;
    const lift = -5.3;
    const colors = ['#ff7eb3', '#7afcff']; // Pink and Cyan

    // 1. Particle Class for Sparkles
    class Sparkle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 4 + 1; // Random size
            this.speedX = Math.random() * -1.5 - 0.5; // Drift back
            this.speedY = Math.random() * 0.8 - 0.4;
            this.color = color;
            this.opacity = 0.8;
            this.fadeRate = 0.025; // How fast it fades
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.color;
            
            // Draw a tiny star/sparkle shape
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.opacity -= this.fadeRate;
        }
    }

    class Cloud {
        constructor() {
            this.x = 60;
            this.y = 300;
            this.velocity = 0;
            this.size = 28;
            this.color = colors[0];
        }

        draw() {
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = this.color;
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
            
            // Draw wispy cloud body
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.arc(this.x + 18, this.y - 10, this.size * 0.7, 0, Math.PI * 2);
            ctx.arc(this.x + 18, this.y + 10, this.size * 0.7, 0, Math.PI * 2);
            ctx.fill();

            // Glow Ring
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.restore();
        }

        update() {
            this.velocity += gravity;
            this.y += this.velocity;
            
            // 2. Spawn 1-2 new sparkles behind the cloud on every frame
            if (frame % 2 === 0) sparkles.push(new Sparkle(this.x, this.y, this.color));
            
            if (this.y > (canvas.height / dpr)) endGame();
            if (this.y < 0) { this.y = 0; this.velocity = 0; }
        }
    }

    class Ring {
        constructor() {
            this.x = (canvas.width / dpr) + 50;
            this.y = Math.random() * ((canvas.height / dpr) - 200) + 100;
            this.width = 10;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.passed = false;
        }

        draw() {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.setLineDash([10, 15]); // Aura effect
            
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, 25, 65, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        update() { this.x -= 3.5; }
    }

    function startGame() {
        cloud = new Cloud();
        rings = [];
        sparkles = []; // 3. Reset Particle Array
        score = 0;
        frame = 0;
        gameActive = true;
        startMenu.style.display = 'none';
        scoreBoard.innerText = "0";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

        // Update & Draw Sparkles first (behind the cloud)
        sparkles.forEach((s, index) => {
            s.update();
            s.draw();
            if (s.opacity <= 0 || s.x < -10) sparkles.splice(index, 1);
        });

        // Update Cloud
        cloud.update();
        cloud.draw();

        // Spawn Rings
        if (frame % 100 === 0) rings.push(new Ring());

        // Update Rings
        rings.forEach((ring, index) => {
            ring.update();
            ring.draw();

            // Collision Detection
            if (!ring.passed && ring.x < cloud.x + 30) {
                if (Math.abs(ring.y - cloud.y) < 70) {
                    if (cloud.color === ring.color) {
                        score++;
                        scoreBoard.innerText = score;
                        ring.passed = true;
                        cloud.color = (cloud.color === colors[0]) ? colors[1] : colors[0];
                    } else { endGame(); }
                }
            }
            if (ring.x < -100) rings.splice(index, 1);
        });

        frame++;
        requestAnimationFrame(animate);
    }

    function endGame() {
        gameActive = false;
        startMenu.style.display = 'block';
        startMenu.innerHTML = `
            <h2 style="margin: 0; color: #ff4b2b;">Lost in the Mist</h2>
            <p>Score: ${score}</p>
            <button class="btn" onclick="startGame()">Try Again</button>
        `;
    }

    // Input Handling
    const handleInput = () => { if (gameActive) cloud.velocity = lift; };
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInput(); });
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });

</script>
</body>
</html>
