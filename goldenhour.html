<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Charades - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a12;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #bb86fc;
            --success: #03dac6;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .exit-btn {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none;
            background: var(--glass); padding: 10px 18px;
            border-radius: 25px; font-size: 14px; backdrop-filter: blur(10px);
        }

        header { margin-top: 50px; text-align: center; }

        /* The AI Image Container */
        .image-container {
            position: relative; width: 100%; max-width: 400px;
            aspect-ratio: 1/1; margin: 25px 0;
            border-radius: 20px; overflow: hidden;
            border: 4px solid var(--glass);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #ai-image { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        /* Word Cloud / Chips */
        .word-grid {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 12px; max-width: 500px; margin-bottom: 30px;
        }

        .word-chip {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px; border-radius: 15px; cursor: pointer;
            transition: 0.3s; font-weight: 500;
        }

        .word-chip:hover { background: rgba(255,255,255,0.2); }
        .word-chip.selected { 
            background: var(--accent); color: #000; border-color: var(--accent); 
            transform: translateY(-3px);
        }

        /* UI Feedback */
        #status-msg { height: 30px; margin-bottom: 10px; font-weight: bold; }
        
        .controls { display: flex; gap: 15px; }

        .btn {
            background: transparent; border: 2px solid var(--accent);
            color: var(--accent); padding: 12px 30px; border-radius: 25px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        .btn:hover { background: var(--accent); color: #000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Level Indicator */
        .level-dots { display: flex; gap: 8px; margin-top: 20px; }
        .dot { width: 8px; height: 8px; background: var(--glass); border-radius: 50%; }
        .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit</a>

    <header>
        <h1>Sky Charades</h1>
        <p style="opacity: 0.7;">Guess the 3 keywords used to generate this sky.</p>
    </header>

    <div class="image-container">
        <img id="ai-image" src="" alt="AI Sky Rendering">
    </div>

    <div id="status-msg"></div>

    <div class="word-grid" id="word-grid">
        </div>

    <div class="controls">
        <button class="btn" id="submit-btn" onclick="checkGuess()">Verify Prompt</button>
    </div>

    <div class="level-dots" id="level-dots"></div>

<script>
    const levels = [
        {
            img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=600",
            correct: ["Neon", "Lightning", "90s Anime"],
            others: ["Cloudy", "Ocean", "Vintage", "Cyberpunk", "Sunset", "Realistic"]
        },
        {
            img: "https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?w=600",
            correct: ["Cinematic", "Mist", "Mountains"],
            others: ["Red", "Digital", "Space", "Pastel", "Rainy", "Flat Design"]
        },
        {
            img: "https://images.unsplash.com/photo-1464802686167-b939a67e06a1?w=600",
            correct: ["Starry", "Galaxy", "Ethereal"],
            others: ["Urban", "Daylight", "Thunder", "Minimalist", "Yellow", "Grainy"]
        }
    ];

    let currentLevel = 0;
    let selectedWords = [];

    function initGame() {
        selectedWords = [];
        const level = levels[currentLevel];
        const wordGrid = document.getElementById('word-grid');
        const status = document.getElementById('status-msg');
        
        // Reset UI
        status.innerText = "";
        document.getElementById('ai-image').src = level.img;
        wordGrid.innerHTML = "";
        
        // Create Dots
        const dots = document.getElementById('level-dots');
        dots.innerHTML = levels.map((_, i) => `<div class="dot ${i === currentLevel ? 'active' : ''}"></div>`).join('');

        // Shuffle all words
        const allWords = [...level.correct, ...level.others].sort(() => Math.random() - 0.5);

        allWords.forEach(word => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerText = word;
            chip.onclick = () => toggleWord(chip, word);
            wordGrid.appendChild(chip);
        });
    }

    function toggleWord(el, word) {
        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            selectedWords = selectedWords.filter(w => w !== word);
        } else if (selectedWords.length < 3) {
            el.classList.add('selected');
            selectedWords.push(word);
        }
    }

    function checkGuess() {
        if (selectedWords.length < 3) {
            document.getElementById('status-msg').innerText = "Pick 3 keywords!";
            return;
        }

        const level = levels[currentLevel];
        const isCorrect = selectedWords.every(w => level.correct.includes(w));

        const status = document.getElementById('status-msg');
        if (isCorrect) {
            status.style.color = "var(--success)";
            status.innerText = "Prompt Matched! ✨";
            
            setTimeout(() => {
                currentLevel++;
                if (currentLevel < levels.length) {
                    initGame();
                } else {
                    alert("You are a Master Prompt Engineer!");
                    currentLevel = 0;
                    initGame();
                }
            }, 1500);
        } else {
            status.style.color = "#ff4b2b";
            status.innerText = "Incorrect keywords. Try again.";
            // Deselect all
            setTimeout(() => {
                initGame();
            }, 1000);
        }
    }

    initGame();
</script>
</body>
</html>
