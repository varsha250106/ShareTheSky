<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Hoop - ShareTheSky</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #f0f4f8; font-family: 'Segoe UI', sans-serif; 
            touch-action: none; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #game-container { 
            position: relative; width: 450px; height: 85vh;
            max-width: 95vw; 
            background: linear-gradient(180deg, #ffffff 0%, #d4e3ff 100%); 
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); overflow: hidden;
            border: 6px solid white;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .ui { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; pointer-events: none; 
            color: #5a7fa3; z-index: 10;
        }

        #score-board { 
            position: absolute; top: 40px; font-size: 3.5rem; 
            font-weight: 200; letter-spacing: 8px; color: #5a7fa3;
            opacity: 0.6;
        }

        .card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
            padding: 45px; border-radius: 35px; text-align: center; 
            pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            width: 70%;
        }

        .btn { 
            background: #5a7fa3; color: white; border: none; padding: 16px 45px; 
            border-radius: 50px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 25px; 
            transition: 0.3s ease; 
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">00</div>
            <div id="start-menu" class="card">
                <h1 style="font-weight: 400; margin: 0; letter-spacing: 2px;">CLOUD HOOP</h1>
                <p style="opacity: 0.7; font-size: 0.9rem; margin: 15px 0;">Press SPACE or Tap to drift</p>
                <button class="btn" onclick="startGame()">Start Flight</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    const dpr = window.devicePixelRatio || 1;
    let viewW, viewH;

    function resize() {
        viewW = container.clientWidth;
        viewH = container.clientHeight;
        canvas.width = viewW * dpr;
        canvas.height = viewH * dpr;
        ctx.scale(dpr, dpr);
    }
    resize();

    let skyCloud, hoops, sparkles, gameActive, score, frame;

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 4 + 1;
            this.speedX = -Math.random() * 2 - 1;
            this.color = color; this.opacity = 0.4;
        }
        update() { this.x += this.speedX; this.opacity -= 0.015; }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Hoop {
        constructor() {
            this.radius = 65;
            this.x = viewW + 120;
            this.y = Math.random() * (viewH - 220) + 110;
            this.type = Math.random() > 0.5 ? 'pink' : 'cyan';
            this.color = this.type === 'pink' ? '#ffb6d5' : '#b4f5ff';
            this.passed = false;
        }
        draw() {
            ctx.save();
            ctx.lineWidth = 12;
            ctx.strokeStyle = this.color;
            ctx.lineCap = 'round';
            // Aesthetic dashed loop
            ctx.setLineDash([20, 15]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.stroke();
            
            // Soft inner glow
            ctx.globalAlpha = 0.15;
            ctx.lineWidth = 25;
            ctx.stroke();
            ctx.restore();
        }
        update() { this.x -= 2.7; }
    }

    class SkyCloud {
        constructor() { 
            this.x = 90; this.y = viewH / 2; 
            this.v = 0; 
            this.type = 'pink';
            this.color = '#ffb6d5'; 
        }
        draw() {
            ctx.save();
            ctx.fillStyle = "white";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.05)";
            
            // Draw a fluffy "sky" cloud shape
            ctx.beginPath();
            ctx.arc(this.x, this.y, 18, 0, Math.PI*2); // Center
            ctx.arc(this.x - 15, this.y + 5, 14, 0, Math.PI*2); // Left puff
            ctx.arc(this.x + 15, this.y + 5, 14, 0, Math.PI*2); // Right puff
            ctx.arc(this.x + 5, this.y - 12, 12, 0, Math.PI*2); // Top puff
            ctx.fill();

            // Color-indicator core (the "soul" of the cloud)
            ctx.fillStyle = this.color;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += 0.17; 
            if (this.v > 5.5) this.v = 5.5; 
            this.y += this.v;
            // Trails match current color
            if (frame % 4 === 0) sparkles.push(new Particle(this.x - 10, this.y, this.color));
            if (this.y > viewH || this.y < 0) endGame();
        }
    }

    function startGame() {
        resize();
        skyCloud = new SkyCloud(); hoops = []; sparkles = [];
        score = 0; frame = 0; gameActive = true;
        startMenu.style.display = 'none'; scoreBoard.innerText = "00";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, viewW, viewH);

        skyCloud.update(); skyCloud.draw();

        if (frame % 115 === 0) hoops.push(new Hoop());

        hoops.forEach((h, i) => {
            h.update(); h.draw();
            
            let dist = Math.hypot(skyCloud.x - h.x, skyCloud.y - h.y);
            if (!h.passed && dist < 55) {
                if (h.type === skyCloud.type) {
                    score++; h.passed = true;
                    // Color transition
                    skyCloud.type = (skyCloud.type === 'pink' ? 'cyan' : 'pink');
                    skyCloud.color = (skyCloud.type === 'pink' ? '#ffb6d5' : '#b4f5ff');
                    scoreBoard.innerText = score < 10 ? "0" + score : score;
                } else { endGame(); }
            }
            if (h.x < -150) hoops.splice(i, 1);
        });

        sparkles.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) sparkles.splice(i, 1); });
        frame++; requestAnimationFrame(animate);
    }

    function endGame() {
        if (!gameActive) return;
        gameActive = false;
        startMenu.style.display = 'block';
        startMenu.innerHTML = `<h2 style="font-weight:400; color:#5a7fa3; margin:0;">SKY DRIFT ENDED</h2><p style="margin:10px 0; opacity:0.6;">Score: ${score}</p><button class="btn" onclick="startGame()">Fly Again</button>`;
    }

    // CONTROLS: SPACEBAR + TOUCH/MOUSE
    const jump = (e) => { 
        if (gameActive) { 
            if (e && e.type !== 'mousedown') e.preventDefault(); 
            skyCloud.v = -4.3; 
        } 
    };

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (!gameActive && startMenu.style.display !== 'none') {
                startGame();
            } else {
                jump(e);
            }
        }
    });

    window.addEventListener('touchstart', (e) => jump(e), { passive: false });
    window.addEventListener('mousedown', (e) => jump(e));
    window.addEventListener('resize', resize);
</script>
</body>
</html>
