<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Matchmaker - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #121212;
            --accent: #ff7e5f;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .exit-btn {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 18px;
            border-radius: 25px; font-size: 14px; backdrop-filter: blur(5px);
        }

        header { margin-top: 60px; text-align: center; }

        /* The Sky Photo */
        #target-sky {
            width: 320px; height: 180px;
            border-radius: 15px; object-fit: cover;
            border: 4px solid #333; margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Choice Grid */
        .choices-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px; width: 90%; max-width: 600px; padding-bottom: 40px;
        }

        .room-choice {
            background: #1e1e1e; border-radius: 15px;
            padding: 15px; cursor: pointer;
            transition: 0.3s; border: 2px solid transparent;
            text-align: center;
        }

        .room-choice:hover { transform: translateY(-5px); background: #252525; }
        .room-choice.correct { border-color: #27ae60; background: #1a2e20; }
        .room-choice.wrong { border-color: #e74c3c; opacity: 0.6; }

        /* SVG Styling */
        .room-svg { width: 100%; height: auto; margin-bottom: 10px; }
        .room-svg path { transition: fill 0.5s ease; }

        #message { font-weight: bold; margin: 15px 0; height: 24px; }
        
        .next-btn {
            background: var(--accent); color: white; border: none;
            padding: 12px 30px; border-radius: 25px; cursor: pointer;
            font-weight: bold; display: none; margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit</a>

    <header>
        <h1>Aesthetic Matchmaker</h1>
        <p style="opacity: 0.7;">Which room was inspired by this sky?</p>
    </header>

    <img id="target-sky" src="" alt="Target Sky">

    <div id="message"></div>

    <div class="choices-container" id="choices">
        </div>

    <button class="next-btn" id="next-btn" onclick="setupGame()">Next Challenge</button>

<script>
    const levels = [
        {
            sky: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500",
            palette: { wall: "#4facfe", sofa: "#ffffff", rug: "#00f2fe" },
            name: "Ocean Breeze"
        },
        {
            sky: "https://images.unsplash.com/photo-1470252649358-96940c9353d9?w=500",
            palette: { wall: "#ff7e5f", sofa: "#2c3e50", rug: "#feb47b" },
            name: "Desert Dusk"
        },
        {
            sky: "https://images.unsplash.com/photo-1532978341072-c96b0015a396?w=500",
            palette: { wall: "#0f0c29", sofa: "#302b63", rug: "#ffffff" },
            name: "Midnight Minimal"
        }
    ];

    const wrongPalettes = [
        { wall: "#2ecc71", sofa: "#27ae60", rug: "#f1c40f" },
        { wall: "#e74c3c", sofa: "#c0392b", rug: "#34495e" },
        { wall: "#8e44ad", sofa: "#2c3e50", rug: "#ecf0f1" }
    ];

    let canClick = true;

    // The SVG Blueprint for the room
    function getRoomSVG(colors, id) {
        return `
        <svg class="room-svg" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 10 H190 V110 H10 Z" fill="${colors.wall}" />
            <path d="M10 110 H190 V140 H10 Z" fill="#333" />
            <path d="M40 120 H160 V135 H40 Z" fill="${colors.rug}" />
            <path d="M50 80 H150 V115 H50 Z" fill="${colors.sofa}" />
            <path d="M50 65 H150 V80 H50 Z" fill="${colors.sofa}" opacity="0.8" />
            <rect x="140" y="30" width="30" height="40" fill="white" opacity="0.2" />
        </svg>`;
    }

    function setupGame() {
        canClick = true;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('message').innerText = "";
        document.getElementById('message').style.color = "white";
        
        const level = levels[Math.floor(Math.random() * levels.length)];
        document.getElementById('target-sky').src = level.sky;

        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = "";

        // Combine correct palette with 2 random wrong ones
        let options = [
            { palette: level.palette, isCorrect: true },
            { palette: wrongPalettes[0], isCorrect: false },
            { palette: wrongPalettes[1], isCorrect: false }
        ].sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'room-choice';
            card.innerHTML = getRoomSVG(opt.palette);
            card.onclick = () => handleChoice(card, opt.isCorrect);
            choicesDiv.appendChild(card);
        });
    }

    function handleChoice(element, isCorrect) {
        if (!canClick) return;
        canClick = false;

        if (isCorrect) {
            element.classList.add('correct');
            document.getElementById('message').innerText = "Perfect Match! ✨";
            document.getElementById('message').style.color = "#27ae60";
        } else {
            element.classList.add('wrong');
            document.getElementById('message').innerText = "Not quite the right vibe...";
            document.getElementById('message').style.color = "#e74c3c";
        }
        
        document.getElementById('next-btn').style.display = 'block';
    }

    setupGame();
</script>
</body>
</html>
