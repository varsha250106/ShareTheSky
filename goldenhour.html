<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vapor Drift - ShareTheSky</title>
    <style>
        :root { --pink: #ff7eb3; --cyan: #7afcff; }
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: #0b141a; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #game-container { 
            position: relative; 
            width: 450px; 
            height: 85vh; /* Responsive height to fit your laptop screen */
            max-width: 95vw; 
            background: #000;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }

        .ui { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            pointer-events: none; 
            color: white; 
            z-index: 10;
        }

        #score-board { 
            position: absolute; 
            top: 40px; 
            font-size: 3.5rem; 
            font-weight: 200; 
            letter-spacing: 8px; 
            text-shadow: 0 0 20px rgba(122, 252, 255, 0.5); 
        }

        .card { 
            background: rgba(10, 20, 30, 0.85); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            pointer-events: auto; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 70%;
        }

        .btn { 
            background: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 50px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn:hover { 
            transform: scale(1.1); 
            box-shadow: 0 0 30px var(--cyan); 
        }

        #overdrive-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">00</div>
            <div id="start-menu" class="card">
                <h1 style="font-weight: 200; margin: 0; letter-spacing: 4px;">VAPOR DRIFT</h1>
                <p style="opacity: 0.6; font-size: 0.9rem; margin: 15px 0;">Spacebar or Tap to Glide</p>
                <button class="btn" onclick="startGame()">Enter the Sky</button>
            </div>
            <div id="overdrive-hint">Match colors to drift through</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    // High DPI Scaling for crisp visuals on your laptop
    const dpr = window.devicePixelRatio || 1;
    let viewW, viewH;

    function resize() {
        viewW = container.clientWidth;
        viewH = container.clientHeight;
        canvas.width = viewW * dpr;
        canvas.height = viewH * dpr;
        ctx.scale(dpr, dpr);
    }
    resize();

    let cloud, portals, sparkles, gameActive, score, frame;

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 2 + 1;
            this.speedX = -Math.random() * 4 - 2;
            this.speedY = (Math.random() - 0.5) * 2;
            this.color = color; this.opacity = 1;
        }
        update() { 
            this.x += this.speedX; 
            this.y += this.speedY;
            this.opacity -= 0.02; 
        }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Portal {
        constructor() {
            this.width = 90;
            this.height = 140;
            this.x = viewW + 50;
            // Spawn safely within the responsive height
            this.y = Math.random() * (viewH - 250) + 125;
            this.color = Math.random() > 0.5 ? '#ff7eb3' : '#7afcff';
            this.passed = false;
        }
        draw() {
            ctx.save();
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            
            // Outer Frame
            ctx.strokeRect(this.x, this.y - this.height/2, this.width, this.height);
            
            // Internal Mist
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y - this.height/2, this.width, this.height);
            ctx.restore();
        }
        update() { this.x -= 3.2; }
    }

    class Cloud {
        constructor() { 
            this.x = 80; 
            this.y = viewH / 2; 
            this.v = 0; 
            this.color = '#ff7eb3'; 
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = this.color;
            
            // Vapor Streak Shape
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.beginPath();
            ctx.roundRect(this.x - 35, this.y - 5, 70, 10, 10);
            ctx.fill();
            
            // Core Glow
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x + 25, this.y, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += 0.14; // Low floaty gravity
            if (this.v > 5.5) this.v = 5.5; // Terminal velocity
            this.y += this.v;
            
            // Trail particles
            if (frame % 2 === 0) sparkles.push(new Particle(this.x - 20, this.y, this.color));
            
            // Responsive Screen Bounds
            if (this.y > viewH || this.y < 0) endGame();
        }
    }

    function startGame() {
        resize(); // Recalculate on every start
        cloud = new Cloud(); portals = []; sparkles = [];
        score = 0; frame = 0; gameActive = true;
        startMenu.style.display = 'none'; 
        scoreBoard.innerText = "00";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        
        // Deep Sky Gradient
        let grad = ctx.createLinearGradient(0, 0, 0, viewH);
        grad.addColorStop(0, '#0f2027'); 
        grad.addColorStop(1, '#203a43');
        ctx.fillStyle = grad; 
        ctx.fillRect(0,0, viewW, viewH);

        cloud.update(); cloud.draw();

        if (frame % 110 === 0) portals.push(new Portal());

        portals.forEach((p, i) => {
            p.update(); p.draw();
            
            // Collision: Check if Streak is inside the Portal Width
            if (!p.passed && cloud.x > p.x && cloud.x < p.x + p.width) {
                // Vertical check
                if (Math.abs(p.y - cloud.y) < p.height/2) {
                    if (p.color === cloud.color) {
                        score++; 
                        p.passed = true;
                        // Swap colors for next challenge
                        cloud.color = (cloud.color === '#ff7eb3' ? '#7afcff' : '#ff7eb3');
                        scoreBoard.innerText = score < 10 ? "0" + score : score;
                    } else { endGame(); }
                }
            }
            if (p.x < -150) portals.splice(i, 1);
        });

        sparkles.forEach((s, i) => { 
            s.update(); s.draw(); 
            if (s.opacity <= 0) sparkles.splice(i, 1); 
        });

        frame++; 
        requestAnimationFrame(animate);
    }

    function endGame() {
        if (!gameActive) return;
        gameActive = false;
        setTimeout(() => {
            startMenu.style.display = 'block';
            startMenu.innerHTML = `
                <h2 style="font-weight:200; margin:0; letter-spacing:2px;">DRIFT ENDED</h2>
                <p style="margin:10px 0; opacity:0.6;">Final Score: ${score}</p>
                <button class="btn" onclick="startGame()">Fly Again</button>
            `;
        }, 600);
    }

    // MULTI-DEVICE CONTROLS
    const triggerJump = (e) => {
        if (gameActive) {
            if (e) e.preventDefault();
            cloud.v = -4.3; // Gentle lift
        }
    };

    // Laptop: Spacebar
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') triggerJump(e);
    });

    // Mobile: Touch
    window.addEventListener('touchstart', (e) => {
        triggerJump(e);
    }, { passive: false });

    // Desktop: Click
    window.addEventListener('mousedown', () => {
        triggerJump();
    });

    // Ensure resizing doesn't break the game mid-play
    window.addEventListener('resize', resize);
</script>
</body>
</html>
