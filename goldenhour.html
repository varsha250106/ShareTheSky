<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Portal - Cloud Chaser</title>
    <style>
        :root { --pink: #ff7eb3; --cyan: #7afcff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 400px; height: 600px; margin: auto; top: 50%; transform: translateY(-50%); }
        canvas { border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); display: block; width: 100%; height: 100%; }
        .ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; color: white; }
        #score-board { position: absolute; top: 30px; font-size: 3rem; font-weight: 200; letter-spacing: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .card { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; text-align: center; pointer-events: auto; border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--cyan); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">00</div>
            <div id="start-menu" class="card">
                <h1 style="font-weight: 200; margin: 0;">VAPOR DRIFT</h1>
                <p style="opacity: 0.6;">Space or Tap to Glide</p>
                <button class="btn" onclick="startGame()">ENTER THE SKY</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    const dpr = window.devicePixelRatio || 1;
    canvas.width = 400 * dpr; canvas.height = 600 * dpr;
    ctx.scale(dpr, dpr);

    let cloud, portals, sparkles, gameActive, score, frame;

    class Sparkle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 2 + 1;
            this.speedX = -Math.random() * 5 - 2;
            this.color = color; this.opacity = 1;
        }
        update() { this.x += this.speedX; this.opacity -= 0.02; }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Portal {
        constructor() {
            this.x = 450;
            this.y = Math.random() * 350 + 100;
            this.width = 80; // Broader "tunnel"
            this.height = 120;
            this.color = Math.random() > 0.5 ? '#ff7eb3' : '#7afcff';
            this.passed = false;
        }
        draw() {
            ctx.save();
            // Draw the "passing through" portal
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            
            // Draw the front frame
            ctx.strokeRect(this.x, this.y - this.height/2, this.width, this.height);
            
            // Draw a semi-transparent "sky mist" inside the portal
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y - this.height/2, this.width, this.height);
            ctx.restore();
        }
        update() { this.x -= 3.5; }
    }

    class Cloud {
        constructor() { this.x = 80; this.y = 300; this.v = 0; this.color = '#ff7eb3'; }
        draw() {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = this.color;
            
            // The Cloud Streak
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.roundRect(this.x - 30, this.y - 6, 60, 12, 10);
            ctx.fill();
            
            // The Glowing Core
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x + 20, this.y, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += 0.15; 
            if (this.v > 6) this.v = 6; 
            this.y += this.v;
            sparkles.push(new Sparkle(this.x - 20, this.y, this.color));
            if (this.y > 600 || this.y < 0) endGame();
        }
    }

    function startGame() {
        cloud = new Cloud(); portals = []; sparkles = [];
        score = 0; frame = 0; gameActive = true;
        startMenu.style.display = 'none'; animate();
    }

    function animate() {
        if (!gameActive) return;
        
        // Dynamic Sky Background
        let grad = ctx.createLinearGradient(0, 0, 0, 600);
        grad.addColorStop(0, '#0f2027'); grad.addColorStop(0.5, '#203a43'); grad.addColorStop(1, '#2c5364');
        ctx.fillStyle = grad; ctx.fillRect(0,0,400,600);

        cloud.update(); cloud.draw();

        if (frame % 100 === 0) portals.push(new Portal());

        portals.forEach((p, i) => {
            p.update(); p.draw();
            
            // PASSING THROUGH LOGIC
            if (!p.passed && cloud.x > p.x && cloud.x < p.x + p.width) {
                if (Math.abs(p.y - cloud.y) < p.height/2) {
                    if (p.color === cloud.color) {
                        score++; p.passed = true;
                        cloud.color = (cloud.color === '#ff7eb3' ? '#7afcff' : '#ff7eb3');
                        scoreBoard.innerText = score < 10 ? "0" + score : score;
                    } else { endGame(); }
                }
            }
            if (p.x < -100) portals.splice(i, 1);
        });

        sparkles.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) sparkles.splice(i, 1); });
        frame++; requestAnimationFrame(animate);
    }

    function endGame() {
        gameActive = false;
        setTimeout(() => {
            startMenu.style.display = 'block';
            startMenu.innerHTML = `<h2 style="font-weight:200;">DRIFT ENDED</h2><p>Score: ${score}</p><button class="btn" onclick="startGame()">RETRY</button>`;
        }, 500);
    }

    const jump = () => { if (gameActive) cloud.v = -4.5; };
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });
    window.addEventListener('mousedown', jump);

</script>
</body>
</html>
