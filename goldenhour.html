<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Hour - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --day: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            --golden: linear-gradient(to bottom, #ff7e5f 0%, #feb47b 100%);
            --night: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0f2d; color: white;
            height: 100vh; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; align-items: center;
        }

        /* Navigation */
        .exit-btn {
            position: absolute; top: 20px; left: 20px; 
            color: white; z-index: 1000; text-decoration: none; 
            background: rgba(0,0,0,0.4); padding: 10px 18px; 
            border-radius: 25px; font-size: 14px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .exit-btn:hover { background: rgba(255,255,255,0.2); }

        #game-container {
            position: relative; width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Viewfinder Window */
        #viewfinder {
            position: relative; width: 320px; height: 450px;
            border: 12px solid #1a1a1a; border-radius: 30px;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: var(--day); transition: background 1.5s ease;
        }

        /* Moving Elements */
        .sun-moon {
            position: absolute; width: 50px; height: 50px;
            border-radius: 50%; left: 50%; transform: translateX(-50%);
            top: 60px; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: blur(2px);
        }

        .landscape {
            position: absolute; bottom: 0; width: 200%; height: 120px;
            background: url('https://www.transparenttextures.com/patterns/black-thread.png'), 
                        linear-gradient(to top, #000 20%, transparent);
            opacity: 0.8; animation: moveBg 15s linear infinite;
        }

        @keyframes moveBg {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Camera UI */
        .controls { margin-top: 30px; text-align: center; }
        
        .shutter-btn {
            width: 75px; height: 75px; border-radius: 50%;
            border: 4px solid white; background: transparent;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .shutter-btn:active { transform: scale(0.9); }
        .shutter-inner { width: 55px; height: 55px; background: white; border-radius: 50%; }

        #flash {
            position: absolute; inset: 0; background: white;
            opacity: 0; pointer-events: none; z-index: 100;
        }

        /* Result Popup */
        .polaroid {
            position: absolute; width: 260px; background: #fdfdfd;
            padding: 12px 12px 35px 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transform: rotate(-3deg) translateY(700px);
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 500; color: #222;
        }
        .polaroid.active { transform: rotate(-3deg) translateY(-20px); }
        .polaroid img { width: 100%; height: 260px; object-fit: cover; border-radius: 2px; }
        .polaroid-label { 
            font-family: 'Brush Script MT', cursive; font-size: 1.4rem; 
            margin-top: 15px; color: #444; 
        }

        .retry-btn {
            margin-top: 15px; border: none; background: #333; color: white;
            padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
        }

        #timer-text { 
            font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 10px; 
            opacity: 0.6; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn">
        <i class="fas fa-arrow-left"></i> Exit Game
    </a>

    <div id="game-container">
        <div id="timer-text">Aligning Shutter...</div>
        
        <div id="viewfinder">
            <div id="flash"></div>
            <div id="sky-obj" class="sun-moon"></div>
            <div class="landscape"></div>
        </div>

        <div id="result-card" class="polaroid">
            <img id="photo-output" src="" alt="Snapshot">
            <div id="photo-caption" class="polaroid-label">Golden Hour</div>
            <button class="retry-btn" onclick="restart()">Take Another</button>
        </div>

        <div class="controls">
            <button class="shutter-btn" id="capture">
                <div class="shutter-inner"></div>
            </button>
            <p style="font-size: 0.8rem; margin-top: 10px; opacity: 0.5;">Capture the Golden Hour</p>
        </div>
    </div>

<script>
    const viewfinder = document.getElementById('viewfinder');
    const skyObj = document.getElementById('sky-obj');
    const flash = document.getElementById('flash');
    const resultCard = document.getElementById('result-card');
    const photoOutput = document.getElementById('photo-output');
    const photoCaption = document.getElementById('photo-caption');
    const captureBtn = document.getElementById('capture');

    let time = 0;
    let active = true;

    // Aesthetic images to match your Pinterest style
    const gallery = {
        day: "https://images.unsplash.com/photo-1500382017468-9049fee74a62?auto=format&fit=crop&w=600&q=80",
        golden: "https://images.unsplash.com/photo-1470252649358-96940c9353d9?auto=format&fit=crop&w=600&q=80",
        night: "https://images.unsplash.com/photo-1532978341072-c96b0015a396?auto=format&fit=crop&w=600&q=80"
    };

    function update() {
        if (!active) return;
        
        time = (time + 1) % 600; // 10 second cycle at 60fps

        if (time < 200) { // DAY
            viewfinder.style.background = "linear-gradient(to bottom, #4facfe, #00f2fe)";
            skyObj.style.background = "#fff700";
            skyObj.style.boxShadow = "0 0 40px #fff700";
            skyObj.style.top = "60px";
        } 
        else if (time >= 200 && time < 400) { // GOLDEN HOUR
            viewfinder.style.background = "linear-gradient(to bottom, #ff7e5f, #feb47b)";
            skyObj.style.background = "#ffcc00";
            skyObj.style.boxShadow = "0 0 60px #ff7e5f";
            skyObj.style.top = "150px";
        } 
        else { // NIGHT
            viewfinder.style.background = "linear-gradient(to bottom, #0f0c29, #302b63)";
            skyObj.style.background = "#f0f0f0";
            skyObj.style.boxShadow = "0 0 20px #fff";
            skyObj.style.top = "40px";
        }

        requestAnimationFrame(update);
    }

    captureBtn.onclick = () => {
        if (!active) return;
        active = false;

        // Visual feedback
        flash.style.opacity = "1";
        setTimeout(() => flash.style.opacity = "0", 150);

        // Determine quality based on time
        if (time >= 220 && time < 380) {
            photoOutput.src = gallery.golden;
            photoCaption.innerText = "Perfect Golden Hour";
            photoCaption.style.color = "#d35400";
        } else if (time < 220) {
            photoOutput.src = gallery.day;
            photoCaption.innerText = "High Noon";
            photoCaption.style.color = "#2980b9";
        } else {
            photoOutput.src = gallery.night;
            photoCaption.innerText = "Midnight Blues";
            photoCaption.style.color = "#2c3e50";
        }

        resultCard.classList.add('active');
    };

    function restart() {
        resultCard.classList.remove('active');
        time = 0;
        active = true;
        update();
    }

    update();
</script>
</body>
</html>
