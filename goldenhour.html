<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Chaser - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff7eb3; --blue: #7afcff; --accent: #feb47b; }
        
        body { 
            margin: 0; background: linear-gradient(to bottom, #0f0c29, #302b63); 
            color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            touch-action: none;
        }

        .exit-btn {
            position: absolute; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 25px; font-size: 14px; z-index: 100;
        }

        #game-canvas {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 100%; max-height: 80vh; cursor: pointer;
        }

        .ui-layer {
            position: absolute; pointer-events: none; text-align: center; width: 100%;
        }

        #score-display { top: 40px; font-size: 2rem; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        
        #start-msg { 
            background: rgba(0,0,0,0.6); padding: 20px 40px; border-radius: 50px;
            backdrop-filter: blur(10px); pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit</a>

    <div id="score-display" class="ui-layer">0</div>

    <canvas id="game-canvas"></canvas>

    <div id="start-screen" class="ui-layer">
        <div id="start-msg" onclick="startGame()">
            <h2>Cloud Chaser</h2>
            <p>Tap to stay afloat.<br>Match your color to the Aura Rings!</p>
            <strong style="color: var(--accent);">TAP TO FLY</strong>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-display');
    const startScreen = document.getElementById('start-screen');

    // Resize for mobile
    canvas.width = 400;
    canvas.height = 600;

    // Game Constants
    const GRAVITY = 0.25;
    const FLAP = -5;
    const SPAWN_RATE = 120; // Every 120 frames
    const COLORS = ['#ff7eb3', '#7afcff']; // Pink and Blue

    let cloud, rings, particles, score, gameActive, frame;

    class Cloud {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = 50;
            this.y = 300;
            this.velocity = 0;
            this.radius = 25;
            this.color = COLORS[0];
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.color;
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            
            // Draw a wispy cloud shape using 3 circles
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.arc(this.x + 15, this.y - 10, this.radius * 0.8, 0, Math.PI * 2);
            ctx.arc(this.x + 15, this.y + 10, this.radius * 0.8, 0, Math.PI * 2);
            ctx.fill();
            
            // Glow effect for active color
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }
        update() {
            this.velocity += GRAVITY;
            this.y += this.velocity;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) endGame();
        }
    }

    class Ring {
        constructor() {
            this.x = canvas.width + 50;
            this.y = Math.random() * (canvas.height - 200) + 100;
            this.width = 15;
            this.height = 100;
            this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            this.passed = false;
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 6;
            ctx.setLineDash([5, 5]); // Dashed "Aura" look
            
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, 20, 60, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        update() {
            this.x -= 3;
        }
    }

    function startGame() {
        cloud = new Cloud();
        rings = [];
        score = 0;
        frame = 0;
        gameActive = true;
        scoreEl.innerText = "0";
        startScreen.style.display = "none";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Background Gradient Shift
        let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGrad.addColorStop(0, '#4facfe');
        bgGrad.addColorStop(1, '#00f2fe');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0,0, canvas.width, canvas.height);

        cloud.update();
        cloud.draw();

        // Manage Rings
        if (frame % SPAWN_RATE === 0) rings.push(new Ring());
        
        rings.forEach((ring, index) => {
            ring.update();
            ring.draw();

            // Collision Detection
            if (!ring.passed && ring.x < cloud.x + cloud.radius) {
                if (Math.abs(ring.y - cloud.y) < 60) {
                    if (cloud.color === ring.color) {
                        score++;
                        scoreEl.innerText = score;
                        ring.passed = true;
                        // Swap Cloud Color
                        cloud.color = (cloud.color === COLORS[0]) ? COLORS[1] : COLORS[0];
                    } else {
                        endGame();
                    }
                }
            }

            if (ring.x < -50) rings.splice(index, 1);
        });

        frame++;
        requestAnimationFrame(animate);
    }

    function endGame() {
        gameActive = false;
        startScreen.style.display = "flex";
        document.getElementById('start-msg').innerHTML = `
            <h2 style="color:#ff4b2b">Game Over</h2>
            <p>Score: ${score}</p>
            <strong style="color: var(--accent);">TRY AGAIN</strong>
        `;
    }

    // Input Listeners
    const handleInput = (e) => {
        if (gameActive) {
            cloud.velocity = FLAP;
        }
    };

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInput(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });
    canvas.addEventListener('mousedown', handleInput);

</script>
</body>
</html>
