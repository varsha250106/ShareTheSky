<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Chaser: Sky-Streak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff7eb3; --c: #7afcff; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 100vh; touch-action: none; background: #000; }
        .exit-btn { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 25px; z-index: 100; }
        #game-container { position: relative; width: 400px; height: 600px; max-width: 100vw; max-height: 85vh; margin: auto; top: 50%; transform: translateY(-50%); }
        canvas { border-radius: 20px; border: 4px solid rgba(255, 255, 255, 0.2); display: block; width: 100%; height: 100%; }
        .ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; color: white; }
        #score-board { position: absolute; top: 20px; font-size: 2.5rem; font-weight: bold; }
        .card { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; text-align: center; pointer-events: auto; border: 1px solid rgba(255,255,255,0.2); }
        .btn { background: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit</a>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">0</div>
            <div id="start-menu" class="card">
                <h2>Sky-Streak</h2>
                <p>Spacebar / Tap to Rise<br>Fly through the Wide Aura Rings</p>
                <button class="btn" onclick="startGame()">Begin Flight</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    const dpr = window.devicePixelRatio || 1;
    canvas.width = 400 * dpr; canvas.height = 600 * dpr;
    ctx.scale(dpr, dpr);

    let cloud, rings, sparkles, gameActive, score, frame, speedMult;

    const GRAVITY = 0.16;      
    const JUMP_STRENGTH = -4.2; 

    class Sparkle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * -4 - 2; // Move back fast for "speed" effect
            this.color = color; this.opacity = 1;
        }
        update() { this.x += this.speedX; this.opacity -= 0.03; }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Ring {
        constructor() {
            this.x = 450; this.y = Math.random() * 400 + 100;
            this.width = 60; // BROADER RINGS
            this.color = ['#ff7eb3', '#7afcff'][Math.floor(Math.random()*2)];
            this.passed = false;
        }
        draw() {
            ctx.strokeStyle = this.color; ctx.lineWidth = 8;
            ctx.setLineDash([15, 5]); // Long dashes for "tunnel" look
            // Draw a wider rectangle with rounded corners (the broad ring)
            ctx.beginPath();
            ctx.roundRect(this.x, this.y - 45, this.width, 90, 15);
            ctx.stroke();
        }
        update() { this.x -= (3.5 * speedMult); }
    }

    class Cloud { // MODIFIED TO BE A STREAK
        constructor() { this.x = 60; this.y = 300; this.v = 0; this.color = '#ff7eb3'; }
        draw() {
            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.fillStyle = "white";
            
            // Draw a horizontal pill shape (The Sky-Streak)
            ctx.beginPath();
            ctx.roundRect(this.x - 20, this.y - 8, 50, 16, 10);
            ctx.fill();
            
            // Add a small "core" glow
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x + 15, this.y, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += GRAVITY; 
            if (this.v > 7) this.v = 7; 
            this.y += this.v;
            // Constant trail for speed effect
            sparkles.push(new Sparkle(this.x - 10, this.y, this.color));
            if (this.y > 600 || this.y < 0) endGame();
        }
    }

    function startGame() {
        cloud = new Cloud(); rings = []; sparkles = [];
        score = 0; frame = 0; speedMult = 1;
        gameActive = true; startMenu.style.display = 'none'; animate();
    }

    function animate() {
        if (!gameActive) return;
        let grad = ctx.createLinearGradient(0, 0, 0, 600);
        grad.addColorStop(0, '#4facfe'); grad.addColorStop(1, '#00f2fe');
        ctx.fillStyle = grad; ctx.fillRect(0,0,400,600);

        cloud.update(); cloud.draw();
        speedMult = 1 + (score * 0.05);

        if (frame % 90 === 0) rings.push(new Ring());

        rings.forEach((r, i) => {
            r.update(); r.draw();
            // Check collision with the broader ring area
            if (!r.passed && cloud.x > r.x && cloud.x < r.x + r.width) {
                if (Math.abs(r.y - cloud.y) < 50) {
                    if (r.color === cloud.color) {
                        score++; r.passed = true;
                        cloud.color = (cloud.color === '#ff7eb3' ? '#7afcff' : '#ff7eb3');
                        scoreBoard.innerText = score;
                    } else { endGame(); }
                }
            }
            if (r.x < -100) rings.splice(i, 1);
        });

        sparkles.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) sparkles.splice(i, 1); });
        frame++; requestAnimationFrame(animate);
    }

    function endGame() {
        gameActive = false;
        setTimeout(() => {
            startMenu.style.display = 'block';
            startMenu.innerHTML = `<h2>Mists Hit</h2><p>Score: ${score}</p><button class="btn" onclick="startGame()">Restart</button>`;
        }, 500);
    }

    // MULTI-DEVICE CONTROLS
    const jump = () => { if (gameActive) cloud.v = JUMP_STRENGTH; };
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });
    window.addEventListener('mousedown', () => jump());

</script>
</body>
</html>
