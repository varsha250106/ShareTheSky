<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Stills - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #ff7e5f;
            --bg: #0f0f1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* Navigation */
        .exit-btn {
            position: absolute; top: 20px; left: 20px; 
            color: white; z-index: 1000; text-decoration: none; 
            background: rgba(0,0,0,0.5); padding: 10px 18px; 
            border-radius: 25px; font-size: 14px; backdrop-filter: blur(10px);
        }

        /* Game Phases */
        .phase { display: none; flex-direction: column; align-items: center; text-align: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #sky-preview {
            width: 280px; height: 380px; border-radius: 20px;
            object-fit: cover; border: 8px solid var(--glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Color Grid */
        #color-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-top: 30px;
        }

        .color-circle {
            width: 70px; height: 70px; border-radius: 50%;
            cursor: pointer; border: 4px solid transparent;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .color-circle:hover { transform: scale(1.1); }
        .color-circle.selected { border-color: white; transform: scale(0.9); }

        /* Result Card */
        .palette-card {
            background: white; padding: 20px; border-radius: 15px;
            color: #333; width: 260px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .swatch-row { display: flex; height: 60px; border-radius: 8px; overflow: hidden; margin: 15px 0; }
        .swatch { flex: 1; height: 100%; }

        .btn {
            background: var(--accent); border: none; padding: 12px 30px;
            border-radius: 25px; color: white; cursor: pointer; 
            margin-top: 30px; font-weight: bold; font-size: 1rem;
        }

        #timer-bar {
            width: 280px; height: 6px; background: #333;
            border-radius: 3px; margin-top: 15px; overflow: hidden;
        }
        #timer-progress { width: 100%; height: 100%; background: var(--accent); transition: width 1s linear; }
    </style>
</head>
<body>

    <a href="index.html" class="exit-btn"><i class="fas fa-arrow-left"></i> Exit Game</a>

    <div id="memorize-phase" class="phase active">
        <h2 style="margin-bottom: 10px;">Memorize the Vibe</h2>
        <img id="sky-preview" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80">
        <div id="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <div id="select-phase" class="phase">
        <h2>Identify the Palette</h2>
        <p style="opacity: 0.7;">Select the 3 colors that were in the sky.</p>
        <div id="color-grid"></div>
        <button class="btn" onclick="evaluateSelection()">Confirm Selection</button>
    </div>

    <div id="result-phase" class="phase">
        <div class="palette-card">
            <h3 style="margin: 0;">Sky Stills</h3>
            <p style="font-size: 0.8rem; opacity: 0.6; margin: 5px 0;">Aura Captured</p>
            <div id="result-swatches" class="swatch-row"></div>
            <div id="score-text" style="font-weight: bold;">3/3 Matched!</div>
        </div>
        <button class="btn" onclick="location.reload()">New Challenge</button>
    </div>

<script>
    const levels = [
        { 
            img: "https://images.unsplash.com/photo-1470252649358-96940c9353d9?auto=format&fit=crop&w=400&q=80", 
            correct: ["#ff7e5f", "#feb47b", "#2c3e50"],
            wrong: ["#87CEEB", "#ffffff", "#4facfe", "#2ecc71", "#9b59b6", "#34495e"]
        },
        { 
            img: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80", 
            correct: ["#4facfe", "#00f2fe", "#ffffff"],
            wrong: ["#e74c3c", "#f1c40f", "#8e44ad", "#16a085", "#2c3e50", "#d35400"]
        }
    ];

    let currentLevel = levels[Math.floor(Math.random() * levels.length)];
    let selectedColors = [];

    // Set Image
    document.getElementById('sky-preview').src = currentLevel.img;

    // Timer Logic
    let timeLeft = 5;
    const timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-progress').style.width = (timeLeft / 5 * 100) + "%";
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            startSelectionPhase();
        }
    }, 1000);

    function startSelectionPhase() {
        document.getElementById('memorize-phase').classList.remove('active');
        document.getElementById('select-phase').classList.add('active');
        
        const grid = document.getElementById('color-grid');
        const allColors = [...currentLevel.correct, ...currentLevel.wrong].sort(() => Math.random() - 0.5);

        allColors.forEach(color => {
            const div = document.createElement('div');
            div.className = 'color-circle';
            div.style.background = color;
            div.onclick = () => {
                if (div.classList.contains('selected')) {
                    div.classList.remove('selected');
                    selectedColors = selectedColors.filter(c => c !== color);
                } else if (selectedColors.length < 3) {
                    div.classList.add('selected');
                    selectedColors.push(color);
                }
            };
            grid.appendChild(div);
        });
    }

    function evaluateSelection() {
        if (selectedColors.length < 3) {
            alert("Pick at least 3 colors!");
            return;
        }

        document.getElementById('select-phase').classList.remove('active');
        document.getElementById('result-phase').classList.add('active');

        const resultRow = document.getElementById('result-swatches');
        let matches = 0;

        selectedColors.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.background = color;
            resultRow.appendChild(swatch);
            if (currentLevel.correct.includes(color)) matches++;
        });

        document.getElementById('score-text').innerText = `${matches}/3 Colors Matched!`;
        if (matches === 3) document.getElementById('score-text').style.color = "#27ae60";
    }
</script>
</body>
</html>
