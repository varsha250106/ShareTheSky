<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotton Loop - ShareTheSky</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #f0f4f8; font-family: 'Segoe UI', sans-serif; 
            touch-action: none; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #game-container { 
            position: relative; width: 450px; height: 85vh;
            max-width: 95vw; 
            background: linear-gradient(180deg, #ffffff 0%, #d4e3ff 100%); 
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); overflow: hidden;
            border: 6px solid white;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .ui { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; pointer-events: none; 
            color: #5a7fa3; z-index: 10;
        }

        #score-board { 
            position: absolute; top: 40px; font-size: 3.5rem; 
            font-weight: 200; letter-spacing: 8px; color: #5a7fa3;
            opacity: 0.6;
        }

        .card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
            padding: 45px; border-radius: 35px; text-align: center; 
            pointer-events: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            width: 70%;
        }

        .btn { 
            background: #5a7fa3; color: white; border: none; padding: 16px 45px; 
            border-radius: 50px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 25px; 
            transition: 0.3s ease; 
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <div id="score-board">00</div>
            <div id="start-menu" class="card">
                <h1 style="font-weight: 400; margin: 0;">COTTON LOOP</h1>
                <p style="opacity: 0.7; font-size: 0.9rem; margin: 15px 0;">Jump through the matching hoops</p>
                <button class="btn" onclick="startGame()">Start Game</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const startMenu = document.getElementById('start-menu');

    const dpr = window.devicePixelRatio || 1;
    let viewW, viewH;

    function resize() {
        viewW = container.clientWidth;
        viewH = container.clientHeight;
        canvas.width = viewW * dpr;
        canvas.height = viewH * dpr;
        ctx.scale(dpr, dpr);
    }
    resize();

    let cottonBall, hoops, sparkles, gameActive, score, frame;

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = -Math.random() * 2 - 1;
            this.color = color; this.opacity = 0.6;
        }
        update() { this.x += this.speedX; this.opacity -= 0.02; }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Hoop {
        constructor() {
            this.radius = 60;
            this.x = viewW + 100;
            this.y = Math.random() * (viewH - 200) + 100;
            this.type = Math.random() > 0.5 ? 'pink' : 'cyan';
            this.color = this.type === 'pink' ? '#ffb6d5' : '#b4f5ff';
            this.passed = false;
        }
        draw() {
            ctx.save();
            ctx.lineWidth = 10;
            ctx.strokeStyle = this.color;
            ctx.lineCap = 'round';
            
            // Draw a dashed "cotton-thread" loop
            ctx.setLineDash([15, 10]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.stroke();
            
            // Subtle glow around the hoop
            ctx.globalAlpha = 0.2;
            ctx.lineWidth = 20;
            ctx.stroke();
            ctx.restore();
        }
        update() { this.x -= 2.8; }
    }

    class CottonBall {
        constructor() { 
            this.x = 90; this.y = viewH / 2; 
            this.v = 0; 
            this.type = 'pink';
            this.color = '#ffb6d5'; 
        }
        draw() {
            ctx.save();
            ctx.fillStyle = "white";
            // Drawing the "Fluffy Cotton Ball" using multiple small circles
            for(let i=0; i<6; i++) {
                let angle = (i / 6) * Math.PI * 2;
                let ox = Math.cos(angle) * 10;
                let oy = Math.sin(angle) * 10;
                ctx.beginPath();
                ctx.arc(this.x + ox, this.y + oy, 12, 0, Math.PI*2);
                ctx.fill();
            }
            // Center core that shows current color
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.v += 0.18; 
            if (this.v > 6) this.v = 6; 
            this.y += this.v;
            // Trails
            if (frame % 3 === 0) sparkles.push(new Particle(this.x - 10, this.y, this.color));
            if (this.y > viewH || this.y < 0) endGame();
        }
    }

    function startGame() {
        resize();
        cottonBall = new CottonBall(); hoops = []; sparkles = [];
        score = 0; frame = 0; gameActive = true;
        startMenu.style.display = 'none'; scoreBoard.innerText = "00";
        animate();
    }

    function animate() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, viewW, viewH);

        cottonBall.update(); cottonBall.draw();

        if (frame % 110 === 0) hoops.push(new Hoop());

        hoops.forEach((h, i) => {
            h.update(); h.draw();
            
            let dist = Math.hypot(cottonBall.x - h.x, cottonBall.y - h.y);
            if (!h.passed && dist < 50) {
                if (h.type === cottonBall.type) {
                    score++; h.passed = true;
                    // Change cotton ball color
                    cottonBall.type = (cottonBall.type === 'pink' ? 'cyan' : 'pink');
                    cottonBall.color = (cottonBall.type === 'pink' ? '#ffb6d5' : '#b4f5ff');
                    scoreBoard.innerText = score < 10 ? "0" + score : score;
                } else { endGame(); }
            }
            if (h.x < -100) hoops.splice(i, 1);
        });

        sparkles.forEach((s, i) => { s.update(); s.draw(); if (s.opacity <= 0) sparkles.splice(i, 1); });
        frame++; requestAnimationFrame(animate);
    }

    function endGame() {
        if (!gameActive) return;
        gameActive = false;
        startMenu.style.display = 'block';
        startMenu.innerHTML = `<h2 style="font-weight:400; color:#5a7fa3; margin:0;">DRIFT ENDED</h2><p style="margin:10px 0; opacity:0.6;">Score: ${score}</p><button class="btn" onclick="startGame()">Fly Again</button>`;
    }

    const jump = (e) => { if (gameActive) { if (e) e.preventDefault(); cottonBall.v = -4.5; } };
    window.addEventListener('touchstart', (e) => jump(e), { passive: false });
    window.addEventListener('mousedown', () => jump());
    window.addEventListener('resize', resize);
</script>
</body>
</html>
