<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Collector - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #0f0f2d;
            --gold: #ffd700;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: #0f0f2d; color: white;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0f0f2d;
        }

        canvas {
            background: linear-gradient(to bottom, #0f0f2d 0%, #2d2d6a 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 100%; max-height: 100%;
            display: block; border-radius: 15px;
        }

        /* HUD */
        .hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-around; pointer-events: none; z-index: 5;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 90px;
        }

        .energy-bar {
            width: 100px; height: 8px; background: rgba(255,255,255,0.15);
            border-radius: 4px; margin-top: 6px; overflow: hidden;
        }

        #energy-fill {
            width: 100%; height: 100%; 
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.3s ease-out;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0; background: rgba(15, 15, 45, 0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center; padding: 20px;
        }

        .btn-start {
            background: white; color: var(--dark); border: none;
            padding: 15px 40px; border-radius: 50px; font-weight: 800;
            cursor: pointer; font-size: 1.1rem; margin-top: 20px;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat-card">
            <small>ENERGY</small>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
        <div class="stat-card">
            <small>STARS</small>
            <div id="score-text" style="font-size: 1.4rem; font-weight: 800; color: var(--gold);">0</div>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <i class="fas fa-star" style="color: var(--gold); font-size: 3.5rem; margin-bottom: 15px;"></i>
        <h1>Sky Collector</h1>
        <p>Keep your light alive!</p>
        <button class="btn-start" id="beginBtn">BEGIN JOURNEY</button>
    </div>

    <div id="death-overlay" class="overlay hidden">
        <h2 style="opacity: 0.8;">The Light Faded</h2>
        <div style="font-size: 3.5rem; margin: 10px 0; color: var(--gold); font-weight: 800;" id="final-score">0</div>
        <button class="btn-start" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <canvas id="gameCanvas" width="350" height="550"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const energyFill = document.getElementById('energy-fill');
    const scoreText = document.getElementById('score-text');

    let gameActive = false;
    let score = 0;
    let energy = 100;
    
    // BOOSTER PHYSICS: Higher jump, more responsive
    let player = { x: 155, y: 400, w: 40, h: 25, vx: 0, vy: 0, jump: -14, grav: 0.4 };
    let platforms = [];
    let stars = [];

    let keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Mobile Controls
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        keys[touchX < rect.width / 2 ? 'ArrowLeft' : 'ArrowRight'] = true;
    }, {passive: false});

    canvas.addEventListener('touchend', () => {
        keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    });

    function createPlatform(y) {
        let x = Math.random() * (canvas.width - 80);
        platforms.push({ x: x, y: y, w: 80, h: 12 });
        if (Math.random() > 0.4) {
            stars.push({ x: x + 40, y: y - 30, baseY: y - 30, gathered: false });
        }
    }

    function init() {
        platforms = []; stars = []; score = 0; energy = 100;
        player.x = 155; player.y = 400; player.vy = 0;
        // First platform is always centered
        platforms.push({ x: 135, y: 480, w: 80, h: 12 }); 
        for (let i = 0; i < 8; i++) createPlatform(i * 70);
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ENERGY MANAGEMENT
        energy -= 0.12; 
        energyFill.style.width = Math.max(0, energy) + "%";
        if (energy <= 0) endGame();

        // Player Movement
        player.vy += player.grav;
        player.y += player.vy;
        if (keys['ArrowLeft']) player.vx = -7;
        else if (keys['ArrowRight']) player.vx = 7;
        else player.vx *= 0.85;
        player.x += player.vx;

        // Wrap around
        if (player.x < -30) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -30;

        // IMPORTANT: Scrolling Threshold set to 300 (Much lower than before)
        const scrollThreshold = 300;

        platforms.forEach((p, i) => {
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 6); ctx.fill();

            // Collision
            if (player.vy > 0 && player.x + 35 > p.x && player.x < p.x + p.w &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15) {
                player.vy = player.jump;
            }

            // Scrolling Logic: Moves everything down when player passes threshold
            if (player.y < scrollThreshold) {
                let diff = scrollThreshold - player.y;
                player.y = scrollThreshold; // Lock player to threshold
                p.y += diff;
                stars.forEach(s => { s.y += diff; s.baseY += diff; });
                if (p.y > canvas.height) { 
                    platforms.splice(i, 1); 
                    createPlatform(0); 
                }
            }
        });

        // Stars Logic
        stars.forEach((s, i) => {
            if (!s.gathered) {
                s.y = s.baseY + Math.sin(Date.now()/200) * 6;
                ctx.fillStyle = var(--gold);
                ctx.shadowBlur = 10; ctx.shadowColor = var(--gold);
                ctx.beginPath(); ctx.arc(s.x, s.y, 7, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                let dx = (player.x + 20) - s.x;
                let dy = (player.y + 12) - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 45) { // Magnetic Collection
                    s.gathered = true; 
                    energy = Math.min(100, energy + 25);
                    score++; scoreText.innerText = score;
                }
            }
        });

        // Cloud Player
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(player.x+10, player.y+15, 10, 0, Math.PI*2);
        ctx.arc(player.x+20, player.y+10, 14, 0, Math.PI*2);
        ctx.arc(player.x+30, player.y+15, 10, 0, Math.PI*2);
        ctx.fill();

        if (player.y > canvas.height + 50) endGame();
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('death-overlay').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    document.getElementById('beginBtn').onclick = () => {
        document.getElementById('start-overlay').classList.add('hidden');
        gameActive = true;
        init();
        loop();
    };
</script>
</body>
</html>
