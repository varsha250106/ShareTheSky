<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Collector - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #0f0f2d;
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: #0f0f2d; color: white;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        canvas {
            background: linear-gradient(to bottom, #0f0f2d 0%, #2d2d6a 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 100%; max-height: 100%;
            display: block; border-radius: 15px;
        }

        /* HUD - Top Stats */
        .hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-around; pointer-events: none; z-index: 5;
        }

        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 90px;
        }

        .energy-bar {
            width: 100px; height: 8px; background: rgba(255,255,255,0.15);
            border-radius: 4px; margin-top: 6px; overflow: hidden;
        }

        #energy-fill {
            width: 100%; height: 100%; 
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.3s ease-out;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0; background: rgba(15, 15, 45, 0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center; padding: 20px;
        }

        .btn-start {
            background: white; color: var(--dark); border: none;
            padding: 15px 40px; border-radius: 50px; font-weight: 800;
            cursor: pointer; font-size: 1.1rem; margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-start:hover { transform: scale(1.05); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat-card">
            <small style="letter-spacing: 1px; opacity: 0.8;">ENERGY</small>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
        <div class="stat-card">
            <small style="letter-spacing: 1px; opacity: 0.8;">FRAGMENTS</small>
            <div id="score-text" style="font-size: 1.4rem; font-weight: 800; color: var(--gold);">0</div>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <i class="fas fa-star" style="color: var(--gold); font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--gold));"></i>
        <h1 style="margin: 0; font-size: 2rem;">Sky Collector</h1>
        <p style="opacity: 0.7;">Collect stars to keep your light alive!</p>
        <button class="btn-start" id="beginBtn">BEGIN JOURNEY</button>
    </div>

    <div id="death-overlay" class="overlay hidden">
        <h2 style="margin: 0; opacity: 0.8;">The Light Faded</h2>
        <div style="font-size: 3rem; margin: 15px 0; color: var(--gold); font-weight: 800;" id="final-score">0</div>
        <button class="btn-start" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <canvas id="gameCanvas" width="350" height="500"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const energyFill = document.getElementById('energy-fill');
    const scoreText = document.getElementById('score-text');

    let gameActive = false;
    let score = 0;
    let energy = 100;
    
    let player = { x: 155, y: 350, w: 40, h: 25, vx: 0, vy: 0, jump: -11, grav: 0.42 };
    let platforms = [];
    let stars = [];
    let particles = [];
    let bgStars = Array.from({length: 40}, () => ({ x: Math.random()*350, y: Math.random()*500, s: Math.random()*2 }));

    let keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Optimized Mobile Touch
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        keys[touchX < rect.width / 2 ? 'ArrowLeft' : 'ArrowRight'] = true;
    }, {passive: false});

    canvas.addEventListener('touchend', () => {
        keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    });

    function createPlatform(y) {
        let x = Math.random() * (canvas.width - 75);
        platforms.push({ x: x, y: y, w: 75, h: 10 });
        // 50% chance for a star
        if (Math.random() > 0.5) {
            stars.push({ x: x + 37, y: y - 30, baseY: y - 30, gathered: false, phase: Math.random() * Math.PI });
        }
    }

    function createBurst(x, y) {
        for(let i=0; i<8; i++) {
            particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1 });
        }
    }

    function init() {
        platforms = []; stars = []; particles = []; score = 0; energy = 100;
        player.x = 155; player.y = 350; player.vy = 0;
        platforms.push({ x: 135, y: 430, w: 80, h: 10 }); // Safe start platform
        for (let i = 0; i < 7; i++) createPlatform(i * 75);
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Background Stars
        ctx.fillStyle = "white";
        bgStars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        // 2. Energy Decay (Progressive Difficulty)
        energy -= (0.13 + (score * 0.001));
        energyFill.style.width = Math.max(0, energy) + "%";
        if (energy <= 0) endGame();

        // 3. Player Physics
        player.vy += player.grav;
        player.y += player.vy;
        if (keys['ArrowLeft']) player.vx = -6;
        else if (keys['ArrowRight']) player.vx = 6;
        else player.vx *= 0.82;
        player.x += player.vx;

        if (player.x < -30) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -30;

        // 4. Platform Interaction
        platforms.forEach((p, i) => {
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.w, p.h, 5);
            ctx.fill();

            if (player.vy > 0 && player.x + 35 > p.x && player.x < p.x + p.w &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 12) {
                player.vy = player.jump;
            }

            // Scrolling
            if (player.y < 230) {
                let diff = 230 - player.y;
                player.y += diff;
                p.y += diff;
                stars.forEach(s => { s.y += diff; s.baseY += diff; });
                bgStars.forEach(s => s.y = (s.y + diff*0.2) % 500);
                if (p.y > canvas.height) { platforms.splice(i, 1); createPlatform(0); }
            }
        });

        // 5. Star Magnetism & Collection
        stars.forEach((s, i) => {
            if (!s.gathered) {
                // Magnet Effect
                let dx = (player.x + 20) - s.x;
                let dy = (player.y + 12) - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 60) { // Sucks star in when close
                    s.x += dx * 0.12;
                    s.y += dy * 0.12;
                } else {
                    s.y = s.baseY + Math.sin(Date.now()/200 + s.phase) * 5;
                }

                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 10; ctx.shadowColor = "#ffd700";
                ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                if (dist < 30) {
                    s.gathered = true; 
                    energy = Math.min(100, energy + 18);
                    score++; 
                    scoreText.innerText = score;
                    createBurst(s.x, s.y);
                }
            }
        });

        // 6. Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            ctx.fillStyle = `rgba(255, 215, 0, ${p.life})`;
            ctx.fillRect(p.x, p.y, 2, 2);
            if(p.life <= 0) particles.splice(i, 1);
        });

        // 7. Player (Cloud)
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(player.x+10, player.y+15, 10, 0, Math.PI*2);
        ctx.arc(player.x+20, player.y+10, 14, 0, Math.PI*2);
        ctx.arc(player.x+30, player.y+15, 10, 0, Math.PI*2);
        ctx.fill();

        if (player.y > canvas.height) endGame();
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('death-overlay').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    document.getElementById('beginBtn').onclick = () => {
        document.getElementById('start-overlay').classList.add('hidden');
        gameActive = true;
        init();
        loop();
    };
</script>
</body>
</html>
