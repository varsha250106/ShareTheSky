<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Collector - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #2d2d6a;
            --bg: #f8f9fc;
            --gold: #ffd700;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--dark);
            min-height: 100vh; overflow-x: hidden; overscroll-behavior-y: contain; 
        }

        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5%; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .main-container {
            display: grid; grid-template-columns: 300px 1fr; gap: 40px;
            padding: 20px 5%; max-width: 1200px; margin: 0 auto;
        }

        /* UI Elements */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .dashboard-card {
            background: white; border-radius: 20px; padding: 25px;
            text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.02);
            border: 1.5px solid #f0edff;
        }

        .meter-container {
            width: 100%; height: 12px; background: #eee; border-radius: 10px;
            margin-top: 10px; overflow: hidden;
        }
        #lightMeter {
            width: 100%; height: 100%; background: linear-gradient(90deg, #fbc2eb, #a18cd1);
            transition: width 0.3s ease-out;
        }

        .game-section { 
            background: white; border-radius: 30px; padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.03); display: flex; 
            flex-direction: column; align-items: center; position: relative;
        }

        .canvas-area { position: relative; width: 100%; max-width: 350px; aspect-ratio: 7/10; }
        #gameCanvas { 
            background: linear-gradient(to bottom, #1a1a4a 0%, #2d2d6a 100%); 
            border-radius: 20px; width: 100%; height: 100%; display: block; touch-action: none; 
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 45, 106, 0.9); border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10; text-align: center; padding: 20px;
        }

        .btn-action {
            background: white; color: var(--primary); border: none; padding: 15px 45px;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-action:hover { transform: scale(1.05); }

        @media (max-width: 900px) { 
            .main-container { grid-template-columns: 1fr; } 
            .sidebar { order: 2; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">
        <img src="https://img.icons8.com/fluency/48/star.png" width="30">
        <span style="margin-left: 10px; font-weight: 800; color: var(--dark);">ShareTheSky</span>
    </a>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="dashboard-card">
            <div style="font-size: 0.75rem; font-weight: 700; opacity: 0.7; letter-spacing: 1px;">LIGHT ENERGY</div>
            <div class="meter-container"><div id="lightMeter"></div></div>
        </div>
        <div class="dashboard-card">
            <div style="font-size: 0.75rem; font-weight: 700; opacity: 0.7; letter-spacing: 1px;">FRAGMENTS</div>
            <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary);" id="fragCount">0</div>
        </div>
    </div>

    <div class="game-section">
        <h2 style="margin: 0 0 15px 0; color: var(--dark);">Sky Collector</h2>
        <div class="canvas-area">
            <div id="overlay">
                <i class="fas fa-star" style="color: var(--gold); font-size: 3rem; margin-bottom: 15px;"></i>
                <h2>Collect the Stars</h2>
                <p>Don't let your light run out!</p>
                <button class="btn-action" id="startBtn">START JOURNEY</button>
            </div>
            <canvas id="gameCanvas" width="350" height="500"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    let gameRunning = false;
    let light = 100;
    let fragments = 0;
    let player = { x: 155, y: 350, w: 40, h: 30, vx: 0, vy: 0, jump: -10, grav: 0.35 };
    let platforms = [];
    let stars = [];
    let particles = [];
    let bgStars = Array.from({length: 50}, () => ({x: Math.random()*350, y: Math.random()*500, s: Math.random()*2}));

    let keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        keys[touchX < rect.width/2 ? 'ArrowLeft' : 'ArrowRight'] = true;
    }, {passive: false});

    canvas.addEventListener('touchend', () => { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; });

    function spawnPlatform(y) {
        let px = Math.random() * (canvas.width - 70);
        platforms.push({ x: px, y: y, w: 70, h: 12 });
        if (Math.random() > 0.5) {
            stars.push({ x: px + 35, y: y - 25, gathered: false, phase: Math.random() * Math.PI * 2 });
        }
    }

    function createParticles(x, y) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y, 
                vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
                life: 1.0, color: '#ffd700'
            });
        }
    }

    function init() {
        platforms = []; stars = []; particles = []; light = 100; fragments = 0;
        player.x = 155; player.y = 350; player.vy = 0;
        document.getElementById('fragCount').innerText = "0";
        platforms.push({ x: 140, y: 420, w: 70, h: 12 });
        for (let i = 0; i < 7; i++) spawnPlatform(i * 75);
    }

    function loop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Background Stars (Parallax)
        ctx.fillStyle = "white";
        bgStars.forEach(s => {
            ctx.globalAlpha = 0.3;
            ctx.fillRect(s.x, s.y, s.s, s.s);
            ctx.globalAlpha = 1.0;
        });

        // Light Decay
        light -= 0.12;
        document.getElementById('lightMeter').style.width = light + "%";
        if (light <= 0) gameOver("The sky went dark...");

        // Player Movement
        player.vy += player.grav;
        player.y += player.vy;
        if (keys['ArrowLeft']) player.vx = -5.5;
        else if (keys['ArrowRight']) player.vx = 5.5;
        else player.vx *= 0.85;
        player.x += player.vx;

        if (player.x < -player.w) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.w;

        // Platforms
        platforms.forEach((p, i) => {
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.w, p.h, 6);
            ctx.fill();

            if (player.vy > 0 && player.x < p.x + p.w && player.x + player.w > p.x && 
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15) {
                player.vy = player.jump;
            }

            if (player.y < 250) {
                let diff = 250 - player.y;
                player.y += diff;
                p.y += diff;
                stars.forEach(s => s.y += diff);
                bgStars.forEach(s => s.y = (s.y + diff*0.2) % 500);
                if (p.y > canvas.height) { platforms.splice(i, 1); spawnPlatform(0); }
            }
        });

        // Stars
        stars.forEach((s, i) => {
            if (!s.gathered) {
                let hover = Math.sin(Date.now() / 200 + s.phase) * 5;
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 15; ctx.shadowColor = "#ffd700";
                ctx.beginPath();
                ctx.arc(s.x, s.y + hover, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                let dx = player.x + 20 - s.x;
                let dy = player.y + 15 - (s.y + hover);
                if (Math.sqrt(dx*dx + dy*dy) < 35) {
                    s.gathered = true;
                    light = Math.min(100, light + 20);
                    fragments++;
                    document.getElementById('fragCount').innerText = fragments;
                    createParticles(s.x, s.y);
                }
            }
            if (s.y > canvas.height) stars.splice(i, 1);
        });

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
            if(p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;

        // Player (Cloud)
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(player.x+10, player.y+15, 12, 0, Math.PI*2);
        ctx.arc(player.x+20, player.y+10, 15, 0, Math.PI*2);
        ctx.arc(player.x+30, player.y+15, 12, 0, Math.PI*2);
        ctx.fill();

        if (player.y > canvas.height) gameOver("Lost in the clouds...");
        requestAnimationFrame(loop);
    }

    function gameOver(msg) {
        gameRunning = false;
        overlay.style.display = 'flex';
        overlay.innerHTML = `<h2 style="margin-bottom:5px;">Game Over</h2><p>${msg}</p><div style="font-size:2rem; margin:15px 0;">✨ ${fragments}</div><button class="btn-action" onclick="location.reload()">TRY AGAIN</button>`;
    }

    document.getElementById('startBtn').onclick = () => {
        overlay.style.display = 'none';
        gameRunning = true;
        init();
        loop();
    };
</script>
</body>
</html>
