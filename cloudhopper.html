<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Collector - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #0f0f2d;
            --gold: #ffd700;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: #0f0f2d; color: white;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        canvas {
            background: linear-gradient(to bottom, #0f0f2d 0%, #2d2d6a 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 100%; max-height: 100%;
            display: block; border-radius: 15px;
        }

        /* HUD - Top Stats */
        .hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-around; pointer-events: none; z-index: 5;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
            padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 80px;
        }

        .energy-bar {
            width: 100px; height: 6px; background: rgba(255,255,255,0.2);
            border-radius: 3px; margin-top: 5px; overflow: hidden;
        }

        #energy-fill {
            width: 100%; height: 100%; background: var(--secondary);
            transition: width 0.2s;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0; background: rgba(15, 15, 45, 0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center;
        }

        .btn-start {
            background: white; color: #0f0f2d; border: none;
            padding: 15px 35px; border-radius: 50px; font-weight: 800;
            cursor: pointer; font-size: 1.1rem; margin-top: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat-card">
            <small>ENERGY</small>
            <div class="energy-bar"><div id="energy-fill"></div></div>
        </div>
        <div class="stat-card">
            <small>STARS</small>
            <div id="score-text" style="font-size: 1.2rem; font-weight: 800; color: var(--gold);">0</div>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <i class="fas fa-star" style="color: var(--gold); font-size: 3rem; margin-bottom: 10px;"></i>
        <h1>Sky Collector</h1>
        <p>Keep your light alive!</p>
        <button class="btn-start" id="beginBtn">BEGIN JOURNEY</button>
    </div>

    <div id="death-overlay" class="overlay hidden">
        <h2>The Light Faded</h2>
        <h1 id="final-score" style="color: var(--gold);">0</h1>
        <button class="btn-start" onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="gameCanvas" width="350" height="500"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const energyFill = document.getElementById('energy-fill');
    const scoreText = document.getElementById('score-text');

    let gameActive = false;
    let score = 0;
    let energy = 100;
    
    let player = { x: 155, y: 350, w: 40, h: 25, vx: 0, vy: 0, jump: -10, grav: 0.4 };
    let platforms = [];
    let stars = [];

    let keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Fixed Mobile Touch
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        if (touchX < rect.width / 2) {
            keys['ArrowLeft'] = true; keys['ArrowRight'] = false;
        } else {
            keys['ArrowRight'] = true; keys['ArrowLeft'] = false;
        }
    }, {passive: false});

    canvas.addEventListener('touchend', () => {
        keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    });

    function createPlatform(y) {
        let x = Math.random() * (canvas.width - 70);
        platforms.push({ x: x, y: y, w: 70, h: 10 });
        if (Math.random() > 0.4) {
            stars.push({ x: x + 35, y: y - 25, baseY: y - 25, gathered: false });
        }
    }

    function init() {
        platforms = []; stars = []; score = 0; energy = 100;
        player.x = 155; player.y = 350; player.vy = 0;
        platforms.push({ x: 140, y: 420, w: 70, h: 10 });
        for (let i = 0; i < 7; i++) createPlatform(i * 75);
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Energy Logic
        energy -= 0.15;
        energyFill.style.width = energy + "%";
        if (energy <= 0) endGame();

        // Player Movement
        player.vy += player.grav;
        player.y += player.vy;
        if (keys['ArrowLeft']) player.vx = -5;
        else if (keys['ArrowRight']) player.vx = 5;
        else player.vx *= 0.85;
        player.x += player.vx;

        if (player.x < -20) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -20;

        // Platforms
        platforms.forEach((p, i) => {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.fillRect(p.x, p.y, p.w, p.h);

            if (player.vy > 0 && player.x + 30 > p.x && player.x < p.x + p.w &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
                player.vy = player.jump;
            }

            if (player.y < 250) {
                let diff = 250 - player.y;
                player.y += diff;
                p.y += diff;
                stars.forEach(s => { s.y += diff; s.baseY += diff; });
                if (p.y > canvas.height) { platforms.splice(i, 1); createPlatform(0); }
            }
        });

        // Stars
        stars.forEach((s, i) => {
            if (!s.gathered) {
                s.y = s.baseY + Math.sin(Date.now()/200) * 5;
                ctx.fillStyle = "#ffd700";
                ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI*2); ctx.fill();

                let dist = Math.sqrt((player.x+20 - s.x)**2 + (player.y+12 - s.y)**2);
                if (dist < 30) {
                    s.gathered = true; energy = Math.min(100, energy + 15);
                    score++; scoreText.innerText = score;
                }
            }
        });

        // Player
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(player.x+10, player.y+15, 10, 0, Math.PI*2);
        ctx.arc(player.x+20, player.y+10, 14, 0, Math.PI*2);
        ctx.arc(player.x+30, player.y+15, 10, 0, Math.PI*2);
        ctx.fill();

        if (player.y > canvas.height) endGame();
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('death-overlay').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    document.getElementById('beginBtn').onclick = () => {
        document.getElementById('start-overlay').classList.add('hidden');
        gameActive = true;
        init();
        loop();
    };
</script>
</body>
</html>
