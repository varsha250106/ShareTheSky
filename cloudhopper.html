<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Hopper - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a18cd1;
            --secondary: #fbc2eb;
            --dark: #2d2d6a;
            --bg: #f8f9fc;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--dark);
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAV BAR: MATCHES YOUR HOME PAGE --- */
        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5%; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo img { width: 30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .logo span { font-weight: 800; font-size: 1.2rem; color: var(--dark); }

        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { text-decoration: none; color: #444; font-weight: 600; font-size: 0.95rem; }
        
        .dropdown { position: relative; display: inline-block; }
        .drop-btn { cursor: pointer; color: #444; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 5px; }
        .dropdown-content {
            display: none; position: absolute; right: 0; background-color: white;
            min-width: 150px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-radius: 12px; overflow: hidden; z-index: 1001; margin-top: 10px;
        }
        .dropdown-content a { color: #444; padding: 12px 16px; text-decoration: none; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
        .dropdown-content a:hover { background: #f8f9fc; color: var(--primary); }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- LAYOUT --- */
        .main-container {
            display: flex; padding: 20px 5%; gap: 30px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }

        /* --- SIDEBAR: UPDATED FOR CLOUD HOPPER --- */
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .card-panel { background: white; padding: 22px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-pill { background: #fcfaff; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #f0edff; }
        .stat-pill span { display: block; font-size: 1.3rem; font-weight: 800; color: var(--primary); }

        /* --- GAME SECTION --- */
        .game-section { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .game-card { 
            background: white; width: 100%; border-radius: 28px; padding: 20px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; 
            position: relative; overflow: hidden;
        }

        /* The Game Canvas */
        #gameCanvas {
            background: linear-gradient(to bottom, #e0c3fc 0%, #8ec5fc 100%);
            border-radius: 20px;
            max-width: 100%;
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .controls-hint { margin-top: 15px; color: #888; font-size: 0.85rem; text-align: center; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 15px; }
            .sidebar { width: 100%; order: 2; }
            .game-section { order: 1; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="https://img.icons8.com/fluency/48/cloud.png" alt="Cloud">
        <span>ShareTheSky</span>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <div class="drop-btn">Explore <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i></div>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="skymatch.html">Sky Match</a>
                <a href="cloudhopper.html">Cloud Hopper <i class="fa-solid fa-cloud-bolt" style="font-size: 0.8rem;"></i></a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="card-panel">
            <h3 style="margin:0">Altimeter</h3>
            <div class="stat-row">
                <div class="stat-pill">Height<span id="currentHeight">0m</span></div>
                <div class="stat-pill">Best<span id="bestClimb">0m</span></div>
            </div>
        </div>

        <div class="card-panel">
            <h3 style="margin:0 0 12px 0">How to Play</h3>
            <div class="rule-item" style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                <i class="fa-solid fa-arrow-pointer" style="color: var(--primary);"></i>
                <p style="margin:0; font-size: 0.85rem;"><b>Move:</b> Use Arrows or Tilt Mobile</p>
            </div>
            <div class="rule-item" style="display: flex; gap: 10px; align-items: center;">
                <i class="fa-solid fa-cloud-showers-heavy" style="color: #ff9a9e;"></i>
                <p style="margin:0; font-size: 0.85rem;"><b>Avoid:</b> Dark Storm Clouds!</p>
            </div>
        </div>
    </div>

    <div class="game-section">
        <div class="game-card">
            <h2 style="margin:0 0 15px 0; font-size: 1.5rem;">Cloud Hopper</h2>
            <canvas id="gameCanvas" width="350" height="500"></canvas>
            <p class="controls-hint">Tap or use Left/Right Arrows to move!</p>
        </div>
    </div>
</div>

</body>
</html>
