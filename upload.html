<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html">
            <span class="logo-icon"></span>
            ShareTheSky
        </a>
    </h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
    </nav>
</header>

<main class="upload-container">
    <section class="upload-card">
        <h2>Upload Your Sky Photo 🌤️</h2>
        <div id="dropArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">☁️</div>
            <p id="uploadText">Click to select or drag your sky here</p>
            <img id="previewImage" class="preview-img" style="display:none;">
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <div class="input-group">
            <input type="text" id="captionInput" placeholder="Write a caption... (or leave blank for a random name)">
        </div>
        <button id="uploadBtn" class="main-upload-btn">Share the Sky</button>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let mySkyUserId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", mySkyUserId);

    const cloudName = "dqpmybazh";
    const uploadPreset = "sharethesky";

    const fileInput = document.getElementById("fileInput");
    const previewImage = document.getElementById("previewImage");
    const uploadText = document.getElementById("uploadText");
    const uploadBtn = document.getElementById("uploadBtn");

    const skyNames = ["Infinite Azure", "Cotton Candy Clouds", "Golden Hour Glow", "Midnight Whisper", "Painted Horizon", "Celestial Canvas", "Eternal Blue", "Sun-Kissed Stratus", "Twilight Magic", "Dreamy Overcast", "Velvet Dusk", "Ocean in the Sky"];

    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = "block";
            uploadText.innerText = "Photo selected: " + file.name;
            document.querySelector(".upload-icon").style.display = "none";
        }
    });

    uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Please select a sky photo first!");

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Checking the sky...";

        let userCaption = document.getElementById("captionInput").value.trim();
        if (userCaption === "") {
            userCaption = skyNames[Math.floor(Math.random() * skyNames.length)];
        }

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", uploadPreset);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: "POST",
                body: formData
            });
            
            const data = await res.json();
            console.log("Full Cloudinary Data:", data); // View this in F12 -> Console

            // --- STRICT MODERATION LOGIC ---
            let isSafe = true;

            if (data.moderation && data.moderation.length > 0) {
                // If status is NOT 'approved', it's a fail
                if (data.moderation[0].status !== "approved") {
                    isSafe = false;
                }
            }

            if (!isSafe) {
                alert("☁️ Sky Check Failed: Our AI flagged this image as inappropriate. Please share a real sky!");
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Share the Sky";
                return; 
            }

            if (data.error) {
                alert("Upload Error: " + data.error.message);
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Share the Sky";
                return;
            }

            // ONLY SAVES IF SAFE
            await addDoc(collection(db, "photos"), {
                url: data.secure_url,
                caption: userCaption,
                date: new Date().toLocaleString(),
                likes: 0,
                uploaderId: mySkyUserId 
            });

            alert("Sky shared successfully! 🌍");
            window.location.href = "gallery.html";

        } catch (err) {
            console.error(err);
            alert("Connection error. Try again!");
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Share the Sky";
        }
    });
</script>
</body>
</html>
