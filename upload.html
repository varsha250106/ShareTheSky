<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .category-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Poppins', sans-serif;
            margin-top: 10px;
            background-color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                padding: 15px 20px;
                background: white;
            }

            .menu-icon {
                display: block !important;
                font-size: 1.8rem;
                cursor: pointer;
                color: #2d2d6a;
            }

            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                background: white;
                text-align: center;
                padding: 20px 0;
                position: relative;
                border-top: 1px solid #eee;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a { margin: 15px 0; }
        }

        .menu-icon { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="https://img.icons8.com/fluency/48/cloud.png" class="floating-cloud">
            <span>ShareTheSky</span>
        </a>
    </div>

    <div class="menu-icon" onclick="toggleMobileMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore ▾</button>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="skymatch.html" style="color:var(--primary-purple); font-weight:bold;">Sky Match 🎮</a>
                <a href="goldenhour.html">Golden Hour</a>          
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<main class="upload-wrapper">
    <section class="upload-card">
        <h2 class="upload-heading">Upload Your Sky Photo ⛅</h2>
        <div id="dropArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-content-container">
                <div class="upload-illustration">
                    <img src="https://img.icons8.com/fluency/96/cloud.png" alt="Sky Icon" class="upload-icon-small">
                </div>
                <p id="uploadText" class="upload-instruction">Click to select or drag your sky here</p>
                <img id="previewImage" class="preview-img" style="display:none; max-width: 100%; border-radius: 12px;">
            </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <div class="input-container">
            <input type="text" id="captionInput" placeholder="Write a caption...">
            
            <select id="categorySelect" class="category-select">
                <option value="" disabled selected>Select a Category</option>
                <option value="Sunrise">Sunrise 🌅</option>
                <option value="Sunset">Sunset 🌇</option>
                <option value="Cloudy">Cloudy ☁️</option>
                <option value="Moody">Moody ⛈️</option>
                <option value="Night">Night 🌌</option>
                <option value="Azure">Infinite Azure 🟦</option>
            </select>
        </div>
        
        <button id="uploadBtn" class="main-upload-btn">Share the Sky</button>
    </section>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script>
    function toggleMobileMenu() {
        const nav = document.getElementById("navLinks");
        if (nav) {
            nav.classList.toggle("active");
        }
    }
</script>

<script type="module">
    // --- SUPABASE SETUP ---
    const SUPABASE_URL = 'https://quunbblagrcwayyeiahv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ktjfitGlZ3F-Kvrji4YYvvQ_yuY3g...'; // Paste full key from your settings
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- USER ID ---
    let mySkyUserId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", mySkyUserId);

    const fileInput = document.getElementById("fileInput");
    const previewImage = document.getElementById("previewImage");
    const uploadText = document.getElementById("uploadText");
    const uploadBtn = document.getElementById("uploadBtn");

    // Preview Logic
    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = "block";
            uploadText.innerText = "Selected: " + file.name;
            const illustration = document.querySelector(".upload-illustration");
            if (illustration) illustration.style.display = "none";
        }
    });

    // Upload Logic
    uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        const category = document.getElementById("categorySelect").value;
        const userCaption = document.getElementById("captionInput").value.trim() || "Untitled Sky";

        if (!file) return alert("Please select a sky photo first!");
        if (!category) return alert("Please select a category!");

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Scanning sky...";

        try {
            // STEP 1: AI Verification
            const model = await mobilenet.load();
            const predictions = await model.classify(previewImage);
            const isSky = predictions.some(p => 
                p.className.toLowerCase().includes('sky') || 
                p.className.toLowerCase().includes('cloud') ||
                p.className.toLowerCase().includes('sunset')
            );

            if (!isSky) {
                alert("☁️ Sky Check Failed: Please upload an actual sky photo.");
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Share the Sky";
                return;
            }

            uploadBtn.innerText = "Compressing...";

            // STEP 2: Compression
            const options = { maxSizeMB: 0.3, maxWidthOrHeight: 1920, useWebWorker: true };
            const compressedFile = await imageCompression(file, options);

            uploadBtn.innerText = "Uploading...";

            // STEP 3: Storage Upload
            const fileName = `${Date.now()}_${mySkyUserId}.jpg`;
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('sky-photos')
                .upload(fileName, compressedFile);

            if (uploadError) throw uploadError;

            const { data: urlData } = supabaseClient.storage.from('sky-photos').getPublicUrl(fileName);
            const publicUrl = urlData.publicUrl;

            // STEP 4: Database Save
            const { error: dbError } = await supabaseClient
                .from('photos')
                .insert([{
                    url: publicUrl,
                    caption: userCaption,
                    category: category,
                    uploader_id: mySkyUserId
                }]);

            if (dbError) throw dbError;

            alert("Sky shared successfully! 🌍");
            window.location.href = "gallery.html";

        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Share the Sky";
        }
    });
</script>
</body>
</html>
