<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Small fix to make the drop area look clickable */
        .drop-area {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .drop-area.active {
            border-color: #007bff;
            background-color: #f0f8ff;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<header>
    <h1 class="logo">ShareTheSky</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="creator.html">Creator</a>
    </nav>
</header>

<section class="upload-section">
    <h2>Upload Your Sky Photo 🌤️</h2>

    <div id="dropArea" class="drop-area">
        <p>Drag & Drop your sky photo here or click to select</p>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none;"><br>

    <input type="text" id="captionInput" placeholder="Write a caption..."><br><br>

    <button id="uploadBtn">Upload Photo</button>

    <center>
        <img id="previewImage" style="display:none; width:200px; margin-top:20px; border-radius: 8px;">
    </center>
</section>

<script type="module">
    // 1. Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 2. Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678",
        measurementId: "G-QLMFRX48Q9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. Cloudinary Config
    const cloudName = "dqpmybazh";
    const uploadPreset = "sharethesky"; // Ensure this is an "Unsigned" preset in Cloudinary!

    // 4. UI Elements
    const fileInput = document.getElementById("fileInput");
    const previewImage = document.getElementById("previewImage");
    const captionInput = document.getElementById("captionInput");
    const dropArea = document.getElementById("dropArea");
    const uploadBtn = document.getElementById("uploadBtn");

    let selectedFile = null;

    // Trigger file input when clicking drop area
    dropArea.addEventListener("click", () => fileInput.click());

    // Drag & Drop Logic
    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.classList.add("active");
    });

    dropArea.addEventListener("dragleave", () => dropArea.classList.remove("active"));

    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.classList.remove("active");
        handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", function() {
        handleFile(this.files[0]);
    });

    function handleFile(file) {
        if (!file) return;
        selectedFile = file;
        previewImage.src = URL.createObjectURL(file);
        previewImage.style.display = "block";
        dropArea.innerHTML = `<p>Selected: ${file.name}</p>`;
    }

    // 5. THE UPLOAD LOGIC
    uploadBtn.addEventListener("click", async () => {
        if (!selectedFile) {
            alert("Please select a sky photo first!");
            return;
        }

        const caption = captionInput.value.trim() || "A beautiful sky";

        // UI Feedback
        uploadBtn.innerText = "Uploading... ☁️";
        uploadBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", selectedFile);
        formData.append("upload_preset", uploadPreset);

        try {
            // STEP A: Upload to Cloudinary
            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.secure_url) {
                // STEP B: Save to Firestore
                await addDoc(collection(db, "photos"), {
                    url: data.secure_url,
                    caption: caption,
                    date: new Date().toLocaleString(),
                    likes: 0
                });

                // SUCCESS!
                alert("Success! Your photo has been shared with the world! 🌍✨");

                // Reset UI
                selectedFile = null;
                fileInput.value = "";
                captionInput.value = "";
                previewImage.style.display = "none";
                dropArea.innerHTML = "<p>Drag & Drop your sky photo here or click to select</p>";

            } else {
                console.error("Cloudinary error:", data);
                alert("Cloudinary Error: Check if your 'upload_preset' is set to Unsigned.");
            }

        } catch (error) {
            console.error("Critical Error:", error);
            alert("Upload failed. Open the browser console (F12) to see why.");
        } finally {
            uploadBtn.innerText = "Upload Photo";
            uploadBtn.disabled = false;
        }
    });
</script>

</body>
</html>
