<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Sky Photo – ShareTheSky</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <h1 class="logo">ShareTheSky</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="upload.html">Upload</a>
            <a href="gallery.html">Gallery</a>
            <a href="creator.html">Creator</a>
        </nav>
    </header>

    <section class="upload-section">
        <h2>Upload Your Sky Photo</h2>
        <p>Select or drag your favourite sky moment and share it.</p>

        <!-- DRAG & DROP -->
        <div id="dropArea" class="drop-area">
            <p>Drag & Drop your sky photo here</p>
        </div>

        <!-- File input -->
        <input type="file" id="fileInput" accept="image/*">

        <!-- Caption -->
        <label>Caption:</label>
        <input type="text" id="captionInput">

        <!-- Upload button -->
        <button onclick="uploadImage()">Upload</button>

        <!-- Preview -->
        <p>Preview:</p>
        <img id="previewImage" style="display:none; width:200px; margin-top:10px;">
    </section>

<script>
const cloudName = "dqpmybazhE";   // 🔴 REPLACE THIS
const uploadPreset = "sharethesky";    // ✅ your preset

const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");
const captionInput = document.getElementById("captionInput");
const dropArea = document.getElementById("dropArea");

// Drag over
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("active");
});

// Drag leave
dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("active");
});

// Drop file
dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("active");

    const file = e.dataTransfer.files[0];
    handleFile(file);
});

// File input change
fileInput.addEventListener("change", function () {
    handleFile(this.files[0]);
});

// Handle file preview
function handleFile(file) {
    if (!file) return;

    previewImage.src = URL.createObjectURL(file);
    previewImage.style.display = "block";

    fileInput.fileData = file;
}

// Upload to Cloudinary
function uploadImage() {
    const file = fileInput.fileData || fileInput.files[0];

    if (!file) {
        alert("Please select or drag an image first.");
        return;
    }

    const captionText = captionInput.value.trim();

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        alert(
            captionText
            ? "Photo uploaded successfully with caption!"
            : "Photo uploaded successfully!"
        );

        // Reset fields
        fileInput.value = "";
        fileInput.fileData = null;
        captionInput.value = "";
        previewImage.style.display = "none";
    })
    .catch(() => {
        alert("Upload failed");
    });
}
</script>

</body>
</html>
