<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Essential Dropdown & Mobile CSS (Same as Index) */
        body { font-family: 'Inter', sans-serif; margin: 0; }

        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: none; border: none; color: #4a4a8a;
            font-size: 16px; font-weight: 600; cursor: pointer;
            padding: 10px 15px; font-family: inherit;
        }
        .dropdown-content {
            display: none; position: absolute; background-color: white;
            min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            border-radius: 12px; z-index: 100; top: 100%; overflow: hidden;
        }
        .dropdown-content a {
            color: #333; padding: 12px 16px; text-decoration: none;
            display: block; font-size: 14px; transition: background 0.2s;
        }
        .dropdown-content a:hover { background-color: #f8f6ff; color: #a18cd1; }
        .dropdown:hover .dropdown-content { display: block; }

        .menu-toggle {
            display: none; flex-direction: column; gap: 5px; cursor: pointer;
        }
        .menu-toggle span {
            width: 25px; height: 3px; background-color: #a18cd1; border-radius: 3px;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .nav-links {
                display: none; flex-direction: column; position: absolute;
                top: 70px; right: 20px; background: white; width: 200px;
                padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                z-index: 1000;
            }
            .nav-links.active { display: flex; }
            .dropdown-content {
                position: static; box-shadow: none; background: #f9f9f9; margin-top: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">
        <a href="index.html">
            <span>📷</span> ShareTheSky
        </a>
    </h1>
    
    <div class="menu-toggle" id="mobile-menu">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav-links" id="nav-list">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore ▾</button>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<main class="center-wrapper">
    <div class="upload-card">
        <h2>Upload Your Sky Photo 🌤️</h2>
        
        <div id="errorMessage" class="error-box" style="display: none;">
            ❌ Not a sky! Please upload a clear photo of the sky.
        </div>

        <div id="dropArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">
                <img src="https://img.icons8.com/fluency/96/cloud.png" id="cloudIcon" style="width: 60px;" alt="cloud">
            </div>
            <p id="uploadText" style="color: #666; margin-top: 15px;">Click to select or drag your sky here</p>
            <img id="previewImage" style="display:none; max-width: 100%; border-radius: 12px; margin-top: 10px;">
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <input type="text" id="captionInput" placeholder="Write a caption... (or leave blank for a random name)">
        <button id="uploadBtn">Share the Sky</button>
    </div>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Mobile Menu Toggle Script
    const menuToggle = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    }

    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let mySkyUserId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", mySkyUserId);

    const cloudName = "dqpmybazh";
    const uploadPreset = "sharethesky";

    const fileInput = document.getElementById("fileInput");
    const previewImage = document.getElementById("previewImage");
    const uploadText = document.getElementById("uploadText");
    const uploadBtn = document.getElementById("uploadBtn");
    const errorMessage = document.getElementById("errorMessage");
    const cloudIcon = document.getElementById("cloudIcon");

    const skyNames = ["Infinite Azure", "Cotton Candy Clouds", "Golden Hour Glow", "Midnight Whisper", "Painted Horizon", "Celestial Canvas", "Eternal Blue", "Sun-Kissed Stratus", "Twilight Magic", "Dreamy Overcast", "Velvet Dusk", "Ocean in the Sky"];

    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = "block";
            uploadText.innerText = "Sky Selected!";
            if(cloudIcon) cloudIcon.style.display = "none";
            errorMessage.style.display = "none";
        }
    });

    uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Please select a sky photo first!");

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Checking the sky...";
        errorMessage.style.display = "none";

        let userCaption = document.getElementById("captionInput").value.trim();
        if (userCaption === "") {
            userCaption = skyNames[Math.floor(Math.random() * skyNames.length)];
        }

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", uploadPreset);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: "POST",
                body: formData
            });
            const data = await res.json();

            // AI Moderation check
            if (data.moderation && data.moderation[0].status === "rejected") {
                errorMessage.style.display = "block";
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Share the Sky";
                return; 
            }

            await addDoc(collection(db, "photos"), {
                url: data.secure_url,
                caption: userCaption,
                date: new Date().toLocaleString(),
                likes: 0,
                uploaderId: mySkyUserId 
            });

            alert("Sky shared successfully! 🌍");
            window.location.href = "gallery.html";
        } catch (err) {
            console.error(err);
            alert("Upload failed. Try again!");
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Share the Sky";
        }
    });
</script>
</body>
</html>
