<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1 class="logo">ShareTheSky</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="creator.html">Creator</a>
    </nav>
</header>

<section class="upload-section">
    <h2>Upload Your Sky Photo 🌤️</h2>

    <!-- Drag & Drop -->
    <div id="dropArea" class="drop-area">
        <p>Drag & Drop your sky photo here</p>
    </div>

    <!-- File input -->
    <input type="file" id="fileInput" accept="image/*"><br><br>

    <!-- Caption -->
    <input type="text" id="captionInput" placeholder="Write a caption..."><br><br>

    <!-- Upload button -->
    <button onclick="uploadImage()">Upload</button>

    <!-- Preview -->
    <img id="previewImage" style="display:none; width:200px; margin-top:10px;">
</section>

<!-- 🔥 FINAL SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
  authDomain: "sharethesky-a9c7d.firebaseapp.com",
  projectId: "sharethesky-a9c7d",
  storageBucket: "sharethesky-a9c7d.firebasestorage.app",
  messagingSenderId: "1047232389865",
  appId: "1:1047232389865:web:37694bf13bcef31f570678",
  measurementId: "G-QLMFRX48Q9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ☁️ Cloudinary config
const cloudName = "dqpmybazh";
const uploadPreset = "sharethesky";

const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");
const captionInput = document.getElementById("captionInput");
const dropArea = document.getElementById("dropArea");

// Drag & Drop
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("active");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("active");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("active");
    handleFile(e.dataTransfer.files[0]);
});

// File input
fileInput.addEventListener("change", function () {
    handleFile(this.files[0]);
});

// Preview
function handleFile(file) {
    if (!file) return;

    previewImage.src = URL.createObjectURL(file);
    previewImage.style.display = "block";

    fileInput.fileData = file;
}

// 🔥 FINAL UPLOAD FUNCTION
window.uploadImage = function () {
    const file = fileInput.fileData || fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    const caption = captionInput.value.trim();

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    // Upload to Cloudinary
    fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(async data => {

        // 🔥 Save to Firebase (GLOBAL)
        await addDoc(collection(db, "photos"), {
            url: data.secure_url,
            caption: caption,
            date: new Date().toLocaleString(),
            likes: 0
        });

        alert("Uploaded successfully 🌍");

        // Reset UI
        fileInput.value = "";
        fileInput.fileData = null;
        captionInput.value = "";
        previewImage.style.display = "none";
    })
    .catch(() => {
        alert("Upload failed");
    });
};
</script>

</body>
</html>
