<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
 <style>
    :root { 
        --primary-purple: #6c63ff; 
        --dark-text: #2d2d6a; 
        --bg-blue: #f8faff; 
    }

    body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-blue); overflow-x: hidden; }

    /* HEADER STYLES */
    header { 
        display: flex; 
        align-items: center; 
        padding: 15px 5%; 
        background: white; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        position: sticky; 
        top: 0; 
        z-index: 1000; 
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--dark-text); font-weight: 600; }
    .logo i { color: var(--primary-purple); font-size: 1.5rem; animation: floatCloud 3s ease-in-out infinite; }
    .logo span { font-weight: 700; color: #1a237e; font-size: 1.4rem; letter-spacing: -0.5px; }

    .nav-links { display: flex; gap: 30px; align-items: center; margin-left: auto; }
    .nav-links a { text-decoration: none; color: #333; font-weight: 500; }

    /* DROPDOWN FIX */
    .dropdown { position: relative; display: inline-block; }
    .dropbtn { background: none; border: none; font-family: 'Poppins', sans-serif; font-weight: 500; color: #333; cursor: pointer; padding: 15px 0; display: flex; align-items: center; gap: 5px; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 170px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); border-radius: 12px; z-index: 1100; overflow: hidden; top: 100%; margin-top: 0; }
    .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; transition: 0.2s; }
    .dropdown-content a:hover { background-color: #f0f4ff; color: var(--primary-purple); }
    .dropdown:hover .dropdown-content { display: block; }

    /* UPLOAD CARD LAYOUT - CENTERED & LARGE */
    .upload-container { 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh; /* Keeps card centered vertically */
        padding: 20px;
    }

    .upload-card { 
        background: white; 
        padding: 40px; 
        border-radius: 30px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
        text-align: center; 
        width: 100%;
        max-width: 600px; /* Makes card wider */
    }
    
    #dropArea { 
        border: 2px dashed #ddd; 
        padding: 60px 40px; 
        border-radius: 20px; 
        cursor: pointer; 
        transition: 0.3s; 
        margin-bottom: 20px;
    }
    #dropArea:hover { border-color: var(--primary-purple); background: #fbfbff; }
    #dropArea i { font-size: 3rem; color: var(--primary-purple); margin-bottom: 15px; }
    
    .preview-img { width: 100%; border-radius: 15px; margin-top: 15px; display: none; max-height: 400px; object-fit: contain; }
    
    /* INPUTS & BUTTONS */
    .upload-form-group { display: flex; flex-direction: column; gap: 15px; }
    
    input, select { 
        width: 100%; padding: 14px; border-radius: 12px; 
        border: 1px solid #eee; font-family: 'Poppins', sans-serif; box-sizing: border-box; 
        outline: none; transition: 0.3s;
    }
    input:focus, select:focus { border-color: var(--primary-purple); }
    
    .main-btn { 
        width: 100%; padding: 16px; border-radius: 15px; 
        background: var(--primary-purple); color: white; border: none; 
        font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Poppins', sans-serif;
        font-size: 1rem;
    }
    .main-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3); }

    @keyframes floatCloud {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <i class="fa-solid fa-cloud"></i> 
        <span>ShareTheSky</span>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">
                Explore <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i>
            </button>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="match.html">Sky Match</a>
                <a href="golden-hour.html">Golden Hour</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>
<main class="upload-container">
    <section class="upload-card">
        <h2 style="color: var(--dark-text); margin-bottom: 20px;">
            Share Your View <i class="fa-solid fa-cloud" style="color: var(--primary-purple); opacity: 0.5;"></i>
        </h2>
        
        <div id="dropArea" onclick="document.getElementById('fileInput').click()">
            <div id="promptContent">
                <i class="fa-solid fa-cloud-arrow-up fa-3x" style="color: var(--primary-purple); margin-bottom: 15px;"></i>
                <p style="color: #666;">Click or drag to select a high-res sky photo</p>
            </div>
            <img id="previewImage" class="preview-img">
        </div>
        
        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <div class="upload-form-group">
            <input type="text" id="captionInput" placeholder="Write a caption...">
            
            <select id="categorySelect">
                <option value="" disabled selected>Select Category</option>
                <option value="Sunrise">Sunrise 🌅</option>
                <option value="Sunset">Sunset 🌇</option>
                <option value="Cloudy">Cloudy ☁️</option>
                <option value="Infinite Azure">Infinite Azure 🟦</option>
            </select>
            
            <button id="uploadBtn" class="main-btn">Share the Sky</button>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script type="module">
    const SUPABASE_URL = 'https://quunbblagrcwayyeiahv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dW5iYmxhZ3Jjd2F5eWVpYWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ4MjcsImV4cCI6MjA5MDk0MDgyN30.ylX47zmQXI_kAkY3wQUyJz0BqZ7xZ3hZARonm80Id3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const fileInput = document.getElementById('fileInput');
    const previewImage = document.getElementById('previewImage');
    const promptContent = document.getElementById('promptContent');
    const uploadBtn = document.getElementById('uploadBtn');

    const myId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", myId);

    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = "block";
            promptContent.style.display = "none";
        }
    });

    uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        const category = document.getElementById("categorySelect").value;
        const caption = document.getElementById("captionInput").value;
        
        if (!file || !category) return alert("Select photo and category!");

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Uploading High-Res...";

        try {
            // Options tuned for High Quality 
            const options = { maxSizeMB: 2, maxWidthOrHeight: 2560, useWebWorker: true }; 
            const compressedFile = await imageCompression(file, options);
            const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '_')}`;

            const { error: storageError } = await supabaseClient.storage.from('sky-photos').upload(fileName, compressedFile);
            if (storageError) throw storageError;

            const { data: urlData } = supabaseClient.storage.from('sky-photos').getPublicUrl(fileName);
            
            const { error: dbError } = await supabaseClient.from('photos').insert([{
                url: urlData.publicUrl,
                caption: caption || "A beautiful sky",
                category: category,
                uploader_id: myId,
                is_reported: false
            }]);

            if (dbError) throw dbError;
            window.location.href = "gallery.html";
            
        } catch (err) {
            alert("Error: " + err.message);
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Share the Sky";
        }
    });
</script>
</body>
</html>
