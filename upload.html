<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 2. MOBILE CSS: Makes the menu stack vertically when opened */
        @media (max-width: 768px) {
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                padding: 15px 20px;
                background: white;
            }

            .menu-icon {
                display: block !important; /* Forces icon to show on mobile */
                font-size: 1.8rem;
                cursor: pointer;
                color: #2d2d6a; /* Dark blue to match your logo */
            }

            .nav-links {
                display: none; /* Stays hidden until you click the icon */
                width: 100%;
                flex-direction: column;
                background: white;
                text-align: center;
                padding: 20px 0;
                position: relative;
                border-top: 1px solid #eee;
            }

            .nav-links.active {
                display: flex; /* This shows the Home/Explore links when clicked */
            }

            .nav-links a { margin: 15px 0; }
        }

        /* Hides the hamburger icon on Laptops/Desktops */
        .menu-icon { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="https://img.icons8.com/fluency/48/cloud.png" class="floating-cloud">
            <span>ShareTheSky</span>
        </a>
    </div>

    <div class="menu-icon" onclick="toggleMobileMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore ▾</button>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>

<main class="upload-wrapper">
    <section class="upload-card">
        <h2 class="upload-heading">Upload Your Sky Photo ⛅</h2>
        <div id="dropArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-content-container">
                <div class="upload-illustration">
                    <img src="https://img.icons8.com/fluency/96/cloud.png" alt="Sky Icon" class="upload-icon-small">
                </div>
                <p id="uploadText" class="upload-instruction">Click to select or drag your sky here</p>
                <img id="previewImage" class="preview-img" style="display:none;">
            </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <div class="input-container">
            <input type="text" id="captionInput" placeholder="Write a caption...">
        </div>
        <button id="uploadBtn" class="main-upload-btn">Share the Sky</button>
    </section>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script>
    function toggleMobileMenu() {
        const nav = document.getElementById("navLinks");
        if (nav) {
            nav.classList.toggle("active");
        }
    }
</script>

<script type="module">
    // ... (Your Firebase code from earlier) ...
</script>

</body>
</html>
