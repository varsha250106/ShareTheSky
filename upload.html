<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Category dropdown specific styling to match your Pinterest vibe */
        .category-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Poppins', sans-serif;
            margin-top: 10px;
            background-color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                padding: 15px 20px;
                background: white;
            }

            .menu-icon {
                display: block !important;
                font-size: 1.8rem;
                cursor: pointer;
                color: #2d2d6a;
            }

            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                background: white;
                text-align: center;
                padding: 20px 0;
                position: relative;
                border-top: 1px solid #eee;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a { margin: 15px 0; }
        }

        .menu-icon { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="https://img.icons8.com/fluency/48/cloud.png" class="floating-cloud">
            <span>ShareTheSky</span>
        </a>
    </div>

    <div class="menu-icon" onclick="toggleMobileMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">Explore ▾</button>
           <div class="dropdown-content">
    <a href="gallery.html">Gallery</a>
    <a href="upload.html">Upload</a>
    <a href="skymatch.html" style="color:var(--primary-purple); font-weight:bold;">Sky Match 🎮</a>
               
    <a href="about.html">About Me</a>
</div>
        </div>
    </nav>
</header>

<main class="upload-wrapper">
    <section class="upload-card">
        <h2 class="upload-heading">Upload Your Sky Photo ⛅</h2>
        <div id="dropArea" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-content-container">
                <div class="upload-illustration">
                    <img src="https://img.icons8.com/fluency/96/cloud.png" alt="Sky Icon" class="upload-icon-small">
                </div>
                <p id="uploadText" class="upload-instruction">Click to select or drag your sky here</p>
                <img id="previewImage" class="preview-img" style="display:none;">
            </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <div class="input-container">
            <input type="text" id="captionInput" placeholder="Write a caption...">
            
            <select id="categorySelect" class="category-select">
                <option value="" disabled selected>Select a Category</option>
                <option value="Sunrise">Sunrise 🌅</option>
                <option value="Sunset">Sunset 🌇</option>
                <option value="Cloudy">Cloudy ☁️</option>
                <option value="Moody">Moody ⛈️</option>
                <option value="Night">Night 🌌</option>
                <option value="Azure">Infinite Azure 🟦</option>
            </select>
        </div>
        
        <button id="uploadBtn" class="main-upload-btn">Share the Sky</button>
    </section>
</main>

<footer>
    <p>© 2026 ShareTheSky — Created with love ♥</p>
</footer>

<script>
    function toggleMobileMenu() {
        const nav = document.getElementById("navLinks");
        if (nav) {
            nav.classList.toggle("active");
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
        authDomain: "sharethesky-a9c7d.firebaseapp.com",
        projectId: "sharethesky-a9c7d",
        storageBucket: "sharethesky-a9c7d.firebasestorage.app",
        messagingSenderId: "1047232389865",
        appId: "1:1047232389865:web:37694bf13bcef31f570678"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let mySkyUserId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", mySkyUserId);

    const cloudName = "dqpmybazh";
    const uploadPreset = "sharethesky";

    const fileInput = document.getElementById("fileInput");
    const previewImage = document.getElementById("previewImage");
    const uploadText = document.getElementById("uploadText");
    const uploadBtn = document.getElementById("uploadBtn");

    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = "block";
            uploadText.innerText = "Selected: " + file.name;
            const illustration = document.querySelector(".upload-illustration");
            if (illustration) illustration.style.display = "none";
        }
    });

    uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        const category = document.getElementById("categorySelect").value;
        
        if (!file) return alert("Please select a sky photo first!");
        if (!category) return alert("Please select a category for your sky!");

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Checking the sky...";

        let userCaption = document.getElementById("captionInput").value.trim();
        if (userCaption === "") userCaption = "Untitled Sky";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", uploadPreset);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: "POST",
                body: formData
            });
            const data = await res.json();

            let isSafe = true;
            if (data.moderation && data.moderation.length > 0) {
                if (data.moderation[0].status !== "approved") isSafe = false;
            }

            if (!isSafe) {
                alert("☁️ Sky Check Failed: AI restricted this image.");
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Share the Sky";
                return;
            }

            await addDoc(collection(db, "photos"), {
                url: data.secure_url,
                caption: userCaption,
                category: category, // SAVING CATEGORY HERE
                date: new Date().toLocaleString(),
                likes: [], 
                uploaderId: mySkyUserId 
            });

            alert("Sky shared successfully! 🌍");
            window.location.href = "gallery.html";
        } catch (err) {
            console.error(err);
            alert("Connection error. Try again!");
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Share the Sky";
        }
    });
</script>
</body>
</html>
