<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">ShareTheSky</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="gallery.html">Gallery</a>
        <a href="creator.html">Creator</a>
    </nav>
</header>

<section class="upload-section">
    <h2>Upload Your Sky Photo 🌤️</h2>
    <div id="dropArea" class="drop-area">
        <p>Drag & Drop your sky photo here</p>
    </div>
    <input type="file" id="fileInput" accept="image/*"><br><br>
    <input type="text" id="captionInput" placeholder="Write a caption..."><br><br>
    <button id="uploadBtn">Upload</button>
    <img id="previewImage" style="display:none; width:200px; margin-top:10px;">
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDxgtNzywhjYGR7R2XMVobR73-SioT6v98",
    authDomain: "sharethesky-a9c7d.firebaseapp.com",
    projectId: "sharethesky-a9c7d",
    storageBucket: "sharethesky-a9c7d.firebasestorage.app",
    messagingSenderId: "1047232389865",
    appId: "1:1047232389865:web:37694bf13bcef31f570678"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🆔 GENERATE OR RETRIEVE UNIQUE USER ID
let mySkyUserId = localStorage.getItem("mySkyUserId");
if (!mySkyUserId) {
    mySkyUserId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", mySkyUserId);
}

const cloudName = "dqpmybazh";
const uploadPreset = "sharethesky";

const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");
const captionInput = document.getElementById("captionInput");
const uploadBtn = document.getElementById("uploadBtn");

fileInput.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
        previewImage.src = URL.createObjectURL(file);
        previewImage.style.display = "block";
    }
});

uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) return alert("Select an image!");

    uploadBtn.disabled = true;
    uploadBtn.innerText = "Uploading...";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
            method: "POST",
            body: formData
        });
        const data = await res.json();

        // 🔥 ADDING uploaderId TO THE DOCUMENT
        await addDoc(collection(db, "photos"), {
            url: data.secure_url,
            caption: captionInput.value.trim(),
            date: new Date().toLocaleString(),
            likes: 0,
            uploaderId: mySkyUserId 
        });

        alert("Uploaded successfully! 🌍");
        window.location.href = "gallery.html";
    } catch (err) {
        alert("Upload failed");
        uploadBtn.disabled = false;
        uploadBtn.innerText = "Upload";
    }
});
</script>
</body>
</html>
