<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .upload-card {
            max-width: 500px; margin: 50px auto; background: white;
            padding: 30px; border-radius: 20px; text-align: center;
        }
        .drop-zone {
            border: 2px dashed #ccc; padding: 40px; border-radius: 15px;
            margin-bottom: 20px; cursor: pointer;
        }
        input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border: 1px solid #ddd; border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="https://img.icons8.com/fluency/48/cloud.png" class="floating-cloud"><span>ShareTheSky</span></a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <button class="dropbtn">Explore ▾</button>
                <div class="dropdown-content">
                    <a href="gallery.html">Gallery</a>
                    <a href="upload.html">Upload</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="upload-card">
        <h2>Upload Your Sky Photo 🌟</h2>
        <div class="drop-zone" id="dropZone">
            <img src="https://img.icons8.com/fluency/48/cloud.png" style="width:50px"><br>
            Click or Drag photo here
        </div>
        <input type="text" id="caption" placeholder="Write a caption...">
        <button class="main-btn" style="width:100%; border:none; cursor:pointer">Share the Sky</button>
    </div>
</body>
</html>
