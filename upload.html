<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShareTheSky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { 
        --primary-purple: #6c63ff; 
        --dark-text: #2d2d6a; 
        --bg-blue: #f8faff; 
        --danger: #ff4d6d;
    }

    body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-blue); overflow-x: hidden; }

    /* HEADER & NAV ALIGNMENT */
    header { 
        display: flex; 
        align-items: center; 
        padding: 15px 5%; 
        background: white; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        position: sticky; 
        top: 0; 
        z-index: 1000; 
    }

    /* Restored Cloud Logo Logic */
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--dark-text); font-weight: 600; }
    .logo i { 
        color: var(--primary-purple); 
        font-size: 1.5rem; 
        animation: floatCloud 3s ease-in-out infinite; 
    }
    .logo span { font-weight: 700; color: #1a237e; font-size: 1.4rem; letter-spacing: -0.5px; }

    /* Pushes navigation links to the RIGHT */
    .nav-links { 
        display: flex; 
        gap: 30px; 
        align-items: center; 
        margin-left: auto; 
    }
    .nav-links a { text-decoration: none; color: #333; font-weight: 500; transition: 0.2s; }
    .nav-links a:hover { color: var(--primary-purple); }

    /* Dropdown Hover Bridge Fix */
    .dropdown { position: relative; display: inline-block; }
    .dropbtn { 
        background: none; 
        border: none; 
        font-family: 'Poppins', sans-serif; 
        font-weight: 500; 
        color: #333; 
        cursor: pointer; 
        padding: 15px 0; 
        display: flex; 
        align-items: center; 
        gap: 5px; 
    }
    .dropdown-content { 
        display: none; 
        position: absolute; 
        right: 0; 
        background-color: white; 
        min-width: 170px; 
        box-shadow: 0px 8px 16px rgba(0,0,0,0.1); 
        border-radius: 12px; 
        z-index: 1100; 
        overflow: hidden; 
        top: 100%;
        margin-top: 0;
    }
    .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; transition: 0.2s; }
    .dropdown-content a:hover { background-color: #f0f4ff; color: var(--primary-purple); }
    .dropdown:hover .dropdown-content { display: block; }

    /* PINTEREST GALLERY LAYOUT */
    .gallery-grid { columns: 3 250px; column-gap: 20px; width: 92%; max-width: 1200px; margin: 40px auto; }
    .sky-card { break-inside: avoid; margin-bottom: 20px; background: white; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
    .sky-card img { width: 100%; display: block; cursor: zoom-in; object-fit: cover; }

    /* Restored Animations */
    @keyframes floatCloud {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    /* Upload Card Styles */
    .upload-container { max-width: 500px; margin: 40px auto; padding: 20px; }
    .upload-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
    #dropArea { border: 2px dashed #ddd; padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
    #dropArea:hover { border-color: var(--primary-purple); background: #fbfbff; }

    /* Zoom Overlay & Pill */
    .zoom-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 9000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
    }
    #zoomImg { max-width: 85vw; max-height: 70vh; border-radius: 15px; transition: transform 0.2s; object-fit: contain; }
    .zoom-pill {
        position: fixed; bottom: 40px; background: white; padding: 12px 28px; border-radius: 50px;
        display: flex; gap: 25px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999;
    }

    /* Admin Toggle */
    #modToggle { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: 30px; background: #1a237e; color: white; border: none; cursor: pointer; opacity: 0.7; font-family: 'Poppins', sans-serif; font-size: 0.8rem; transition: 0.3s; }

    @media (max-width: 768px) { .gallery-grid { columns: 2 160px; } }
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <i class="fa-solid fa-cloud"></i> 
        <span>ShareTheSky</span>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <div class="dropdown">
            <button class="dropbtn">
                Explore <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i>
            </button>
            <div class="dropdown-content">
                <a href="gallery.html">Gallery</a>
                <a href="upload.html">Upload</a>
                <a href="match.html">Sky Match</a>
                <a href="golden-hour.html">Golden Hour</a>
                <a href="about.html">About Me</a>
            </div>
        </div>
    </nav>
</header>
<main class="upload-container">
    <section class="upload-card">
        <h2 style="color: var(--dark-text);">Share Your View ☁️</h2>
        <div id="dropArea" onclick="document.getElementById('fileInput').click()">
            <div id="promptContent">
                <i class="fa-solid fa-cloud-arrow-up fa-3x" style="color: #6c63ff; margin-bottom: 15px;"></i>
                <p style="color: #666;">Click to select a high-res sky photo</p>
            </div>
            <img id="previewImage" class="preview-img">
        </div>
        
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <input type="text" id="captionInput" placeholder="Write a caption...">
        
        <select id="categorySelect">
            <option value="" disabled selected>Select Category</option>
            <option value="Sunrise">Sunrise 🌅</option>
            <option value="Sunset">Sunset 🌇</option>
            <option value="Cloudy">Cloudy ☁️</option>
            <option value="Infinite Azure">Infinite Azure 🟦</option>
        </select>
        
        <button id="uploadBtn" class="main-btn">Share the Sky</button>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script type="module">
    const SUPABASE_URL = 'https://quunbblagrcwayyeiahv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dW5iYmxhZ3Jjd2F5eWVpYWh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ4MjcsImV4cCI6MjA5MDk0MDgyN30.ylX47zmQXI_kAkY3wQUyJz0BqZ7xZ3hZARonm80Id3M';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const fileInput = document.getElementById('fileInput');
    const previewImage = document.getElementById('previewImage');
    const promptContent = document.getElementById('promptContent');
    const uploadBtn = document.getElementById('uploadBtn');

    const myId = localStorage.getItem("mySkyUserId") || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("mySkyUserId", myId);

    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = "block";
            promptContent.style.display = "none";
        }
    });

    uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        const category = document.getElementById("categorySelect").value;
        const caption = document.getElementById("captionInput").value;
        
        if (!file || !category) return alert("Select photo and category!");

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Uploading High-Res...";

        try {
            // Options tuned for High Quality 
            const options = { maxSizeMB: 2, maxWidthOrHeight: 2560, useWebWorker: true }; 
            const compressedFile = await imageCompression(file, options);
            const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '_')}`;

            const { error: storageError } = await supabaseClient.storage.from('sky-photos').upload(fileName, compressedFile);
            if (storageError) throw storageError;

            const { data: urlData } = supabaseClient.storage.from('sky-photos').getPublicUrl(fileName);
            
            const { error: dbError } = await supabaseClient.from('photos').insert([{
                url: urlData.publicUrl,
                caption: caption || "A beautiful sky",
                category: category,
                uploader_id: myId,
                is_reported: false
            }]);

            if (dbError) throw dbError;
            window.location.href = "gallery.html";
            
        } catch (err) {
            alert("Error: " + err.message);
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Share the Sky";
        }
    });
</script>
</body>
</html>
